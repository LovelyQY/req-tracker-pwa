<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>创建账号 · 全屏</title>
<style>
:root{
  --primary:#1677ff; --primary-light:#4096ff; --bg:#f5f7fa; --surface:#fff;
  --text:#1f2937; --muted:#6b7280; --border:#e5e7eb; --radius:14px; --danger:#ef4444;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;
  background:var(--surface);color:var(--text);
  min-height:100dvh; padding:0; -webkit-font-smoothing:antialiased;
}
.card{
  width:100%; min-height:100svh; background:var(--surface); border-radius:0; box-shadow:none;
  padding:calc(env(safe-area-inset-top) + 44px) 24px calc(env(safe-area-inset-bottom) + 44px);
  display:flex; flex-direction:column; justify-content:center; gap:4px;
}
.brand{display:flex;flex-direction:column;align-items:center;gap:8px;margin-bottom:28px;text-align:center}
.logo{
  width:56px;height:56px;border-radius:16px;background:linear-gradient(135deg,#1677ff,#4096ff);
  display:flex;align-items:center;justify-content:center;color:#fff;
  box-shadow:0 8px 18px rgba(22,119,255,.35)
}
.logo svg{width:30px;height:30px}
.brand h1{font-size:21px;font-weight:700;letter-spacing:.5px}
.brand p{font-size:13px;color:var(--muted)}
.field{position:relative;margin-bottom:6px}
.field input{
  width:100%;height:50px;padding:0 44px 0 44px;border:1.5px solid var(--border);
  border-radius:var(--radius);font-size:15px;background:#fafbfc;transition:.2s;outline:none;color:var(--text)
}
.field input:focus{border-color:var(--primary);background:#fff;box-shadow:0 0 0 3px rgba(22,119,255,.12)}
.field input.invalid{border-color:var(--danger);background:#fff5f5}
.field .ic{position:absolute;left:14px;top:25px;transform:translateY(-50%);color:var(--muted);width:20px;height:20px;pointer-events:none}
.toggle{position:absolute;right:10px;top:25px;transform:translateY(-50%);background:none;border:none;color:var(--muted);cursor:pointer;padding:8px;border-radius:8px}
.toggle:hover{color:var(--primary)}
.toggle svg{width:20px;height:20px;display:block}
.err{display:none;color:var(--danger);font-size:12px;margin:6px 2px 6px;line-height:1.4}
.hint{color:#9ca3af;font-size:11.5px;margin:2px 2px 8px;line-height:1.5}
.actions{display:flex;gap:12px;margin-top:18px}
.btn-ghost{
  flex:1;height:50px;border:1.5px solid var(--primary);color:var(--primary);
  background:#fff;border-radius:var(--radius);font-size:15px;font-weight:600;cursor:pointer;transition:.18s
}
.btn-ghost:active{background:rgba(22,119,255,.06)}
.btn-primary{
  flex:1;height:50px;border:none;border-radius:var(--radius);
  background:linear-gradient(135deg,#1677ff,#4096ff);color:#fff;font-size:16px;font-weight:600;
  cursor:pointer;transition:.18s;box-shadow:0 8px 18px rgba(22,119,255,.32)
}
.btn-primary:active{transform:translateY(1px);box-shadow:0 4px 12px rgba(22,119,255,.3)}
/* 去掉点击/触摸时的蓝色方形选中与高亮（保留键盘 Tab 焦点框） */
.btn-ghost,.btn-primary{-webkit-tap-highlight-color:transparent;-webkit-user-select:none;user-select:none}
.btn-ghost:active,.btn-ghost:focus:not(:focus-visible),.btn-primary:active,.btn-primary:focus:not(:focus-visible){outline:none}
.toast{
  position:fixed;left:50%;top:24px;transform:translateX(-50%) translateY(-20px);
  background:rgba(17,24,39,.92);color:#fff;padding:10px 18px;border-radius:10px;
  font-size:14px;z-index:999;opacity:0;transition:.25s;pointer-events:none;max-width:90vw;text-align:center
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
  <svg width="0" height="0" style="position:absolute" aria-hidden="true" xmlns="http://www.w3.org/2000/svg"><defs>
    <linearGradient id="appIconGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3B82F6"/><stop offset="100%" stop-color="#60A5FA"/>
    </linearGradient>
  </defs></svg>
  <form class="card" onsubmit="return false">
    <div class="brand">
      <div class="logo"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="8" y="2" width="8" height="4" rx="1"/><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/><path d="M9 14l2 2 4-4"/></svg></div>
      <h1>创建账号</h1>
    </div>
    <div class="field">
      <span class="ic"><svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><circle cx="12" cy="8" r="4" fill="url(#appIconGrad)" fill-opacity="0.25" stroke="url(#appIconGrad)" stroke-width="2"/><path d="M5 21 Q12 14 19 21" fill="none" stroke="url(#appIconGrad)" stroke-width="2" stroke-linecap="round"/></svg></span>
      <input type="text" id="account" placeholder="账号" autocomplete="username" maxlength="40">
      <p class="err" id="err-account"></p>
      <p class="hint">4-20 位：英文（大小写均可）、数字、符号 . _ - @；账号唯一且区分大小写</p>
    </div>
    <div class="field">
      <span class="ic"><svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><rect x="3" y="5" width="18" height="14" rx="2.5" fill="url(#appIconGrad)" fill-opacity="0.2" stroke="url(#appIconGrad)" stroke-width="2"/><circle cx="8" cy="10" r="3" fill="url(#appIconGrad)" fill-opacity="0.3" stroke="url(#appIconGrad)" stroke-width="1.5"/><line x1="13" y1="8.5" x2="19" y2="8.5" stroke="url(#appIconGrad)" stroke-width="1.8" stroke-linecap="round"/><line x1="13" y1="11.5" x2="17" y2="11.5" stroke="url(#appIconGrad)" stroke-width="1.8" stroke-linecap="round"/><line x1="5" y1="16.5" x2="19" y2="16.5" stroke="url(#appIconGrad)" stroke-width="1.2" stroke-linecap="round"/></svg></span>
      <input type="text" id="nickname" placeholder="昵称" autocomplete="nickname" maxlength="10">
      <p class="err" id="err-nickname"></p>
      <p class="hint">1-10 位：中英文、数字均可，账号昵称展示用</p>
    </div>
    <div class="field">
      <span class="ic"><svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M7 10 V8 A5 5 0 0 1 17 8 V10" fill="none" stroke="url(#appIconGrad)" stroke-width="2" stroke-linecap="round"/><rect x="5" y="10" width="14" height="10" rx="2" fill="url(#appIconGrad)" fill-opacity="0.2" stroke="url(#appIconGrad)" stroke-width="2"/><circle cx="12" cy="14" r="1.5" fill="url(#appIconGrad)" fill-opacity="0.6" stroke="none"/><rect x="11.5" y="14.5" width="1" height="2.5" rx="0.5" fill="url(#appIconGrad)" fill-opacity="0.6" stroke="none"/></svg></span>
      <input type="password" id="pw" placeholder="密码" autocomplete="new-password">
      <button type="button" class="toggle" onclick="togglePw(this)" aria-label="显示密码"><svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" fill="none" stroke="url(#appIconGrad)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><circle cx="12" cy="12" r="3" fill="url(#appIconGrad)" fill-opacity="0.3" stroke="url(#appIconGrad)" stroke-width="2"/></svg></button>
      <p class="err" id="err-pw"></p>
      <p class="hint">8-20 位，须同时包含：大写英文 + 小写英文 + 数字 + 符号（仅 @ . _ #），不含中文</p>
    </div>
    <div class="field">
      <span class="ic"><svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M7 10 V8 A5 5 0 0 1 17 8 V10" fill="none" stroke="url(#appIconGrad)" stroke-width="2" stroke-linecap="round"/><rect x="5" y="10" width="14" height="10" rx="2" fill="url(#appIconGrad)" fill-opacity="0.2" stroke="url(#appIconGrad)" stroke-width="2"/><circle cx="12" cy="14" r="1.5" fill="url(#appIconGrad)" fill-opacity="0.6" stroke="none"/><rect x="11.5" y="14.5" width="1" height="2.5" rx="0.5" fill="url(#appIconGrad)" fill-opacity="0.6" stroke="none"/></svg></span>
      <input type="password" id="pw2" placeholder="确认密码" autocomplete="new-password">
      <button type="button" class="toggle" onclick="togglePw(this)" aria-label="显示密码"><svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" fill="none" stroke="url(#appIconGrad)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><circle cx="12" cy="12" r="3" fill="url(#appIconGrad)" fill-opacity="0.3" stroke="url(#appIconGrad)" stroke-width="2"/></svg></button>
      <p class="err" id="err-pw2"></p>
    </div>
    <div class="field">
      <span class="ic"><svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><rect x="6" y="4" width="12" height="16" rx="2.5" fill="url(#appIconGrad)" fill-opacity="0.2" stroke="url(#appIconGrad)" stroke-width="2"/><circle cx="12" cy="18" r="1.2" fill="url(#appIconGrad)" fill-opacity="0.5" stroke="url(#appIconGrad)" stroke-width="1.2"/><line x1="10.5" y1="5.5" x2="13.5" y2="5.5" stroke="url(#appIconGrad)" stroke-width="1.5" stroke-linecap="round"/></svg></span>
      <input type="tel" id="phone" placeholder="手机号（选填）" autocomplete="tel" maxlength="20">
      <p class="err" id="err-phone"></p>
    </div>
    <div class="field">
      <span class="ic"><svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><rect x="3" y="6" width="18" height="12" rx="2" fill="url(#appIconGrad)" fill-opacity="0.2" stroke="url(#appIconGrad)" stroke-width="2"/><path d="M3 6 L12 12 L21 6" fill="none" stroke="url(#appIconGrad)" stroke-width="2" stroke-linejoin="round"/><line x1="3" y1="18" x2="21" y2="18" stroke="url(#appIconGrad)" stroke-width="2" stroke-linecap="round"/></svg></span>
      <input type="email" id="email" placeholder="邮箱" autocomplete="email" maxlength="60">
      <p class="err" id="err-email"></p>
    </div>
    <div class="actions">
      <button type="button" class="btn-ghost" onclick="location.href='classic.html'">取消</button>
      <button type="submit" class="btn-primary" onclick="submitRegister()">创 建</button>
    </div>
  </form>
  <script>
    // ===== 规则常量（集中定义，便于调整）=====
    var ACCOUNTS_KEY = 'rt_accounts';
    // 账号：英文(大小写)、数字、符号 . _ - @，4-20 位
    var RE_ACCOUNT    = /^[A-Za-z0-9._@-]{4,20}$/;
    // 密码字符集：仅英文(大小写)、数字、@ . _ #，不含中文，8-20 位
    var RE_PW_CHARSET = /^[A-Za-z0-9@._#]{8,20}$/;
    var RE_PW_UPPER   = /[A-Z]/;            // 至少 1 个大写英文
    var RE_PW_LOWER   = /[a-z]/;            // 至少 1 个小写英文
    var RE_PW_DIG     = /[0-9]/;            // 至少 1 个数字
    var RE_PW_SYM     = /[@._#]/;           // 至少 1 个符号（仅 @ . _ #）
    var RE_PHONE      = /^1[3-9]\d{9}$/;    // 中国大陆手机号
    var RE_EMAIL      = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

    function $(id){ return document.getElementById(id); }

    function setErr(id, msg){
      var el = $('err-' + id);
      if (el){ el.textContent = msg || ''; el.style.display = msg ? 'block' : 'none'; }
      var input = $(id);
      if (input){ input.classList.toggle('invalid', !!msg); }
    }
    function clearErr(id){ setErr(id, ''); }

    function loadAccounts(){
      try { return JSON.parse(localStorage.getItem(ACCOUNTS_KEY)) || []; }
      catch (e) { return []; }
    }
    function saveAccounts(arr){ localStorage.setItem(ACCOUNTS_KEY, JSON.stringify(arr)); }

    // 账号唯一性校验：区分大小写（"Alice" 与 "alice" 视为不同账号）
    function validateAccount(v){
      if (!v) return '请输入账号';
      if (!RE_ACCOUNT.test(v)) return '账号须 4-20 位，仅含英文、数字、. _ - @';
      if (loadAccounts().some(function(a){ return a.account === v; })) return '该账号已被注册';
      return '';
    }
    function validateNickname(v){
      if (!v) return '请输入昵称';
      return '';
    }
    function validatePassword(v){
      if (!v) return '请输入密码';
      if (v.length < 8 || v.length > 20) return '密码长度须 8-20 位';
      if (!RE_PW_CHARSET.test(v)) return '密码仅含英文(大小写)、数字、@ . _ #，不含中文';
      var miss = [];
      if (!RE_PW_UPPER.test(v)) miss.push('大写英文');
      if (!RE_PW_LOWER.test(v)) miss.push('小写英文');
      if (!RE_PW_DIG.test(v))   miss.push('数字');
      if (!RE_PW_SYM.test(v))   miss.push('符号(@._#)');
      if (miss.length) return '密码须同时包含：' + miss.join('、');
      return '';
    }
    function validateConfirm(v, pw){
      if (!v) return '请再次输入密码';
      if (v !== pw) return '两次输入的密码不一致';
      return '';
    }
    function validatePhone(v){
      if (!v) return '';   // 非必填：留空即通过
      if (!RE_PHONE.test(v)) return '手机号格式不正确（11 位，1 开头）';
      return '';
    }
    function validateEmail(v){
      if (!v) return '邮箱不能为空';
      if (!RE_EMAIL.test(v)) return '邮箱格式不正确';
      return '';
    }

    // 实时校验：输入即检查对应字段
    function bindLive(){
      $('account').addEventListener('input', function(){ setErr('account', validateAccount($('account').value.trim())); });
      $('nickname').addEventListener('input', function(){ clearErr('nickname'); });
      $('pw').addEventListener('input', function(){
        setErr('pw', validatePassword($('pw').value));
        if ($('pw2').value) setErr('pw2', validateConfirm($('pw2').value, $('pw').value));
      });
      $('pw2').addEventListener('input', function(){ setErr('pw2', validateConfirm($('pw2').value, $('pw').value)); });
      $('phone').addEventListener('input', function(){ setErr('phone', validatePhone($('phone').value.trim())); });
      $('email').addEventListener('input', function(){ setErr('email', validateEmail($('email').value.trim())); });
    }

    async function submitRegister(){
      var account  = $('account').value.trim();
      var nickname = $('nickname').value.trim();
      var pw       = $('pw').value;          // 密码不 trim（空白不在允许字符集内）
      var pw2      = $('pw2').value;
      var phone    = $('phone').value.trim();
      var email    = $('email').value.trim();

      var fields = ['account','nickname','pw','pw2','phone','email'];
      var validators = {
        account:  function(){ return validateAccount(account); },
        nickname: function(){ return validateNickname(nickname); },
        pw:       function(){ return validatePassword(pw); },
        pw2:      function(){ return validateConfirm(pw2, pw); },
        phone:    function(){ return validatePhone(phone); },
        email:    function(){ return validateEmail(email); }
      };
      var firstInvalid = null;
      fields.forEach(function(k){
        var msg = validators[k]();
        setErr(k, msg);
        if (msg && !firstInvalid) firstInvalid = k;
      });
      if (firstInvalid){ $(firstInvalid).focus(); return; }

      // 哈希密码后存储（需安全上下文 https / localhost）
      var pwdHash;
      try { pwdHash = await sha256(pw); }
      catch (e){
        setErr('pw', '当前环境不支持密码加密，请在 https 或 localhost 下使用');
        return;
      }
      var accounts = loadAccounts();
      accounts.push({ account: account, nickname: nickname, phone: phone, email: email, pwdHash: pwdHash, createdAt: Date.now() });
      saveAccounts(accounts);
      toast('注册成功，正在跳转到登录页…');
      setTimeout(function(){ location.href = 'classic.html'; }, 1500);
    }

    async function sha256(str){
      var buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
      return Array.prototype.map.call(new Uint8Array(buf), function(b){
        return ('0' + b.toString(16)).slice(-2);
      }).join('');
    }

    var toastTimer;
    function toast(msg){
      var t = $('toast');
      if (!t){ t = document.createElement('div'); t.id = 'toast'; t.className = 'toast'; document.body.appendChild(t); }
      t.textContent = msg; t.classList.add('show');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(function(){ t.classList.remove('show'); }, 2000);
    }

    function togglePw(btn){
      var f = btn.closest('.field');
      var i = f.querySelector('input');
      var open = i.type === 'text';
      i.type = open ? 'password' : 'text';
      btn.innerHTML = open
        ? '<svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" fill="none" stroke="url(#appIconGrad)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><circle cx="12" cy="12" r="3" fill="url(#appIconGrad)" fill-opacity="0.3" stroke="url(#appIconGrad)" stroke-width="2"/></svg>'
        : '<svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24" fill="none" stroke="url(#appIconGrad)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><line x1="1" y1="1" x2="23" y2="23" stroke="url(#appIconGrad)" stroke-width="2" stroke-linecap="round"/></svg>';
    }

    // 注册 Service Worker（作用域 /，与登录页一致）：发版后一次刷新即全站同步，无需逐个页面刷新
    if ('serviceWorker' in navigator) {
      fetch('../version.json?_t=' + Date.now(), { cache: 'no-store' })
        .then(function(r){ return r.json(); })
        .then(function(d){ if (d && d.version) navigator.serviceWorker.register('../sw.js?v=' + d.version); })
        .catch(function(){});
    }

    bindLive();
  </script>
</body>
</html>
