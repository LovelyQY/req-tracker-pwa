<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>创建账号 · 全屏</title>
<style>
:root{
  --primary:#1677ff; --primary-light:#4096ff; --bg:#f5f7fa; --surface:#fff;
  --text:#1f2937; --muted:#6b7280; --border:#e5e7eb; --radius:14px;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;
  background:var(--surface);color:var(--text);
  min-height:100dvh; padding:0; -webkit-font-smoothing:antialiased;
}
.card{
  width:100%; min-height:100svh; background:var(--surface); border-radius:0; box-shadow:none;
  padding:calc(env(safe-area-inset-top) + 44px) 24px calc(env(safe-area-inset-bottom) + 44px);
  display:flex; flex-direction:column; justify-content:center; gap:4px;
}
.brand{display:flex;flex-direction:column;align-items:center;gap:8px;margin-bottom:28px;text-align:center}
.logo{
  width:56px;height:56px;border-radius:16px;background:linear-gradient(135deg,#1677ff,#4096ff);
  display:flex;align-items:center;justify-content:center;color:#fff;
  box-shadow:0 8px 18px rgba(22,119,255,.35)
}
.logo svg{width:30px;height:30px}
.brand h1{font-size:21px;font-weight:700;letter-spacing:.5px}
.brand p{font-size:13px;color:var(--muted)}
.field{position:relative;margin-bottom:14px}
.field input{
  width:100%;height:50px;padding:0 44px 0 44px;border:1.5px solid var(--border);
  border-radius:var(--radius);font-size:15px;background:#fafbfc;transition:.2s;outline:none;color:var(--text)
}
.field input:focus{border-color:var(--primary);background:#fff;box-shadow:0 0 0 3px rgba(22,119,255,.12)}
.field .ic{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--muted);width:20px;height:20px;pointer-events:none}
.toggle{position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--muted);cursor:pointer;padding:8px;border-radius:8px}
.toggle:hover{color:var(--primary)}
.toggle svg{width:20px;height:20px;display:block}
.actions{display:flex;gap:12px;margin-top:22px}
.btn-ghost{
  flex:1;height:50px;border:1.5px solid var(--primary);color:var(--primary);
  background:#fff;border-radius:var(--radius);font-size:15px;font-weight:600;cursor:pointer;transition:.18s
}
.btn-ghost:active{background:rgba(22,119,255,.06)}
.btn-primary{
  flex:1.4;height:50px;border:none;border-radius:var(--radius);
  background:linear-gradient(135deg,#1677ff,#4096ff);color:#fff;font-size:16px;font-weight:600;
  cursor:pointer;transition:.18s;box-shadow:0 8px 18px rgba(22,119,255,.32)
}
.btn-primary:active{transform:translateY(1px);box-shadow:0 4px 12px rgba(22,119,255,.3)}
</style>
</head>
<body>
  <form class="card" onsubmit="return false">
    <div class="brand">
      <div class="logo"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="8" y="2" width="8" height="4" rx="1"/><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/><path d="M9 14l2 2 4-4"/></svg></div>
      <h1>创建账号</h1>
      <p>注册新账号以同步你的需求与任务</p>
    </div>
    <div class="field">
      <span class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></span>
      <input type="text" placeholder="账号" autocomplete="username">
    </div>
    <div class="field">
      <span class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="5" width="18" height="14" rx="2"/><circle cx="8" cy="10" r="2"/><path d="M13 8h4M13 12h4"/></svg></span>
      <input type="text" placeholder="昵称" autocomplete="nickname">
    </div>
    <div class="field">
      <span class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg></span>
      <input type="password" id="pw" placeholder="密码" autocomplete="new-password">
      <button type="button" class="toggle" onclick="togglePw(this)" aria-label="显示密码"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg></button>
    </div>
    <div class="field">
      <span class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg></span>
      <input type="password" placeholder="确认密码" autocomplete="new-password">
      <button type="button" class="toggle" onclick="togglePw(this)" aria-label="显示密码"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg></button>
    </div>
    <div class="field">
      <span class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="6" y="2" width="12" height="20" rx="2"/><line x1="12" y1="18" x2="12" y2="18"/></svg></span>
      <input type="tel" placeholder="手机号" autocomplete="tel">
    </div>
    <div class="field">
      <span class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="M2 7l10 6 10-6"/></svg></span>
      <input type="email" placeholder="邮箱" autocomplete="email">
    </div>
    <div class="actions">
      <button type="button" class="btn-ghost" onclick="alert('取消创建')">取消</button>
      <button type="submit" class="btn-primary" onclick="alert('创建账号（演示）')">创 建</button>
    </div>
  </form>
  <script>
    function togglePw(btn){
      var f=btn.closest('.field');var i=f.querySelector('input');var open=i.type==='text';i.type=open?'password':'text';
      btn.innerHTML=open
        ? '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>'
        : '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>';
    }
  </script>
</body>
</html>
