<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>登录 · 经典卡片</title>
<style>
:root{
  --primary:#1677ff; --primary-light:#4096ff; --bg:#f5f7fa; --surface:#fff;
  --text:#1f2937; --muted:#6b7280; --border:#e5e7eb; --radius:14px; --danger:#ef4444;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;
  background:linear-gradient(160deg,#eaf2ff 0%,#f5f7fa 55%);
  color:var(--text); display:flex; align-items:center; justify-content:center;
  min-height:100dvh; padding:0; -webkit-font-smoothing:antialiased;
}
.card{
  width:100%; min-height:100svh; background:var(--surface); border-radius:0; box-shadow:none;
  padding:calc(env(safe-area-inset-top) + 48px) 24px calc(env(safe-area-inset-bottom) + 48px);
  display:flex; flex-direction:column; justify-content:center; gap:4px;
}
.brand{display:flex;flex-direction:column;align-items:center;gap:10px;margin-bottom:56px}
.logo{
  width:58px;height:58px;border-radius:16px;background:linear-gradient(135deg,#1677ff,#4096ff);
  display:flex;align-items:center;justify-content:center;color:#fff;
  box-shadow:0 8px 18px rgba(22,119,255,.35)
}
.logo svg{width:30px;height:30px}
.brand h1{font-size:20px;font-weight:700;letter-spacing:.5px}
.brand p{font-size:13px;color:var(--muted)}
.field{position:relative;margin-bottom:6px}
.field input{
  width:100%;height:50px;padding:0 44px 0 44px;border:1.5px solid var(--border);
  border-radius:var(--radius);font-size:15px;background:#fafbfc;transition:.2s;outline:none;color:var(--text)
}
.field input:focus{border-color:var(--primary);background:#fff;box-shadow:0 0 0 3px rgba(22,119,255,.12)}
.field input.invalid{border-color:var(--danger);background:#fff5f5}
.field .ic{position:absolute;left:14px;top:25px;transform:translateY(-50%);color:var(--muted);width:20px;height:20px;pointer-events:none}
.toggle{position:absolute;right:10px;top:25px;transform:translateY(-50%);background:none;border:none;color:var(--muted);cursor:pointer;padding:8px;border-radius:8px}
.toggle:hover{color:var(--primary)}
.toggle svg{width:20px;height:20px;display:block}
.err{display:none;color:var(--danger);font-size:12px;margin:6px 2px 14px;line-height:1.4}
.opt{display:flex;align-items:center;gap:8px;margin:8px 2px 28px;font-size:13px;color:var(--muted)}
.opt-group{display:flex;flex-wrap:wrap;align-items:center;justify-content:center;gap:14px;margin:8px 2px 28px;font-size:13px;color:var(--muted)}
.opt-group>span{color:var(--muted)}
.opt-item{display:flex;align-items:center;gap:6px;font-size:13px;color:var(--muted);cursor:pointer}
.opt-item input{width:16px;height:16px;accent-color:var(--primary)}
.opt input{width:16px;height:16px;accent-color:var(--primary)}
.btn-primary{
  width:100%;height:50px;border:none;border-radius:var(--radius);
  background:linear-gradient(135deg,#1677ff,#4096ff);color:#fff;font-size:16px;font-weight:600;
  cursor:pointer;transition:.18s;box-shadow:0 8px 18px rgba(22,119,255,.32)
}
.btn-primary:active{transform:translateY(1px);box-shadow:0 4px 12px rgba(22,119,255,.3)}
.row{display:flex;justify-content:space-evenly;align-items:center;gap:12px;margin-top:32px}
.link{background:none;border:none;color:var(--primary);font-size:14px;cursor:pointer;padding:4px 2px;border-radius:6px;text-decoration:none}
.link:hover{text-decoration:none}
/* 去掉点击/触摸时的蓝色方形选中与高亮（保留键盘 Tab 焦点框） */
.link,.btn-primary{-webkit-tap-highlight-color:transparent;-webkit-user-select:none;user-select:none}
.link:active,.link:focus:not(:focus-visible),.btn-primary:active,.btn-primary:focus:not(:focus-visible){outline:none}
.hint{text-align:center;font-size:12px;color:#9ca3af;margin-top:18px}
.ver-tag{position:fixed;right:10px;bottom:8px;font-size:11px;color:#9ca3af;letter-spacing:.3px;user-select:none}
</style>
<script src="../auth.js?v=1.2.64"></script>
<script src="../db.js?v=1.2.64"></script>
<script src="../users.js?v=1.2.64"></script>
</head>
<body>
  <svg width="0" height="0" style="position:absolute" aria-hidden="true" xmlns="http://www.w3.org/2000/svg"><defs>
    <linearGradient id="appIconGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3B82F6"/><stop offset="100%" stop-color="#60A5FA"/>
    </linearGradient>
  </defs></svg>
  <form class="card" onsubmit="return false">
    <div class="brand">
      <div class="logo"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="8" y="2" width="8" height="4" rx="1"/><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/><path d="M9 14l2 2 4-4"/></svg></div>
      <h1>需求任务追踪</h1>
    </div>
    <div class="field">
      <span class="ic"><svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><circle cx="12" cy="8" r="4" fill="url(#appIconGrad)" fill-opacity="0.25" stroke="url(#appIconGrad)" stroke-width="2"/><path d="M5 21 Q12 14 19 21" fill="none" stroke="url(#appIconGrad)" stroke-width="2" stroke-linecap="round"/></svg></span>
      <input type="text" id="account" placeholder="账号 / 工号" autocomplete="username" maxlength="40">
    </div>
    <div class="field">
      <span class="ic"><svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M7 10 V8 A5 5 0 0 1 17 8 V10" fill="none" stroke="url(#appIconGrad)" stroke-width="2" stroke-linecap="round"/><rect x="5" y="10" width="14" height="10" rx="2" fill="url(#appIconGrad)" fill-opacity="0.2" stroke="url(#appIconGrad)" stroke-width="2"/><circle cx="12" cy="14" r="1.5" fill="url(#appIconGrad)" fill-opacity="0.6" stroke="none"/><rect x="11.5" y="14.5" width="1" height="2.5" rx="0.5" fill="url(#appIconGrad)" fill-opacity="0.6" stroke="none"/></svg></span>
      <input type="password" id="pw" placeholder="密码" autocomplete="current-password">
      <button type="button" class="toggle" onclick="togglePw(this)" aria-label="显示密码"><svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" fill="none" stroke="url(#appIconGrad)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><circle cx="12" cy="12" r="3" fill="url(#appIconGrad)" fill-opacity="0.3" stroke="url(#appIconGrad)" stroke-width="2"/></svg></button>
      <p class="err" id="err-login"></p>
    </div>
    <div class="opt-group">
      <span>免登时限：</span>
      <label class="opt-item"><input type="radio" name="sess" value="1" checked> 24 小时</label>
      <label class="opt-item"><input type="radio" name="sess" value="7"> 7 天</label>
      <label class="opt-item"><input type="radio" name="sess" value="30"> 30 天</label>
    </div>
    <div class="opt">
      <input type="checkbox" id="remember" checked>
      <label for="remember">记住登录（关闭浏览器仍保持登录，到期自动退出）</label>
    </div>
    <button class="btn-primary" type="submit" onclick="doLogin()">登 录</button>
    <div class="row">
      <button type="button" class="link" onclick="alert('重置密码功能开发中')">重置密码</button>
      <button type="button" class="link" onclick="location.href='register.html'">创建账号</button>
    </div>
  </form>
  <div class="ver-tag" id="ver-tag">v…</div>
  <script>
    var ACCOUNTS_KEY = 'rt_accounts';
    var EYE_OPEN = '<svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" fill="none" stroke="url(#appIconGrad)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><circle cx="12" cy="12" r="3" fill="url(#appIconGrad)" fill-opacity="0.3" stroke="url(#appIconGrad)" stroke-width="2"/></svg>';
    var EYE_OFF  = '<svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24" fill="none" stroke="url(#appIconGrad)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><line x1="1" y1="1" x2="23" y2="23" stroke="url(#appIconGrad)" stroke-width="2" stroke-linecap="round"/></svg>';

    function $(id){ return document.getElementById(id); }
    function setErr(msg){
      var el = $('err-login');
      if (el){ el.textContent = msg || ''; el.style.display = msg ? 'block' : 'none'; }
      var pw = $('pw'); if (pw) pw.classList.toggle('invalid', !!msg);
      var acc = $('account'); if (acc) acc.classList.toggle('invalid', !!msg);
    }

    async function sha256(str){
      var buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
      return Array.prototype.map.call(new Uint8Array(buf), function(b){ return ('0' + b.toString(16)).slice(-2); }).join('');
    }

    async function doLogin(){
      var account = $('account').value.trim();
      var pw = $('pw').value;
      if (!account || !pw){ setErr('请输入账号/工号 和 密码'); return; }
      setErr('');

      var hash;
      try { hash = await sha256(pw); }
      catch (e){ setErr('当前环境不支持密码校验，请在 https 或 localhost 下使用'); return; }

      // 解析登录标识对应的真实账号：人员表优先（账号 或 工号），回退 legacy rt_accounts
      var resolved = await resolveAccount(account, hash);
      if (!resolved){ setErr('账号/工号不存在，请先创建账号'); return; }
      if (resolved.error === 'pw'){ setErr('密码错误'); return; }

      // 确保人员表存在对应记录（legacy 账号首次登录时补齐），便于「个人信息」页统一读写
      try { if (typeof RT_USERS !== 'undefined' && RT_USERS.ensurePerson) await RT_USERS.ensurePerson(resolved.account); }
      catch (e) {}

      // 登录成功：按所选时长 + 「记住登录」写入带过期时间的会话
      // remember=true → localStorage（关闭浏览器仍保留）；否则 sessionStorage（关闭即清除）
      // 过期后闸门清除并跳登录页；手动退出登录由 auth.js 的 logout() 立即清除。
      var durInput = document.querySelector('input[name="sess"]:checked');
      var days = durInput ? parseInt(durInput.value, 10) : 1;
      var remember = true;
      var remEl = document.getElementById('remember');
      if (remEl) remember = remEl.checked;
      setSession(resolved.account, remember, days);

      location.href = '../index.html';
    }

    // 依次尝试：人员表（按账号 / 按工号）→ legacy rt_accounts（按账号）
    // 返回 { account } 表示命中且密码正确；{ error:'pw' } 表示命中但密码错误；null 表示均未命中
    async function resolveAccount(account, hash){
      try {
        if (typeof RT_USERS !== 'undefined') {
          var byAcc = await RT_USERS.getUserByAccount(account);
          if (byAcc) return (byAcc.password === hash) ? { account: byAcc.account } : { error: 'pw' };
          var byEmp = await RT_USERS.getUserByEmployeeNo(account);
          if (byEmp) return (byEmp.password === hash) ? { account: byEmp.account } : { error: 'pw' };
        }
      } catch (e) {}
      var accounts;
      try { accounts = JSON.parse(localStorage.getItem(ACCOUNTS_KEY)) || []; }
      catch (e) { accounts = []; }
      var rec = accounts.find(function(a){ return a.account === account; });
      if (rec) return (rec.pwdHash === hash) ? { account: rec.account } : { error: 'pw' };
      return null;
    }

    // 输入即清除错误提示
    ['account','pw'].forEach(function(id){
      var el = $(id);
      if (el) el.addEventListener('input', function(){ setErr(''); });
    });

    function togglePw(btn){
      var i = document.getElementById('pw');
      var open = i.type === 'text';
      i.type = open ? 'password' : 'text';
      btn.innerHTML = open ? EYE_OPEN : EYE_OFF;
    }

    // 右下角显示版本号（取自 version.json，随发版自动更新）
    // 加 ?_t= 时间戳 + no-store：绕过 SW 对 version.json 的 stale-while-revalidate 缓存，
    // 否则版本号会卡在旧值、与页面（HTML 走 network-first）不同步。
    fetch('../version.json?_t=' + Date.now(), { cache: 'no-store' }).then(function(r){ return r.json(); }).then(function(d){
      var el = document.getElementById('ver-tag');
      if (el && d && d.version) el.textContent = 'v' + d.version;
      // 注册 Service Worker（作用域 /，覆盖登录/注册/主页）。
      // 注册后 SW 立即接管本页，使所有页面导航都走 SW 的 no-store 拉取，
      // 发版后只需刷新一次登录页即可全站同步，无需逐个页面刷新。
      if ('serviceWorker' in navigator && d && d.version) {
        navigator.serviceWorker.register('../sw.js?v=' + d.version).catch(function(){});
      }
    }).catch(function(){});
  </script>
</body>
</html>
