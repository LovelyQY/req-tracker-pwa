<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>登录 · 侧边品牌栏</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;
  min-height:100dvh;display:flex;color:#1f2937;-webkit-font-smoothing:antialiased
}
.panel{
  flex:0 0 42%;max-width:460px;background:linear-gradient(150deg,#0b5cff,#1677ff 60%,#4096ff);
  color:#fff;padding:48px 40px;display:flex;flex-direction:column;justify-content:space-between
}
.panel .brand{display:flex;align-items:center;gap:14px}
.logo{width:52px;height:52px;border-radius:14px;background:rgba(255,255,255,.2);display:flex;align-items:center;justify-content:center;border:1px solid rgba(255,255,255,.35)}
.logo svg{width:28px;height:28px}
.panel h1{font-size:20px;font-weight:700}
.panel .hero{margin:auto 0}
.panel .hero h2{font-size:30px;line-height:1.3;font-weight:800;margin-bottom:14px}
.panel .hero p{font-size:15px;color:rgba(255,255,255,.85);line-height:1.7;max-width:340px}
.panel .foot{font-size:13px;color:rgba(255,255,255,.7)}
.form{flex:1;display:flex;align-items:center;justify-content:center;background:#f5f7fa;padding:32px}
.box{width:100%;max-width:360px}
.box .welcome{margin-bottom:26px}
.box .welcome h3{font-size:24px;font-weight:700;margin-bottom:6px}
.box .welcome p{font-size:14px;color:#6b7280}
.field{position:relative;margin-bottom:15px}
.field input{
  width:100%;height:50px;padding:0 44px;font-size:15px;color:#1f2937;
  border:1.5px solid #e5e7eb;border-radius:12px;background:#fff;outline:none;transition:.2s
}
.field input:focus{border-color:#1677ff;box-shadow:0 0 0 3px rgba(22,119,255,.12)}
.field .ic{position:absolute;left:14px;top:50%;transform:translateY(-50%);width:20px;height:20px;color:#9ca3af;pointer-events:none}
.toggle{position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;color:#9ca3af;cursor:pointer;padding:8px;border-radius:8px}
.toggle:hover{color:#1677ff}
.toggle svg{width:20px;height:20px;display:block}
.btn-primary{
  width:100%;height:50px;margin-top:8px;border:none;border-radius:12px;cursor:pointer;
  background:linear-gradient(135deg,#1677ff,#4096ff);color:#fff;font-size:16px;font-weight:600;
  box-shadow:0 8px 18px rgba(22,119,255,.3);transition:.18s
}
.btn-primary:active{transform:translateY(1px)}
.row{display:flex;justify-content:space-between;margin-top:18px}
.link{background:none;border:none;color:#1677ff;font-size:14px;cursor:pointer;padding:4px;border-radius:6px}
.link:hover{text-decoration:underline}
.btn-ghost{width:100%;height:46px;margin-top:14px;border:1.5px solid #1677ff;color:#1677ff;background:#fff;border-radius:12px;font-size:15px;font-weight:600;cursor:pointer;transition:.18s}
.btn-ghost:hover{background:rgba(22,119,255,.06)}
.hint{text-align:center;font-size:12px;color:#9ca3af;margin-top:18px}
@media(max-width:760px){
  body{flex-direction:column}
  .panel{flex:none;max-width:none;padding:30px 24px}
  .panel .hero{display:none}
  .form{padding:28px 22px}
}
.divider{display:flex;align-items:center;gap:12px;margin:22px 0 16px;font-size:13px;color:#6b7280}
.divider::before,.divider::after{content:"";flex:1;height:1px;background:#e5e7eb}
.social{display:flex;justify-content:center;gap:18px}
.social-btn{width:50px;height:50px;border-radius:50%;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:transform .18s,box-shadow .18s}
.social-btn:hover{transform:translateY(-2px);box-shadow:0 8px 18px rgba(0,0,0,.16)}
.social-btn:active{transform:translateY(0)}
.social-btn svg{width:26px;height:26px;display:block}
.wx{background:#07C160;color:#fff}
.apple{background:#111;color:#fff}
.google{background:#fff;color:#4285F4;border:1px solid #e5e7eb}
</style>
</head>
<body>
  <aside class="panel">
    <div class="brand">
      <div class="logo"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="8" y="2" width="8" height="4" rx="1"/><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/><path d="M9 14l2 2 4-4"/></svg></div>
      <h1>需求任务追踪</h1>
    </div>
    <div class="hero">
      <h2>把需求<br>装进口袋</h2>
      <p>移动端需求 / 任务跟踪，支持离线使用与本地持久化，让团队的每一环进展都清晰可见。</p>
    </div>
    <div class="foot">© 2026 需求任务追踪 PWA</div>
  </aside>
  <main class="form">
    <form class="box" onsubmit="return false">
      <div class="welcome">
        <h3>欢迎回来</h3>
        <p>请登录你的账号以继续</p>
      </div>
      <div class="field">
        <span class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></span>
        <input type="text" placeholder="登录名 / 手机号" autocomplete="username">
      </div>
      <div class="field">
        <span class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg></span>
        <input type="password" id="pw" placeholder="密码" autocomplete="current-password">
        <button type="button" class="toggle" onclick="togglePw(this)" aria-label="显示密码"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg></button>
      </div>
      <button class="btn-primary" type="submit">登 录</button>
      <div class="row">
        <button type="button" class="link" onclick="alert('跳转：重置密码')">重置密码</button>
        <button type="button" class="link" onclick="alert('跳转：创建账号')">创建账号</button>
      </div>
      <button type="button" class="btn-ghost" onclick="alert('跳转：注册新账号')">还没有账号？创建账号</button>
      <div class="divider"><span>其他登录方式</span></div>
      <div class="social">
        <button type="button" class="social-btn wx" onclick="alert('微信登录（演示）')" aria-label="微信登录" title="微信登录">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M9.5 3C5.36 3 2 5.85 2 9.3c0 1.95 1.1 3.67 2.82 4.78L3.5 16.5l3.1-1.55c.83.23 1.72.35 2.65.35.16 0 .32-.01.48-.02-.47-1.2-.73-2.5-.73-3.86 0-3.42 3.13-6.12 6.98-6.12.1 0 .2 0 .3.01C15.9 4.86 12.96 3 9.5 3z"/><path d="M22 13.4c0-2.76-2.7-5-6.02-5S9.96 10.64 9.96 13.4s2.7 5 6.02 5c.6 0 1.18-.07 1.72-.2L21.5 19.5l-.66-2.35c1.07-.82 1.16-2.06 1.16-3.75z"/></svg>
        </button>
        <button type="button" class="social-btn apple" onclick="alert('Apple 登录（演示）')" aria-label="Apple 登录" title="Apple 登录">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M16.365 1.43c0 1.14-.493 2.27-1.177 3.08-.744.9-1.99 1.57-2.987 1.52-.12-1.1.44-2.27 1.177-2.98.744-.84 2.076-1.46 2.987-1.62zM21.05 17.32c-.53 1.22-.78 1.76-1.46 2.84-.99 1.55-2.39 3.49-4.12 3.5-1.54.02-1.97-1.01-4.08-1-2.12.02-2.56 1.03-4.1 1.02-1.73-.02-3.05-1.78-4.04-3.32C.76 16.7.1 12.7 1.85 10.2c.93-1.34 2.43-2.19 3.94-2.2 1.5-.02 2.42 1 3.65 1 1.21 0 1.95-1 3.7-1 1.32 0 2.72.72 3.72 1.96-3.27 1.79-2.74 6.45.19 7.36z"/></svg>
        </button>
        <button type="button" class="social-btn google" onclick="alert('Google 登录（演示）')" aria-label="Google 登录" title="Google 登录">
          <svg viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
        </button>
      </div>
      <p class="hint">演示 UI · 侧边品牌栏样式</p>
    </form>
  </main>
  <script>
    function togglePw(btn){
      var i=document.getElementById('pw');var open=i.type==='text';i.type=open?'password':'text';
      btn.innerHTML=open
        ? '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>'
        : '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>';
    }
  </script>
</body>
</html>
