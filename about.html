<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>关于</title>
<style>
:root{
  --primary:#1677ff; --primary-light:#4096ff; --bg:#f5f7fa; --surface:#fff;
  --text:#1f2937; --muted:#6b7280; --border:#e5e7eb; --radius:14px; --danger:#ef4444;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;
  background:var(--bg);color:var(--text);min-height:100dvh;padding:0;-webkit-font-smoothing:antialiased;
}

/* 顶部导航（与基础数据页一致） */
.nav-bar{
  position:sticky;top:0;z-index:10;display:flex;align-items:center;height:52px;padding:0 8px;
  background:rgba(255,255,255,.92);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  border-bottom:1px solid var(--border);padding-top:calc(env(safe-area-inset-top) + 8px)}
.nav-back{width:40px;height:40px;border:none;background:none;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text)}
.nav-back svg{width:22px;height:22px}
.nav-title{font-size:17px;font-weight:700;text-align:center;position:absolute;left:0;right:0;pointer-events:none}

.wrap{max-width:560px;margin:0 auto;padding:16px 14px calc(env(safe-area-inset-bottom) + 40px)}

/* 关于卡片（复用 settings.css 样式） */
.settings-section{background:var(--surface);border-radius:var(--radius);padding:18px 16px;margin-bottom:14px;box-shadow:0 1px 3px rgba(0,0,0,.05)}
.settings-section h3{display:flex;align-items:center;gap:8px;font-size:16px;font-weight:700;margin-bottom:12px}
.icon-col{flex-shrink:0;width:24px;height:24px;display:flex;align-items:center;justify-content:center}
.settings-list{border-top:1px solid var(--border)}
.settings-item{display:flex;align-items:center;justify-content:space-between;padding:13px 2px;border-bottom:1px solid var(--border);font-size:14px}
.settings-item:last-child{border-bottom:none}
.settings-item span:first-child{color:var(--muted)}
.settings-item span:last-child{font-weight:600}
.settings-item--link{cursor:pointer}
.settings-item--link:active{background:#f1f5f9}
.settings-item--link .chevron{color:var(--muted);font-size:18px;line-height:1}
.version-note{background:#f8fafc;border:1px solid var(--border);border-radius:10px;padding:10px 12px;font-size:13px;line-height:1.6;color:#334155;white-space:pre-wrap;word-break:break-word;margin-bottom:10px}
.backup-actions{display:flex;flex-direction:column;gap:10px;margin-top:6px}
.btn{display:flex;align-items:center;justify-content:center;gap:8px;height:46px;border-radius:12px;font-size:15px;font-weight:600;cursor:pointer;border:none}
.btn.light{background:#eef4ff;color:var(--primary)}
.btn.danger{background:#fff1f0;color:var(--danger);border:1px solid #ffccc7}
.btn.primary{background:linear-gradient(135deg,#1677ff,#4096ff);color:#fff;box-shadow:0 8px 18px rgba(22,119,255,.32)}
.btn:active{transform:translateY(1px)}
.backup-tip{font-size:12px;color:var(--muted);line-height:1.6}

/* 更新日志面板 */
.clog-card{background:var(--surface);border-radius:var(--radius);overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.05);display:none}
.clog-card.show{display:block}
.clog-head{display:flex;align-items:center;gap:8px;padding:14px 16px;border-bottom:1px solid var(--border);font-size:15px;font-weight:700}
.clog-head .clog-close{margin-left:auto;color:var(--muted);font-size:20px;line-height:1;cursor:pointer}
.clog-body{max-height:60vh;overflow-y:auto;padding:4px 16px;overscroll-behavior:contain;-webkit-overflow-scrolling:touch}
.changelog-item{padding:12px 0;border-bottom:1px solid #f1f5f9}
.changelog-item:last-child{border-bottom:none}
.changelog-top{display:flex;align-items:center;gap:8px;margin-bottom:4px}
.changelog-ver{font-size:12px;font-weight:600;color:#fff;background:var(--primary);padding:2px 8px;border-radius:999px}
.changelog-date{font-size:12px;color:var(--muted)}
.changelog-msg{font-size:14px;line-height:1.5;color:#334155;white-space:pre-wrap;word-break:break-word}
.changelog-empty,.changelog-loading{text-align:center;color:var(--muted);font-size:13px;padding:28px 0}
</style>
<script src="auth.js?v=1.2.48"></script>
<script>
  // 登录闸门：无效会话跳转登录页
  (function () {
    try { if (!getSessionAccount()) location.replace('login/classic.html'); }
    catch (e) { location.replace('login/classic.html'); }
  })();
</script>
</head>
<body>

  <div class="nav-bar">
    <button class="nav-back" onclick="location.href='index.html'" aria-label="返回">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
    </button>
    <span class="nav-title">关于</span>
  </div>

  <div class="wrap">
    <!-- 关于卡片（原设置页「关于」卡片内容，已迁移至此独立页面） -->
    <div class="settings-section">
      <h3><span class="icon-col"><svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="var(--primary)" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4M12 8h.01"/></svg></span> 关于</h3>
      <div class="settings-list">
        <div class="settings-item">
          <span>当前版本</span>
          <span id="app-version">—</span>
        </div>
        <div class="settings-item">
          <span>更新时间</span>
          <span id="app-updated-at">—</span>
        </div>
        <div class="version-note" id="version-note"></div>
        <div class="settings-item settings-item--link" id="open-changelog">
          <span>更新日志</span>
          <span class="chevron">›</span>
        </div>
      </div>
      <div class="backup-actions">
        <button class="btn light" id="btn-check-update" type="button">检查更新</button>
        <button class="btn danger" id="btn-force-update" type="button">强制更新</button>
        <button class="btn primary" id="btn-install-app" type="button">安装到主屏</button>
      </div>
      <p class="backup-tip" id="update-status" style="margin-top:10px;"></p>
    </div>

    <!-- 更新日志面板（内联展示，与原设置页同一数据源 CHANGELOG.md） -->
    <div class="clog-card" id="clog-card">
      <div class="clog-head">更新日志<span class="clog-close" id="clog-close">✕</span></div>
      <div class="clog-body" id="changelog-list"></div>
    </div>
  </div>

  <script>
    // ---- 版本信息（从同源 version.json 读取，离线经 SW 缓存可用）----
    var APP_VERSION = '';
    var APP_RELEASE_TIME = '';
    var swPendingReload = false;

    function $(id){ return document.getElementById(id); }
    function escapeHtml(s){
      return String(s == null ? '' : s).replace(/[&<>"']/g, function(c){
        return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];
      });
    }
    function formatReleaseTime(iso){
      var d = new Date(iso);
      if (isNaN(d.getTime())) return null;
      var p = function(n){ return String(n).padStart(2,'0'); };
      return d.getFullYear() + '-' + p(d.getMonth()+1) + '-' + p(d.getDate())
        + ' ' + p(d.getHours()) + ':' + p(d.getMinutes());
    }
    function swVerFromUrl(url){
      var m = String(url || '').match(/sw\.js\?v=(\d+\.\d+\.\d+)/);
      return m ? m[1] : null;
    }
    function compareVersion(a, b){
      var pa = String(a).split('.').map(Number), pb = String(b).split('.').map(Number);
      for (var i=0;i<3;i++){ var x=pa[i]||0, y=pb[i]||0; if (x!==y) return x-y; }
      return 0;
    }
    // 解析本地 CHANGELOG.md（与 index.html 同源同一套规则）
    function parseChangelogMd(text){
      var items = [], cur = null;
      var headerRe = /^##\s+v(\d+\.\d+\.\d+)\s*\(([^)]*)\)/;
      String(text).split('\n').forEach(function(line){
        var m = line.match(headerRe);
        if (m){ if (cur) items.push(cur); cur = { version: m[1], date: m[2], message: '' }; }
        else if (cur && line.trim() !== '') { cur.message += (cur.message ? '\n' : '') + line.trim(); }
      });
      if (cur) items.push(cur);
      return items;
    }
    // 统一在条目底部补一行「同步升级到 vX.Y.Z」
    function withSyncLine(msg, version){
      if (!version) return msg;
      var kept = String(msg || '').split('\n').filter(function(raw){
        var t = raw.trim();
        if (!t) return true;
        if (/^-?\s*同步升级到 v\d+\.\d+\.\d+\s*$/.test(t)) return false;
        if (/^v\d+\.\d+\.\d+\s*$/.test(t)) return false;
        return true;
      });
      kept.push('- 同步升级到 v' + version);
      return kept.join('\n');
    }
    function updateVersionNote(){
      var noteEl = $('version-note');
      if (!noteEl) return;
      var all = window.__changelogAll || [];
      var current = all.filter(function(it){ return it.version === APP_VERSION; })[0];
      noteEl.textContent = withSyncLine(current ? current.message : '', APP_VERSION);
    }
    async function loadLocalChangelog(){
      var ctrl = new AbortController();
      var timer = setTimeout(function(){ ctrl.abort(); }, 5000);
      try {
        var res = await fetch('CHANGELOG.md?_t=' + Date.now(), { cache: 'no-store', signal: ctrl.signal });
        if (!res.ok) throw new Error('changelog not found');
        window.__changelogAll = parseChangelogMd(await res.text());
      } finally { clearTimeout(timer); }
    }
    function renderChangelog(list){
      var box = $('changelog-list');
      if (!box) return;
      if (!list || !list.length){ box.innerHTML = '<div class="changelog-empty">暂无更新日志</div>'; return; }
      box.innerHTML = list.map(function(it){
        var msg = withSyncLine(it.message, it.version);
        return '<div class="changelog-item"><div class="changelog-top">'
          + (it.version ? '<span class="changelog-ver">v' + escapeHtml(it.version) + '</span>' : '')
          + '<span class="changelog-date">' + escapeHtml(it.date) + '</span></div>'
          + '<div class="changelog-msg">' + escapeHtml(msg) + '</div></div>';
      }).join('');
    }
    async function openChangelog(){
      var card = $('clog-card');
      if (card) card.classList.add('show');
      var box = $('changelog-list');
      if (box) box.innerHTML = '<div class="changelog-loading">加载中…</div>';
      try {
        if (!window.__changelogAll) await loadLocalChangelog();
        renderChangelog(window.__changelogAll || []);
        updateVersionNote();
      } catch (e) {
        // 离线/读取失败：至少保证当前版本有记录
        if (!window.__changelogAll) window.__changelogAll = [];
        if (!window.__changelogAll.some(function(it){ return it.version === APP_VERSION; }))
          window.__changelogAll.unshift({ version: APP_VERSION, date: APP_RELEASE_TIME, message: '发布 v' + APP_VERSION });
        renderChangelog(window.__changelogAll);
        updateVersionNote();
      }
    }

    // ---- 更新检测 / 强制刷新 ----
    function refreshReleaseTime(){
      var el = $('app-updated-at');
      fetch('https://api.github.com/repos/LovelyQY/req-tracker-pwa/commits/main', { cache: 'no-store' })
        .then(function(r){ return r.ok ? r.json() : null; })
        .then(function(data){
          var iso = data && data.commit && data.commit.committer && data.commit.committer.date;
          var t = iso ? formatReleaseTime(iso) : null;
          if (t && el) el.textContent = t;
        }).catch(function(){});
    }
    function activateWaiting(registration){
      var waiting = registration.waiting;
      if (waiting){ swPendingReload = true; waiting.postMessage('SKIP_WAITING'); }
      else location.reload();
    }
    function checkUpdate(){
      var status = $('update-status');
      if (!('serviceWorker' in navigator)){ if (status) status.textContent = '当前环境不支持更新检查'; return; }
      if (status) status.textContent = '正在检查更新…';
      refreshReleaseTime();
      navigator.serviceWorker.getRegistration().then(function(reg){
        if (!reg){ if (status) status.textContent = '已是最新版本 ✓'; return; }
        reg.update().then(function(){ return reg.getRegistration(); }).then(function(r){
          if (r && r.waiting){ if (status) status.textContent = '发现新版本 v' + (swVerFromUrl(r.waiting.scriptURL) || '') + '，正在应用…'; activateWaiting(r); }
          else if (status) status.textContent = '已是最新版本 ✓';
        }).catch(function(){ if (status) status.textContent = '检查失败，请尝试「强制更新」'; });
      }).catch(function(){ if (status) status.textContent = '检查失败，请尝试「强制更新」'; });
    }
    async function forceUpdate(){
      var status = $('update-status');
      if (status) status.textContent = '正在强制刷新…';
      var bustUrl = location.href.split('#')[0].replace(/[?&]_t=[^&]*/, '') + '?_t=' + Date.now() + location.hash;
      if ('serviceWorker' in navigator){
        try {
          var regs = await navigator.serviceWorker.getRegistrations();
          await Promise.all(regs.map(function(r){ return r.unregister(); }));
          var keys = await caches.keys();
          await Promise.all(keys.map(function(k){ return caches.delete(k); }));
        } catch (e) { /* 清理失败也继续跳转 */ }
      }
      location.assign(bustUrl);
    }

    // ---- 安装到主屏 ----
    var deferredPrompt = null;
    function isPwaStandalone(){
      return !!(window.matchMedia && (window.matchMedia('(display-mode: standalone)').matches
        || window.matchMedia('(display-mode: window-controls-overlay)').matches)
        || navigator.standalone === true);
    }
    window.addEventListener('beforeinstallprompt', function(e){ e.preventDefault(); deferredPrompt = e; });
    async function installApp(){
      if (isPwaStandalone()){
        alert('应用已安装并正在运行。\n\n如需重新安装，请先从桌面/系统设置中卸载当前应用，然后刷新页面再试。');
        return;
      }
      if (deferredPrompt){
        deferredPrompt.prompt();
        try { await deferredPrompt.userChoice; } catch(_){}
        deferredPrompt = null;
        return;
      }
      var ua = navigator.userAgent, tip = '';
      if (/iPhone|iPad|iPod/i.test(ua)) tip = 'iOS Safari：点击底部「分享」图标 → 选择「添加到主屏幕」→ 右上角「添加」。';
      else if (/Chrome/i.test(ua) && /Android/i.test(ua)) tip = 'Android Chrome：点右上角 ⋮ 菜单 →「安装应用」或「添加到主屏幕」。';
      else tip = '请点浏览器菜单（⋮ 或 ⋯）→「安装应用 / 添加到主屏幕 / Add to Home Screen」。';
      alert('未捕获到系统安装提示，请手动安装：\n\n' + tip + '\n\n提示：若之前已安装过本应用，请先卸载旧版本后再尝试安装。');
    }
    window.addEventListener('appinstalled', function(){ deferredPrompt = null; });

    // ---- 初始化 ----
    function init(){
      fetch('version.json?_t=' + Date.now(), { cache: 'no-store' })
        .then(function(r){ return r.ok ? r.json() : null; })
        .then(function(data){
          if (data){
            APP_VERSION = data.version || APP_VERSION;
            APP_RELEASE_TIME = data.time || APP_RELEASE_TIME;
          }
          var verEl = $('app-version'); if (verEl) verEl.textContent = 'v' + APP_VERSION;
          var upEl = $('app-updated-at'); if (upEl) upEl.textContent = APP_RELEASE_TIME;
          refreshReleaseTime();
          loadLocalChangelog().then(updateVersionNote).catch(function(){ updateVersionNote(); });
        })
        .catch(function(){
          var verEl = $('app-version'); if (verEl) verEl.textContent = 'v' + (APP_VERSION || '—');
        });

      var checkBtn = $('btn-check-update'); if (checkBtn) checkBtn.addEventListener('click', checkUpdate);
      var forceBtn = $('btn-force-update'); if (forceBtn) forceBtn.addEventListener('click', forceUpdate);
      var installBtn = $('btn-install-app'); if (installBtn) installBtn.addEventListener('click', installApp);
      var openBtn = $('open-changelog'); if (openBtn) openBtn.addEventListener('click', openChangelog);
      var closeBtn = $('clog-close'); if (closeBtn) closeBtn.addEventListener('click', function(){ var c=$('clog-card'); if(c) c.classList.remove('show'); });
    }

    // ---- Service Worker 注册（用于更新检测；带版本号避免 24h 节流）----
    if ('serviceWorker' in navigator){
      window.addEventListener('load', function(){
        var swUrl = 'sw.js?v=' + (APP_VERSION || '1.2.48');
        var reg = navigator.serviceWorker;
        reg.addEventListener('controllerchange', function(){ if (swPendingReload) location.reload(); });
        reg.register(swUrl, { updateViaCache: 'none' }).then(function(registration){
          registration.addEventListener('updatefound', function(){
            var worker = registration.installing;
            if (!worker) return;
            worker.addEventListener('statechange', function(){
              if (worker.state === 'installed' && reg.controller){
                var nv = swVerFromUrl(worker.scriptURL);
                if (nv && compareVersion(nv, APP_VERSION) > 0){
                  var s = $('update-status'); if (s) s.textContent = '发现新版本 v' + nv + '，请点「强制更新」';
                }
              }
            });
          });
        }).catch(function(e){ console.warn('SW 注册失败:', e); });
      });
    }

    init();

    // 注册 Service Worker（兜底，确保本页注册到最新 SW）
    if ('serviceWorker' in navigator) {
      fetch('version.json?_t=' + Date.now(), { cache: 'no-store' })
        .then(function(r){ return r.json(); })
        .then(function(d){ if (d && d.version) navigator.serviceWorker.register('sw.js?v=' + d.version); })
        .catch(function(){});
    }
  </script>
</body>
</html>
