<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#1677ff" />
  <title>需求任务追踪</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <link rel="icon" href="icons/favicon-32.png" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header>
    <div class="brand">
      <div class="brand-icon">📋</div>
      <div class="title-wrap">
        <h1>需求任务追踪</h1>
        <div class="sub">移动端 · 本地存储</div>
      </div>
    </div>
    <button class="menu-btn" aria-label="菜单">☰</button>
  </header>

  <nav class="tabs">
    <button class="tab active" data-view="task">任务</button>
    <button class="tab" data-view="report">报表</button>
    <button class="tab" data-view="settings">设置</button>
  </nav>

  <div class="container">
    <!-- 安装横幅 -->
    <div class="install-banner" id="install-banner" hidden>
      <div class="ib-text">📲 可安装为 App，离线也能用</div>
      <div class="ib-actions">
        <button id="install-btn" class="btn sm primary">安装</button>
        <button id="install-close" class="btn sm ghost">稍后</button>
      </div>
    </div>

    <!-- 任务视图 -->
    <div class="view active" id="view-task">
      <div class="section-header">
        <h2 class="section-title">首页</h2>
        <div class="section-actions">
          <button class="link" id="btn-toggle-stats" type="button">隐藏统计</button>
          <button class="link" id="btn-toggle-filters" type="button">隐藏筛选</button>
        </div>
      </div>
      <div class="stats-bar" id="stats-bar">
        <div class="stats-grid" id="stats-grid"></div>
      </div>
      <div class="filter-card" id="filter-card">
        <div class="filter-row">
          <div class="chip-group" id="type-chips">
            <button class="chip active" data-type="全部">全部类型</button>
            <button class="chip" data-type="需求">需求</button>
            <button class="chip" data-type="线上BUG">线上BUG</button>
            <button class="chip" data-type="普通BUG">普通BUG</button>
          </div>
        </div>
        <div class="filter-row">
          <div class="chip-group" id="status-chips">
            <button class="chip active" data-status="全部">全部状态</button>
            <button class="chip" data-status="待开发">待开发</button>
            <button class="chip" data-status="已提测">已提测</button>
            <button class="chip" data-status="测试中">测试中</button>
            <button class="chip" data-status="已测完">已测完</button>
            <button class="chip" data-status="已上线">已上线</button>
          </div>
        </div>
      </div>
      <div class="search-bar">
        <div class="search-box">
          <span class="icon">🔍</span>
          <input id="search-q" type="search" placeholder="搜索任务名称/描述" />
        </div>
      </div>
      <div id="task-list"></div>
    </div>

    <!-- 报表视图 -->
    <div class="view" id="view-report">
      <div class="report-grid">
        <div class="report-card"><div class="num" id="r-total">0</div><div class="lbl">总任务</div></div>
        <div class="report-card"><div class="num" id="r-doing">0</div><div class="lbl">进行中</div></div>
        <div class="report-card"><div class="num" id="r-online">0</div><div class="lbl">已上线</div></div>
      </div>
      <div class="status-breakdown">
        <h3>状态分布</h3>
        <div id="r-breakdown"></div>
      </div>
    </div>

    <!-- 设置视图 -->
    <div class="view" id="view-settings">
      <div class="settings-section">
        <h3>👤 开发人员</h3>
        <div class="settings-list" id="dev-list"></div>
        <div class="add-row">
          <input id="dev-input" placeholder="新增开发人员" />
          <button class="btn primary" data-add="dev">添加</button>
        </div>
      </div>
      <div class="settings-section">
        <h3>📁 所属项目</h3>
        <div class="settings-list" id="project-list"></div>
        <div class="add-row">
          <input id="project-input" placeholder="新增项目" />
          <button class="btn primary" data-add="project">添加</button>
        </div>
      </div>
      <div class="settings-section">
        <h3>🏷️ 需求组</h3>
        <div class="settings-list" id="group-list"></div>
        <div class="add-row">
        <input id="group-input" placeholder="新增需求组" />
        <button class="btn primary" data-add="group">添加</button>
      </div>
    </div>

    <div class="settings-section">
      <h3>💾 数据备份</h3>
      <p class="backup-tip">导出全部任务与设置到 JSON 文件，换设备或重装前先备份，避免数据丢失。</p>
      <div class="backup-actions">
        <button class="btn primary" id="btn-export" type="button">⬇️ 导出备份</button>
        <button class="btn ghost" id="btn-import" type="button">⬆️ 导入备份</button>
      </div>
        <input type="file" id="import-file" accept="application/json,.json" hidden />
      </div>
      <div class="settings-section">
        <h3>ℹ️ 关于</h3>
        <div class="settings-item">
          <span>当前版本</span>
          <span id="app-version">—</span>
        </div>
        <div class="add-row">
          <button class="btn primary" id="btn-check-update" type="button">🔄 检查更新</button>
          <button class="btn ghost" id="btn-force-update" type="button">⚡ 强制更新</button>
        </div>
        <p class="backup-tip" id="update-status" style="margin-top:10px;"></p>
      </div>
    </div>
  </div>

  <!-- 右下角添加按钮 -->
  <button class="fab" id="fab" aria-label="新增任务">+</button>

  <!-- 新增/编辑任务模态框 -->
  <div class="modal-overlay" id="modal-overlay">
    <div class="modal">
      <div class="modal-header">
        <h2 id="modal-title">新增任务</h2>
        <button class="close" id="modal-close">✕</button>
      </div>
      <div class="modal-body">
        <form id="task-form">
          <div class="form-group">
            <label>任务名称 <span style="color:#cf1322">*</span></label>
            <input id="f-title" type="text" placeholder="输入任务名称" maxlength="120" required />
          </div>

          <div class="form-group">
            <label>任务类型</label>
            <div class="chip-group" id="form-type-chips">
              <button class="chip active" data-type="需求" type="button">需求</button>
              <button class="chip" data-type="线上BUG" type="button">线上BUG</button>
              <button class="chip" data-type="普通BUG" type="button">普通BUG</button>
            </div>
          </div>

          <div class="form-group">
            <label>所属项目</label>
            <select id="f-project"></select>
          </div>

          <div class="form-group">
            <label>需求组</label>
            <select id="f-group"></select>
          </div>

          <div class="form-group">
            <label>开发人员（可多选）</label>
            <div class="chip-group" id="form-dev-chips"></div>
          </div>

          <div class="form-group">
            <label>预计完成日期</label>
            <input id="f-due" type="date" />
          </div>

          <div class="form-group">
            <label>任务描述（最多500字）</label>
            <textarea id="f-desc" placeholder="输入任务描述" maxlength="500"></textarea>
          </div>

          <div class="form-actions">
            <button class="btn ghost" type="button" id="modal-cancel">取消</button>
            <button class="btn primary" type="submit" id="modal-save">保存</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script src="app.js"></script>
  <script>
    const SW_VERSION = '15';
    let swPendingReload = false;
    function showUpdateBanner(registration) {
      if (document.getElementById('sw-update-banner')) return;
      const banner = document.createElement('div');
      banner.id = 'sw-update-banner';
      banner.className = 'update-banner';
      banner.innerHTML = '<span>🎉 发现新版本</span><button type="button" id="sw-update-btn">点击刷新</button>';
      document.body.appendChild(banner);
      banner.querySelector('#sw-update-btn').addEventListener('click', () => {
        const waiting = registration.waiting;
        if (waiting) {
          swPendingReload = true;
          waiting.postMessage('SKIP_WAITING');
        } else {
          location.reload();
        }
      });
    }
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        const reg = navigator.serviceWorker;
        const swUrl = 'sw.js?v=' + SW_VERSION;
        reg.addEventListener('controllerchange', () => { if (swPendingReload) location.reload(); });
        // 清理旧版本（不同 query 的 sw.js）注册，避免堆积
        reg.getRegistrations().then((regs) => {
          regs.forEach((r) => {
            const url = r.scriptURL || '';
            if (url.indexOf('sw.js?v=' + SW_VERSION) === -1) r.unregister();
          });
        });
        // 注册带版本号的 sw.js：新 URL 不受浏览器 24h 节流限制，立即拉取生效
        reg.register(swUrl, { updateViaCache: 'none' }).then((registration) => {
          registration.addEventListener('updatefound', () => {
            const worker = registration.installing;
            if (!worker) return;
            worker.addEventListener('statechange', () => {
              // 已有旧版本在控制页面时，新版本安装完成 → 提示用户
              if (worker.state === 'installed' && reg.controller) showUpdateBanner(registration);
            });
          });
        }).catch((e) => console.warn('SW 注册失败:', e));
      });
    }

    const APP_VERSION = '15';
    function activateWaiting(registration) {
      const waiting = registration.waiting;
      if (waiting) { swPendingReload = true; waiting.postMessage('SKIP_WAITING'); }
      else location.reload();
    }
    function checkUpdate() {
      const status = document.getElementById('update-status');
      if (!('serviceWorker' in navigator)) { if (status) status.textContent = '当前环境不支持更新检查'; return; }
      if (status) status.textContent = '正在检查更新…';
      navigator.serviceWorker.getRegistration().then((reg) => {
        if (!reg) { if (status) status.textContent = '已是最新版本 ✓'; return; }
        reg.update().then(() => reg.getRegistration()).then((r) => {
          if (r && r.waiting) { if (status) status.textContent = '发现新版本，正在应用…'; activateWaiting(r); }
          else if (status) status.textContent = '已是最新版本 ✓';
        }).catch(() => { if (status) status.textContent = '检查失败，请尝试「强制更新」'; });
      }).catch(() => { if (status) status.textContent = '检查失败，请尝试「强制更新」'; });
    }
    function forceUpdate() {
      const status = document.getElementById('update-status');
      if (status) status.textContent = '正在强制刷新…';
      const done = () => location.reload();
      if (!('serviceWorker' in navigator)) { done(); return; }
      navigator.serviceWorker.getRegistrations().then((regs) =>
        Promise.all(regs.map((r) => r.unregister()))
      ).then(() => caches.keys().then((keys) => Promise.all(keys.map((k) => caches.delete(k)))))
       .then(done).catch(done);
    }
    const verEl = document.getElementById('app-version');
    if (verEl) verEl.textContent = 'v' + APP_VERSION;
    const checkBtn = document.getElementById('btn-check-update');
    if (checkBtn) checkBtn.addEventListener('click', checkUpdate);
    const forceBtn = document.getElementById('btn-force-update');
    if (forceBtn) forceBtn.addEventListener('click', forceUpdate);
    let deferredPrompt = null;
    const banner = document.getElementById('install-banner');
    const installBtn = document.getElementById('install-btn');
    const installClose = document.getElementById('install-close');

    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      deferredPrompt = e;
      if (banner) banner.hidden = false;
    });

    if (installBtn) {
      installBtn.addEventListener('click', async () => {
        if (!deferredPrompt) {
          alert('当前浏览器不支持一键安装。\n请用 Chrome / Edge / Samsung Internet 打开本页，再点菜单「安装应用 / 添加到主屏幕」。');
          return;
        }
        deferredPrompt.prompt();
        try { await deferredPrompt.userChoice; } catch (_) {}
        deferredPrompt = null;
        if (banner) banner.hidden = true;
      });
    }

    if (installClose) installClose.addEventListener('click', () => banner.hidden = true);
    window.addEventListener('appinstalled', () => { if (banner) banner.hidden = true; });
  </script>
</body>
</html>
