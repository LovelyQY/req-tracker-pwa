<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>个人信息 · 全屏</title>
<link rel="apple-touch-icon" href="icons/icon-192.png">
<link rel="icon" href="icons/favicon-32.png">
<style>
:root{
  --primary:#1677ff; --primary-light:#4096ff; --bg:#f5f7fa; --surface:#fff;
  --text:#1f2937; --muted:#6b7280; --border:#e5e7eb; --radius:14px;
  --crop-size:min(95vmin, 440px);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
button,a,input,select,textarea,[onclick]{outline:none}
button:focus:not(:focus-visible),a:focus:not(:focus-visible),[onclick]:focus:not(:focus-visible),input:focus:not(:focus-visible),select:focus:not(:focus-visible),textarea:focus:not(:focus-visible){outline:none}
html,body{height:100%}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;
  background:var(--surface);color:var(--text);
  min-height:100dvh; padding:0; -webkit-font-smoothing:antialiased;
}

.nav-bar{
  position:sticky;top:0;z-index:10;
  display:flex;align-items:center;height:52px;padding:0 16px 0 4px;
  background:rgba(255,255,255,.92);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  border-bottom:1px solid var(--border);
  padding-top:calc(env(safe-area-inset-top) + 8px);
}
.nav-back{width:36px;height:36px;border:none;background:none;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text);position:relative;z-index:1}
.nav-back svg{width:22px;height:22px}
.nav-title{font-size:17px;font-weight:700;text-align:center;position:absolute;left:0;right:0;flex:none;pointer-events:none}

.card{
  width:100%; min-height:calc(100dvh - 60px); background:var(--surface);
  padding:24px 20px calc(env(safe-area-inset-bottom) + 32px);
  display:flex; flex-direction:column; align-items:center; gap:4px;
}

.avatar-section{display:flex;flex-direction:column;align-items:center;gap:8px;margin-bottom:28px;width:100%}
.avatar-wrap{
  position:relative;width:88px;height:88px;border-radius:50%;
  background:linear-gradient(135deg,#1677ff,#4096ff);
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 8px 22px rgba(22,119,255,.3);
  cursor:pointer;-webkit-tap-highlight-color:transparent;
}
.avatar-wrap svg{width:48px;height:48px}
.avatar-edit{
  position:absolute;bottom:2px;right:2px;width:28px;height:28px;border-radius:50%;
  background:rgba(255,255,255,.85);border:2.5px solid var(--surface);display:flex;align-items:center;justify-content:center;
  cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,.12);z-index:2;
  -webkit-tap-highlight-color:transparent; outline:none;
}
.avatar-edit:active{background:rgba(255,255,255,.6)}
.avatar-edit svg{width:14px;height:14px;color:var(--muted)}
.avatar-img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;border-radius:50%;display:none;z-index:1}
.avatar-name{text-align:center;font-size:18px;font-weight:700}

.info-list{width:100%;max-width:400px;display:flex;flex-direction:column;gap:2px}
.info-row{display:flex;align-items:center;padding:15px 16px;background:var(--surface);border-bottom:1px solid var(--border);gap:12px;min-height:56px;cursor:pointer;-webkit-tap-highlight-color:transparent}
.info-row:active{background:#f2f4f7}
.info-row.static{cursor:default}
.info-row.static:active{background:var(--surface)}
.info-row:last-child{border-bottom:none}
.info-label{font-size:14px;color:var(--muted);min-width:64px;flex-shrink:0}
.info-value{font-size:15px;color:var(--text);flex:1;text-align:right;word-break:break-all}
.info-value.empty{color:#c7ccd4}
.info-arrow{color:#c7ccd4;flex-shrink:0}

.tags-wrap{display:flex;flex-wrap:wrap;gap:6px;justify-content:flex-end;flex:1}
.tag{font-size:12px;padding:3px 10px;border-radius:999px;background:#eff6ff;color:var(--primary);font-weight:500}

.bio-value{font-size:14px;color:var(--muted);text-align:right;line-height:1.5;flex:1}

/* 头像裁剪浮层 */
.crop-overlay{position:fixed;inset:0;z-index:1000;background:rgba(0,0,0,.7);display:none;flex-direction:column;align-items:center;-webkit-tap-highlight-color:transparent}
.crop-tip{color:#fff;font-size:13px;opacity:.8;padding:calc(env(safe-area-inset-top) + 16px) 16px 8px;text-align:center;pointer-events:none;z-index:4}
.crop-stage{position:relative;flex:1;width:100%;display:flex;align-items:center;justify-content:center;overflow:hidden;background:transparent}
.crop-dim{position:absolute;inset:0;background:rgba(0,0,0,.4);-webkit-mask-image:radial-gradient(circle at center, transparent calc(var(--crop-size)/2), black calc(var(--crop-size)/2));mask-image:radial-gradient(circle at center, transparent calc(var(--crop-size)/2), black calc(var(--crop-size)/2));pointer-events:none;z-index:2}
.crop-border{position:absolute;width:var(--crop-size);height:var(--crop-size);border-radius:50%;border:2px solid rgba(255,255,255,.9);pointer-events:none;left:50%;top:50%;transform:translate(-50%,-50%);z-index:3}
.crop-img{position:absolute;left:50%;top:50%;max-width:none;user-select:none;-webkit-user-drag:none;touch-action:none;z-index:1}
.crop-bar{display:flex;align-items:center;justify-content:space-between;gap:12px;width:100%;max-width:480px;padding:18px 20px calc(env(safe-area-inset-bottom) + 20px)}
.crop-btn{border:none;border-radius:10px;padding:11px 20px;font-size:15px;font-weight:600;background:rgba(255,255,255,.16);color:#fff;cursor:pointer;-webkit-tap-highlight-color:transparent}
.crop-btn:active{background:rgba(255,255,255,.28)}
.crop-confirm{background:var(--primary);color:#fff}
.crop-confirm:active{background:var(--primary-light)}
.crop-zoom{display:flex;gap:10px}

.toast{position:fixed;left:50%;top:24px;transform:translateX(-50%) translateY(-20px);background:rgba(17,24,39,.92);color:#fff;padding:10px 18px;border-radius:10px;font-size:14px;z-index:999;opacity:0;transition:.25s;pointer-events:none;max-width:90vw;text-align:center}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
  <script src="auth.js?v=1.3.6"></script>
  <script src="db.js?v=1.3.6"></script>
  <script src="users.js?v=1.3.6"></script>
  <script src="imgstore.js?v=1.3.6"></script>
  <script>
    (function () {
      try { if (!getSessionAccount()) location.replace('login/classic.html'); }
      catch (e) { location.replace('login/classic.html'); }
    })();
  </script>
</head>
<body>

  <div class="nav-bar">
    <button class="nav-back" onclick="goBack()" aria-label="返回">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
    </button>
    <span class="nav-title">个人信息</span>
  </div>

  <div class="card">
    <div class="avatar-section">
      <div class="avatar-wrap" id="pv-avatar-wrap">
        <svg id="pv-avatar-default" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="9" r="5" fill="#fff" opacity=".95"/><path d="M3 21c0-5 4-9 9-9s9 4 9 9" stroke="#fff" stroke-width="2.2" stroke-linecap="round"/></svg>
        <img id="pv-avatar-img" class="avatar-img" alt="头像">
        <div class="avatar-edit" id="pv-avatar-edit" role="button" aria-label="更换头像" tabindex="0">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
        </div>
      </div>
      <span class="avatar-name" id="pv-avatar-name">—</span>
    </div>

    <div class="info-list">
      <div class="info-row static">
        <span class="info-label">账号</span>
        <span class="info-value" id="pv-account">—</span>
      </div>
      <div class="info-row" onclick="navTo('profile-edit.html?field=nickname')">
        <span class="info-label">昵称</span>
        <span class="info-value" id="pv-nickname">—</span>
        <svg class="info-arrow" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="m9 18 6-6-6-6"/></svg>
      </div>
      <div class="info-row" onclick="navTo('profile-edit.html?field=tags')">
        <span class="info-label">标签</span>
        <div class="tags-wrap" id="pv-tags"></div>
        <svg class="info-arrow" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="m9 18 6-6-6-6"/></svg>
      </div>
      <div class="info-row" style="align-items:flex-start;padding-top:16px;padding-bottom:20px" onclick="navTo('profile-edit.html?field=signature')">
        <span class="info-label" style="padding-top:2px">个性签名</span>
        <span class="bio-value" id="pv-bio">—</span>
        <svg class="info-arrow" style="padding-top:2px" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="m9 18 6-6-6-6"/></svg>
      </div>
      <div class="info-row" onclick="navTo('profile-detail.html')" style="border-bottom:1px solid var(--border)">
        <span class="info-label">详细信息</span>
        <span class="info-value empty"></span>
        <svg class="info-arrow" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="m9 18 6-6-6-6"/></svg>
      </div>
    </div>
  </div>

  <input type="file" id="pv-avatar-file" accept="image/*" style="display:none">

  <div class="crop-overlay" id="crop-overlay">
    <div class="crop-tip">拖动图片调整位置，圆内区域将作为头像</div>
    <div class="crop-stage" id="crop-stage">
      <img class="crop-img" id="crop-img" alt="">
        <div class="crop-dim"></div>
        <div class="crop-border" id="crop-border"></div>
    </div>
    <div class="crop-bar">
      <button class="crop-btn" id="crop-cancel" type="button">取消</button>
      <div class="crop-zoom">
        <button class="crop-btn" id="crop-zoom-out" type="button">－</button>
        <button class="crop-btn" id="crop-zoom-in" type="button">＋</button>
      </div>
      <button class="crop-btn crop-confirm" id="crop-confirm" type="button">选择</button>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    var currentRec = null;

    function escapeHtml(s){ return String(s == null ? '' : s).replace(/[&<>"']/g, function(c){ return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]; }); }
    function toast(msg){ var t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); clearTimeout(toast._t); toast._t=setTimeout(function(){ t.classList.remove('show'); },2200); }
    function setVal(id, val){ var el=document.getElementById(id); if(el) el.textContent = (val==null||val==='')?'—':val; }

    function splitTags(s){ return String(s==null?'':s).split(/[\s,，、]+/).map(function(t){return t.trim();}).filter(function(t){return t;}); }

    async function renderProfile() {
      try {
        var acc = getSessionAccount();
        if (!acc) { location.replace('login/classic.html'); return; }
        if (typeof RT_USERS !== 'undefined' && RT_USERS.ensurePerson) {
          try { await RT_USERS.ensurePerson(acc); } catch (e) {}
        }
        var rec = (typeof RT_USERS !== 'undefined') ? await RT_USERS.getUserByAccount(acc) : null;
        if (!rec) {
          var me = getMyAccount();
          rec = me ? { account:me.account, nickname:me.nickname, tags:'', signature:me.bio||'', avatar:me.avatar||'' } : null;
        }
        if (!rec) return;
        currentRec = rec;

        var nickname = rec.nickname || rec.account || acc;
        setVal('pv-account', rec.account);
        setVal('pv-nickname', nickname);

        var nameEl = document.getElementById('pv-avatar-name'); if (nameEl) nameEl.textContent = nickname;

        var tagsEl = document.getElementById('pv-tags');
        if (tagsEl) {
          var tags = splitTags(rec.tags);
          tagsEl.innerHTML = tags.length
            ? tags.map(function(t){ return '<span class="tag">' + escapeHtml(t) + '</span>'; }).join('')
            : '<span class="info-value empty" style="text-align:right">—</span>';
        }

        setVal('pv-bio', rec.signature);
        var bioEl = document.getElementById('pv-bio'); if (bioEl) bioEl.classList.toggle('empty', !rec.signature);

        applyAvatar(rec.avatar);
      } catch (e) {}
    }

    var showAvatar, applyAvatar;
    (function(){
      var img = document.getElementById('pv-avatar-img');
      var def = document.getElementById('pv-avatar-default');
      var edit = document.getElementById('pv-avatar-edit');
      var wrap = document.getElementById('pv-avatar-wrap');
      var file = document.getElementById('pv-avatar-file');
      var overlay = document.getElementById('crop-overlay');
      var stage = document.getElementById('crop-stage');
      var cropBorder = document.getElementById('crop-border');
      var cropImg = document.getElementById('crop-img');
      var CROP = 440, HALF = 220;
      var MAX_SCALE = 4;
      var st = { x:0, y:0, scale:1, baseW:0, baseH:0 };
      function readCrop(){ var w = cropBorder && parseFloat(getComputedStyle(cropBorder).width); if (w && w > 0) { CROP = w; HALF = w / 2; } }

      showAvatar = function(src){ if (src) { img.src = src; img.style.display = 'block'; if (def) def.style.display = 'none'; } else { img.style.display = 'none'; if (def) def.style.display = ''; } };
      applyAvatar = function(ref){
        if (!ref) { showAvatar(null); return; }
        if (typeof RT_IMGSTORE !== 'undefined' && RT_IMGSTORE.resolveAvatar) {
          RT_IMGSTORE.resolveAvatar(ref).then(function(src){ showAvatar(src); }).catch(function(){ showAvatar(null); });
        } else { showAvatar(ref); }
      };
      try { var me0 = getMyAccount(); if (me0 && me0.avatar) applyAvatar(me0.avatar); } catch(e){}

      function openPicker(){ try { file.click(); } catch(e){} }
      if (edit) edit.addEventListener('click', function(e){ e.stopPropagation(); openPicker(); });
      if (wrap) wrap.addEventListener('click', openPicker);

      if (file) file.addEventListener('change', function(){
        var f = file.files && file.files[0]; if (!f) return;
        var r = new FileReader(); r.onload = function(ev){ openCropper(ev.target.result); }; r.readAsDataURL(f); file.value = '';
      });

      function openCropper(src){
        var im = new Image(); im.onload = function(){
          overlay.style.display = 'flex'; readCrop();
          var cover = Math.max(CROP / im.naturalWidth, CROP / im.naturalHeight);
          st.baseW = im.naturalWidth * cover; st.baseH = im.naturalHeight * cover;
          st.scale = 1; st.x = (CROP - st.baseW) / 2; st.y = (CROP - st.baseH) / 2;
          cropImg.src = src; apply();
        }; im.src = src;
      }
      function apply(){
        var w = st.baseW * st.scale, h = st.baseH * st.scale;
        st.x = (w >= CROP) ? Math.min(0, Math.max(CROP - w, st.x)) : (CROP - w) / 2;
        st.y = (h >= CROP) ? Math.min(0, Math.max(CROP - h, st.y)) : (CROP - h) / 2;
        cropImg.style.width = w + 'px'; cropImg.style.height = h + 'px';
        cropImg.style.marginLeft = (-HALF + st.x) + 'px'; cropImg.style.marginTop = (-HALF + st.y) + 'px';
      }
      var pts = {}, pinchPrev = 0, pinchScale = 1;
      function activePointers(){ var k = Object.keys(pts); return k.length >= 2 ? [pts[k[0]], pts[k[1]]] : null; }
      function dist2(a, b){ return Math.hypot(a.x - b.x, a.y - b.y); }
      stage.addEventListener('pointerdown', function(e){
        pts[e.pointerId] = { x: e.clientX, y: e.clientY }; try { stage.setPointerCapture(e.pointerId); } catch(_){}
        var tp = activePointers(); if (tp) { pinchPrev = dist2(tp[0], tp[1]); pinchScale = st.scale; }
      });
      stage.addEventListener('pointermove', function(e){
        if (!(e.pointerId in pts)) return;
        var prev = pts[e.pointerId]; pts[e.pointerId] = { x: e.clientX, y: e.clientY };
        var tp = activePointers();
        if (tp){ var d = dist2(tp[0], tp[1]); if (pinchPrev > 0){ st.scale = Math.min(MAX_SCALE, Math.max(1, pinchScale * (d / pinchPrev))); apply(); } pinchPrev = d; pinchScale = st.scale; }
        else { st.x += (e.clientX - prev.x); st.y += (e.clientY - prev.y); apply(); }
      });
      function endPointer(e){ delete pts[e.pointerId]; try { stage.releasePointerCapture(e.pointerId); } catch(_){} if (Object.keys(pts).length < 2) pinchPrev = 0; }
      stage.addEventListener('pointerup', endPointer); stage.addEventListener('pointercancel', endPointer);
      document.getElementById('crop-zoom-in').addEventListener('click', function(){ st.scale=Math.min(MAX_SCALE, st.scale+0.15); apply(); });
      document.getElementById('crop-zoom-out').addEventListener('click', function(){ st.scale=Math.max(1, st.scale-0.15); apply(); });
      document.getElementById('crop-cancel').addEventListener('click', function(){ overlay.style.display='none'; });
      document.getElementById('crop-confirm').addEventListener('click', function(){
        var cv = document.createElement('canvas'); cv.width=CROP; cv.height=CROP;
        var cx = cv.getContext('2d'); cx.beginPath(); cx.arc(CROP/2, CROP/2, CROP/2, 0, Math.PI*2); cx.closePath(); cx.clip();
        cx.drawImage(cropImg, st.x, st.y, st.baseW*st.scale, st.baseH*st.scale);
        var url = cv.toDataURL('image/jpeg', 0.92);
        showAvatar(url); overlay.style.display = 'none';
        var acc = getSessionAccount(); if (!acc) { toast('会话已失效，请重新登录'); return; }
        var avatarId = 'avatar-' + (currentRec ? currentRec.id : acc);
        var saved = false;
        if (typeof RT_IMGSTORE !== 'undefined' && RT_IMGSTORE.dbPutImage) {
          RT_IMGSTORE.dbPutImage({ id: avatarId, dataUrl: url, taskId: 'avatar' })
            .then(function () {
              if (currentRec && currentRec.id && typeof RT_USERS !== 'undefined' && RT_USERS.updateProfile) {
                return RT_USERS.updateProfile(currentRec.id, { avatar: avatarId }, acc);
              } throw new Error('数据层未就绪');
            })
            .then(function(){ toast('头像已更新'); })
            .catch(function(err){ toast('头像保存失败：' + (err && err.message ? err.message : err)); });
          saved = true;
        }
        if (!saved) {
          if (currentRec && currentRec.id && typeof RT_USERS !== 'undefined' && RT_USERS.updateProfile) {
            RT_USERS.updateProfile(currentRec.id, { avatar: url }, acc)
              .then(function(){ toast('头像已更新'); }).catch(function(err){ toast('头像保存失败：' + (err && err.message ? err.message : err)); });
          } else {
            toast('头像保存失败：用户模块未加载');
          }
        }
      });
    })();

    renderProfile();
    window.addEventListener('pageshow', function(){ renderProfile(); });
    document.addEventListener('visibilitychange', function(){ if (document.visibilityState === 'visible') renderProfile(); });
    if ('serviceWorker' in navigator) {
      fetch('version.json?_t=' + Date.now(), { cache: 'no-store' })
        .then(function(r){ return r.json(); }).then(function(d){ if (d && d.version) navigator.serviceWorker.register('sw.js?v=' + d.version).catch(function(){}); }).catch(function(){});
    }
  </script>
</body>
</html>
