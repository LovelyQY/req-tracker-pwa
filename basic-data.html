<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>基础数据</title>
<style>
:root{
  --primary:#1677ff; --primary-light:#4096ff; --bg:#f5f7fa; --surface:#fff;
  --text:#1f2937; --muted:#6b7280; --border:#e5e7eb; --radius:14px;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;
  background:var(--bg);color:var(--text);min-height:100dvh;padding:0;-webkit-font-smoothing:antialiased;
}
.nav-bar{
  position:sticky;top:0;z-index:10;display:flex;align-items:center;height:52px;padding:0 8px;
  background:rgba(255,255,255,.92);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  border-bottom:1px solid var(--border);padding-top:calc(env(safe-area-inset-top) + 8px)}
.nav-back{width:40px;height:40px;border:none;background:none;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text)}
.nav-back svg{width:22px;height:22px}
.nav-title{font-size:17px;font-weight:700;text-align:center;position:absolute;left:0;right:0;pointer-events:none}
.wrap{max-width:560px;margin:0 auto;padding:16px 14px calc(env(safe-area-inset-bottom) + 40px)}
.section-desc{font-size:13px;color:var(--muted);line-height:1.6;margin:4px 4px 14px}
.module-list{background:var(--surface);border-radius:var(--radius);overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.05)}
.module-row{
  display:flex;align-items:center;gap:14px;padding:16px;
  background:var(--surface);border-bottom:1px solid var(--border);
  cursor:pointer;-webkit-tap-highlight-color:transparent;-webkit-user-select:none;user-select:none;
  transition:background .12s}
.module-row:last-child{border-bottom:none}
.module-row:active{background:#f2f4f7}
.module-icon{
  flex-shrink:0;width:44px;height:44px;border-radius:12px;
  display:flex;align-items:center;justify-content:center;color:#fff;
  background:linear-gradient(135deg,#1677ff,#4096ff);box-shadow:0 4px 12px rgba(22,119,255,.25)}
.module-main{flex:1;min-width:0}
.module-name{font-size:16px;font-weight:600;word-break:break-all}
.module-desc{font-size:12px;color:var(--muted);margin-top:3px;line-height:1.5}
.module-arrow{color:#c7ccd4;flex-shrink:0}
</style>
<script src="auth.js?v=1.2.48"></script>
<script>
  // 登录闸门：无效会话跳转登录页
  (function () {
    try { if (!getSessionAccount()) location.replace('login/classic.html'); }
    catch (e) { location.replace('login/classic.html'); }
  })();
</script>
</head>
<body>

  <div class="nav-bar">
    <button class="nav-back" onclick="location.href='index.html'" aria-label="返回">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
    </button>
    <span class="nav-title">基础数据</span>
  </div>

  <div class="wrap">
    <p class="section-desc">集中维护各类基础数据，便于任务归类与统计。</p>
    <div class="module-list" id="moduleList"></div>
  </div>

  <script>
    // 基础数据模块清单：新增模块只需在此追加一项（href 指向对应页面）。
    // icon 为内联 SVG 字符串，name/desc 为展示文案。后续接入的模块（如部门、区域等）同样追加即可。
    var MODULES = [
      {
        name: '公司管理',
        desc: '维护总公司 / 分公司层级与基础信息',
        href: 'company.html',
        icon: '<svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 21h18M5 21V7l7-4 7 4v14M9 9h.01M15 9h.01M9 13h.01M15 13h.01"/></svg>'
      },
      {
        name: '部门管理',
        desc: '维护部门名称、编号与层级（归属公司）',
        href: 'department.html',
        icon: '<svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75"/></svg>'
      },
      {
        name: '职位管理',
        desc: '维护职位名称、编码与职级',
        href: 'position.html',
        icon: '<svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="7" width="18" height="13" rx="2"/><path d="M8 7V5a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><path d="M3 12h18"/></svg>'
      },
      {
        name: '项目管理',
        desc: '维护项目名称、描述与所属部门',
        href: 'project.html',
        icon: '<svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><path d="M22 4 12 14.01l-3-3"/></svg>'
      },
      {
        name: '项目版本管理',
        desc: '维护版本名称、描述与所属项目',
        href: 'project-version.html',
        icon: '<svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="18" cy="18" r="3"/><circle cx="6" cy="6" r="3"/><path d="M13 6h3a2 2 0 0 1 2 2v7M11 18H8a2 2 0 0 1-2-2V9"/></svg>'
      },
      {
        name: '字典管理',
        desc: '系统枚举（任务类型 / 优先级 / 任务状态），仅查看',
        href: 'dictionary.html',
        icon: '<svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>'
      }
    ];

    function escapeHtml(s){
      return String(s == null ? '' : s).replace(/[&<>"']/g, function(c){
        return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];
      });
    }

    function render(){
      var box = document.getElementById('moduleList');
      box.innerHTML = MODULES.map(function(m){
        return '<div class="module-row" onclick="location.href=\'' + m.href + '\'">'
          + '<div class="module-icon">' + m.icon + '</div>'
          + '<div class="module-main">'
          + '<div class="module-name">' + escapeHtml(m.name) + '</div>'
          + '<div class="module-desc">' + escapeHtml(m.desc) + '</div>'
          + '</div>'
          + '<svg class="module-arrow" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><path d="m9 18 6-6-6-6"/></svg>'
          + '</div>';
      }).join('');
    }
    render();

    // 注册 Service Worker（与主应用一致）
    if ('serviceWorker' in navigator) {
      fetch('version.json?_t=' + Date.now(), { cache: 'no-store' })
        .then(function(r){ return r.json(); })
        .then(function(d){ if (d && d.version) navigator.serviceWorker.register('sw.js?v=' + d.version); })
        .catch(function(){});
    }
  </script>
</body>
</html>
