<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>任务统计</title>
<link rel="apple-touch-icon" href="icons/icon-192.png">
<link rel="icon" href="icons/favicon-32.png">
<link rel="stylesheet" href="styles.css?v=1.3.46" />
<style>
  /* ===== RULES：全局去除移动端点击高亮 + 聚焦蓝框，保留键盘 focus-visible ===== */
  *, *::before, *::after { -webkit-tap-highlight-color: transparent; }
  button, a, input, select, textarea, [onclick] { outline: none; }
  button:focus:not(:focus-visible),
  a:focus:not(:focus-visible),
  [onclick]:focus:not(:focus-visible),
  input:focus:not(:focus-visible),
  select:focus:not(:focus-visible),
  textarea:focus:not(:focus-visible) { outline: none; }

  .wrap{max-width:560px;margin:0 auto;padding:16px 14px calc(env(safe-area-inset-bottom) + 40px)}
  .section-desc{font-size:13px;color:var(--muted,#6b7280);line-height:1.6;margin:4px 4px 14px}

  /* 报表内容区（独立页始终显示） */
  .report-section{display:block}

  /* ===== 任务清单 overlay（全屏覆盖，视觉等同独立页） ===== */
  .tl-overlay{position:fixed;inset:0;background:#fff;z-index:1000;overflow:auto;-webkit-overflow-scrolling:touch}
  .tl-overlay[hidden]{display:none}
  .tl-overlay .tl-header{position:sticky;top:0;background:#fff;z-index:1}
  .rf-print-title{display:none}
  .rf-detail-table{display:none}

  /* ===== 打印 / 导出 PDF：仅保留报表本身 ===== */
  @media print {
    @page { size: A4 landscape; margin: 8mm; }
    .nav-bar, .tl-overlay, .rm-list-btn { display: none !important; }
    body { background: #fff; }
    .rf-print-title { display: block !important; font-size: 16px; font-weight: 700; text-align: center; margin: 4px 0 10px; }
    .report-toolbar { box-shadow: none; }
    .rf-detail-table {
      display: table; width: 100%; border-collapse: collapse;
      font-size: 7pt; margin-top: 10px;
      table-layout: fixed;
      page-break-inside: avoid;
    }
    .rf-detail-table th, .rf-detail-table td {
      border: 0.5px solid #ccc; padding: 2px 4px;
      text-align: left; vertical-align: top;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .rf-detail-table th:nth-child(1), .rf-detail-table td:nth-child(1),
    .rf-detail-table th:nth-child(7), .rf-detail-table td:nth-child(7) {
      white-space: normal; word-break: break-word;
    }
    .rf-detail-table thead th { background: #f0f2f5; font-weight: 600; }
  }
</style>
<script src="auth.js?v=1.3.46"></script>
<script>
  // 登录闸门：无效会话跳转登录页
  (function () {
    try { if (!getSessionAccount()) location.replace('login/classic.html'); }
    catch (e) { location.replace('login/classic.html'); }
  })();
</script>
</head>
<body>
  <div class="nav-bar">
    <button class="nav-back" onclick="goBack()" aria-label="返回">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
    </button>
    <span class="nav-title">任务统计</span>
  </div>

  <div class="wrap">
    <p class="section-desc">按时间维度汇总任务总量、测试工时与测试/上线进度。普通 BUG 默认不计入。</p>

    <section class="report-section" data-key="task">
      <div class="report-toolbar">
        <div class="rf-print-title" id="rf-print-title">需求任务追踪 · 报表</div>
        <div class="rf-row">
          <div class="rf-seg" id="rf-seg">
            <button type="button" class="rf-tab is-active" data-dim="year">年度</button>
            <button type="button" class="rf-tab" data-dim="quarter">季度</button>
            <button type="button" class="rf-tab" data-dim="month">月度</button>
          </div>
          <label class="rf-check"><input type="checkbox" class="rf-type-chk" data-type-code="COMMON_BUG" /> <span>普通BUG</span></label>
          <button class="rf-export" id="btn-export-pdf" type="button">
            <svg class="rf-export-icon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3v12"/><path d="M7 11l5 5 5-5"/><path d="M5 21h14"/></svg>
            导出PDF
          </button>
        </div>
        <div class="rf-value" id="rf-value"></div>
        <div class="rf-caption" id="rf-caption"></div>
      </div>
      <div class="report-grid">
        <div class="report-card"><div class="num" id="r-total">0</div><div class="lbl">总任务</div></div>
        <div class="report-card"><div class="num" id="r-hours">0</div><div class="lbl">总测试工时</div></div>
        <div class="report-card"><div class="num" id="r-testing">0</div><div class="lbl">测试中</div></div>
        <div class="report-card"><div class="num" id="r-tested">0</div><div class="lbl">已测完</div></div>
        <div class="report-card"><div class="num" id="r-online">0</div><div class="lbl">已上线</div></div>
        <div class="report-card"><div class="num" id="r-notstart">0</div><div class="lbl">未开始</div></div>
      </div>
      <div class="report-modules">
        <div class="report-module">
          <div class="rm-title">已进入测试<span class="rm-total-hours" id="rm-entered-hours"></span></div>
          <div class="rm-section">
            <div class="rm-sub">类型分布</div>
            <div class="rm-bars" id="rm-type-entered"></div>
          </div>
          <div class="rm-section">
            <div class="rm-sub">状态分布</div>
            <div class="rm-bars" id="rm-status-entered"></div>
            <div class="rm-note">注：暂停中为测试中的子状态，测试中工时已包含暂停中工时；暂停中百分比 = 暂停中工时 ÷ 测试中工时。</div>
          </div>
          <button class="rm-list-btn" data-scope="entered" type="button">
            <span>任务清单</span>
            <svg class="rm-list-arrow" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="m9 18 6-6-6-6"/></svg>
          </button>
        </div>
        <div class="report-module">
          <div class="rm-title">未进入测试</div>
          <div class="rm-section">
            <div class="rm-sub">类型分布</div>
            <div class="rm-bars" id="rm-type-not"></div>
          </div>
          <div class="rm-section">
            <div class="rm-sub">状态分布</div>
            <div class="rm-bars" id="rm-status-not"></div>
          </div>
          <button class="rm-list-btn" data-scope="not" type="button">
            <span>任务清单</span>
            <svg class="rm-list-arrow" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="m9 18 6-6-6-6"/></svg>
          </button>
        </div>
      </div>
    </section>

    <!-- 批次47：导出PDF用任务详情表格（屏幕隐藏，打印可见） -->
    <table class="rf-detail-table" id="rf-detail-table">
      <thead><tr></tr></thead>
      <tbody></tbody>
    </table>

    <!-- 任务清单 overlay（补充 A：任务统计部分，卡片无操作按钮） -->
    <div class="tl-overlay" id="tl-overlay" hidden>
      <div class="tl-header">
        <button class="tl-back" id="tl-back" type="button">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
          <span>返回</span>
        </button>
        <div class="tl-title" id="tl-title">任务清单</div>
      </div>
      <div class="tl-meta" id="tl-meta"></div>
      <div class="tl-list" id="tl-list"></div>
    </div>
  </div>

  <!-- 数据层脚本（按依赖顺序：config 最先、db.js 紧随，各数据模块按需引入） -->
  <script src="config.js?v=1.3.46"></script>
  <script src="db.js?v=1.3.46"></script>
  <script src="dictionary.js?v=1.3.46"></script>
  <script src="projects.js?v=1.3.46"></script>
  <script src="project-versions.js?v=1.3.46"></script>
  <script src="requirement-tasks.js?v=1.3.46"></script>
  <script src="task-lifecycles.js?v=1.3.46"></script>
  <script src="todos.js?v=1.3.46"></script>
  <script src="todo-lifecycles.js?v=1.3.46"></script>
  <script src="companies.js?v=1.3.46"></script>
  <script src="departments.js?v=1.3.46"></script>
  <script src="users.js?v=1.3.46"></script>
  <script src="report-common.js?v=1.3.46"></script>
  <script src="report-task.js?v=1.3.46"></script>
</body>
</html>
