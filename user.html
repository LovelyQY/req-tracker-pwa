<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>人员管理</title>
<link rel="apple-touch-icon" href="icons/icon-192.png">
<link rel="icon" href="icons/favicon-32.png">
<style>
:root{
  --primary:#1677ff; --primary-light:#4096ff; --bg:#f5f7fa; --surface:#fff;
  --text:#1f2937; --muted:#6b7280; --border:#e5e7eb; --radius:14px; --danger:#ef4444;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
button,a,input,select,textarea,[onclick]{outline:none}
button:focus:not(:focus-visible),a:focus:not(:focus-visible),[onclick]:focus:not(:focus-visible),input:focus:not(:focus-visible),select:focus:not(:focus-visible),textarea:focus:not(:focus-visible){outline:none}
html,body{height:100%}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;
  background:var(--bg);color:var(--text);min-height:100dvh;padding:0;-webkit-font-smoothing:antialiased;
}
.nav-bar{position:sticky;top:0;z-index:10;display:flex;align-items:center;height:52px;padding:0 8px;
  background:rgba(255,255,255,.92);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  border-bottom:1px solid var(--border);padding-top:calc(env(safe-area-inset-top) + 8px)}
.nav-back{width:40px;height:40px;border:none;background:none;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text)}
.nav-back svg{width:22px;height:22px}
.nav-title{font-size:17px;font-weight:700;text-align:center;position:absolute;left:0;right:0;pointer-events:none}
.nav-action{margin-left:auto;font-size:15px;font-weight:600;color:#fff;border:none;cursor:pointer;
  background:linear-gradient(135deg,#1677ff,#4096ff);border-radius:10px;padding:8px 14px;box-shadow:0 4px 12px rgba(22,119,255,.3);-webkit-tap-highlight-color:transparent}
.nav-action:active{transform:translateY(1px)}
.wrap{max-width:560px;margin:0 auto;padding:14px 14px calc(env(safe-area-inset-bottom) + 90px)}
.search-box{display:flex;align-items:center;gap:8px;background:var(--surface);border:1.5px solid var(--border);
  border-radius:12px;padding:0 12px;height:44px;margin-bottom:14px}
.search-box .ic{color:var(--muted);flex-shrink:0}
.search-box input{flex:1;border:none;outline:none;background:none;font-size:15px;height:100%;color:var(--text)}
.card{background:var(--surface);border-radius:var(--radius);overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.05)}
.row{display:flex;align-items:center;gap:12px;padding:13px 16px;border-bottom:1px solid var(--border)}
.row:last-child{border-bottom:none}
.row .main{flex:1;min-width:0}
.row .bname{font-size:15px;font-weight:600;word-break:break-all}
.row .emp{font-size:12px;color:var(--muted);font-weight:400;margin-left:8px}
.row .sub{font-size:12px;color:var(--muted);margin-top:3px;line-height:1.5}
.row .acts{display:flex;gap:6px;flex-shrink:0}
.icon-btn{width:34px;height:34px;border:1px solid var(--border);background:var(--surface);border-radius:9px;
  display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--muted)}
.icon-btn:active{background:#f2f4f7}
.icon-btn.danger{color:var(--danger);border-color:#fecaca}
.icon-btn.danger:active{background:#fef2f2}
.icon-btn svg{width:17px;height:17px}
.badge{font-size:11px;font-weight:600;padding:2px 8px;border-radius:999px;flex-shrink:0}
.badge.dept{background:#eef2ff;color:#4f46e5}
.badge.pos{background:#f0fdf4;color:#16a34a}
/* 人员状态标签（与部门/职位同款 badge，按状态区分颜色） */
.badge.emp-status{font-weight:600}
.badge.emp-status.st-regular{background:#e7f6ec;color:#15a34a}
.badge.emp-status.st-probation{background:#e8f0ff;color:#2f6bff}
.badge.emp-status.st-intern{background:#f1ecff;color:#7c3aed}
.badge.emp-status.st-outsource{background:#fff2e2;color:#d97706}
.badge.emp-status.st-left{background:#f1f3f5;color:#7a869a}
.empty{text-align:center;color:var(--muted);padding:60px 20px;font-size:14px;line-height:1.7}
.empty svg{width:46px;height:46px;opacity:.4;margin-bottom:12px}
.sheet-mask{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:100;display:none}
.sheet-mask.show{display:block}
.sheet{position:fixed;inset:0;left:0;right:0;top:0;bottom:0;z-index:101;background:var(--surface);max-width:none;width:100%;height:100dvh;border-radius:0;transform:none;transition:none;display:none;flex-direction:column;padding:0;overflow:hidden}
.sheet-body{flex:1;overflow:auto;-webkit-overflow-scrolling:touch;padding:16px 14px}
.sheet.show{display:flex}
.sheet-title{font-size:17px;font-weight:700;text-align:center;margin-bottom:14px}
.field{margin-bottom:13px}
.field label{display:block;font-size:13px;color:var(--muted);margin-bottom:6px}
.field label .req{color:var(--danger);margin-left:2px}
.field input,.field select{width:100%;height:48px;padding:0 14px;border:1.5px solid var(--border);border-radius:12px;
  font-size:15px;background:#fafbfc;outline:none;color:var(--text);transition:.2s}
.field select{appearance:none;-webkit-appearance:none;background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='14' height='14' viewBox='0 0 24 24' fill='none' stroke='%239ca3af' stroke-width='2.5'><path d='m6 9 6 6 6-6'/></svg>");background-repeat:no-repeat;background-position:right 14px center;padding-right:38px}
.field input:focus,.field select:focus{border-color:var(--primary);background:#fff;box-shadow:0 0 0 3px rgba(22,119,255,.12)}
.field input.invalid,.field select.invalid{border-color:var(--danger);background:#fff5f5}
.field .err{display:none;color:var(--danger);font-size:12px;margin-top:5px}
.field .err.show{display:block}
.readonly-meta{background:#f8fafc;border:1px dashed var(--border);border-radius:12px;padding:12px 14px;
  font-size:12px;color:var(--muted);line-height:1.8;margin-bottom:14px}
.readonly-meta b{color:var(--text);font-weight:600}
.field-hint{font-size:12px;color:#9ca3af;margin:-4px 0 10px;line-height:1.4}
.sheet-actions{display:flex;gap:12px;position:sticky;bottom:0;z-index:2;background:var(--surface);padding:12px 14px calc(env(safe-area-inset-bottom) + 12px);border-top:1px solid var(--border);margin-top:0}
.btn{flex:1;height:50px;border-radius:12px;font-size:16px;font-weight:600;cursor:pointer;border:none}
.btn-ghost{flex:0 0 38%;border:1.5px solid var(--border);background:#fff;color:var(--text)}
.btn-primary{background:linear-gradient(135deg,#1677ff,#4096ff);color:#fff;box-shadow:0 8px 18px rgba(22,119,255,.32)}
.btn-primary:active{transform:translateY(1px)}
.modal-mask{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;display:none;align-items:center;justify-content:center;padding:24px}
.modal-mask.show{display:flex}
.modal{background:var(--surface);border-radius:16px;padding:22px 20px 18px;width:100%;max-width:320px;text-align:center}
.modal h3{font-size:17px;font-weight:700;margin-bottom:8px}
.modal p{font-size:14px;color:var(--muted);line-height:1.6;margin-bottom:18px;word-break:break-all}
.modal .modal-actions{display:flex;gap:12px}
.modal .btn{flex:1;height:46px;font-size:15px}
.btn-danger{background:var(--danger);color:#fff}
.btn-danger:active{transform:translateY(1px)}
.toast{position:fixed;left:50%;top:24px;transform:translateX(-50%) translateY(-20px);background:rgba(17,24,39,.92);color:#fff;
  padding:10px 18px;border-radius:10px;font-size:14px;z-index:999;opacity:0;transition:.25s;pointer-events:none;max-width:90vw;text-align:center}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.role-pick{display:flex;flex-wrap:wrap;gap:8px;border:1.5px solid var(--border);border-radius:12px;padding:12px;background:#fafbfc;max-height:168px;overflow:auto;margin-bottom:6px}
.role-pick:empty::after{content:'（暂无可用角色）';color:#9ca3af;font-size:13px}
.role-chip{display:inline-flex;align-items:center;gap:6px;padding:6px 12px;border:1px solid var(--border);border-radius:999px;background:#fff;font-size:13px;cursor:pointer;user-select:none;line-height:1.2}
.role-chip input{width:16px;height:16px;margin:0;accent-color:var(--primary);box-shadow:none;outline:none !important}
.role-chip input:focus:not(:focus-visible){box-shadow:none;border-color:var(--border)}
.role-chip.on{border-color:var(--primary);background:#eef4ff;color:var(--primary)}
.role-chip.sys{background:#f5f3ff}
.badge.role{background:#ede9fe;color:#6d28d9}
</style>
<script src="auth.js?v=1.3.55" defer></script>
<script>
  document.addEventListener('DOMContentLoaded', function () {
  (function () {
    try { if (!getSessionAccount()) location.replace('login/classic.html'); }
    catch (e) { location.replace('login/classic.html'); }
  })();
  });
</script>
</head>
<body>

  <div class="nav-bar">
    <button class="nav-back" onclick="goBack()" aria-label="返回">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
    </button>
    <span class="nav-title">人员管理</span>
    <button class="nav-action" onclick="openAdd()">+ 新增</button>
  </div>

  <div class="wrap">
    <div class="search-box">
      <span class="ic"><svg class="search-icon" width="17" height="17" viewBox="0 0 24 24" fill="none"><circle cx="10" cy="10" r="6" fill="#9ca3af" fill-opacity="0.15" stroke="#9ca3af" stroke-width="2.5"/><path d="M15 15 L20 20" stroke="#9ca3af" stroke-width="2.5" stroke-linecap="round"/></svg></span>
      <input id="search" type="search" placeholder="搜索工号 / 姓名 / ID" oninput="render()">
    </div>
    <div id="list"></div>
  </div>

  <div class="sheet-mask" id="sheetMask" onclick="closeSheet()"></div>
  <div class="sheet" id="sheet">
  <div class="nav-bar">
    <button class="nav-back" onclick="closeSheet()" aria-label="返回">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
    </button>
    <span class="nav-title" id="sheetTitle">新增人员</span>
  </div>
  <div class="sheet-body">

    <div class="readonly-meta" id="metaBox" style="display:none"></div>

    <div class="field">
      <label>工号 <span class="req">*</span></label>
      <input id="f-employeeNo" type="text" maxlength="30" placeholder="如：E10086（同时作为登录账号）" oninput="clearErr('employeeNo')">
      <div class="err" id="err-employeeNo"></div>
    </div>
    <div class="field">
      <label>姓名 <span class="req">*</span></label>
      <input id="f-name" type="text" maxlength="30" placeholder="如：张三" oninput="clearErr('name')">
      <div class="err" id="err-name"></div>
    </div>
    <div class="field">
      <label>部门 <span class="req">*</span></label>
      <select id="f-department" onchange="clearErr('departmentId')">
        <option value="">（请选择部门）</option>
      </select>
      <div class="err" id="err-departmentId"></div>
    </div>
    <div class="field">
      <label>职位</label>
      <select id="f-position" onchange="clearErr('positionId')">
        <option value="">（不选 / 暂无职位）</option>
      </select>
      <div class="err" id="err-positionId"></div>
    </div>
    <div class="field">
      <label>人员状态</label>
      <select id="f-status" onchange="clearErr('personStatusCode')">
        <option value="">（请选择状态）</option>
      </select>
      <div class="err" id="err-personStatusCode"></div>
    </div>

    <div class="field-hint">账号默认为工号、昵称默认为姓名，可在「个人信息」页修改；默认密码为 123。</div>

    <div class="field">
      <label>分配角色</label>
      <div class="role-pick" id="f-roles"></div>
      <div class="field-hint">可分配启用的角色（含系统管理员）；保存后写入人员角色，供权限判定使用。</div>
    </div>

    </div>
  <div class="sheet-actions">
      <button class="btn btn-ghost" type="button" onclick="closeSheet()">取消</button>
      <button class="btn btn-primary" type="button" id="saveBtn" onclick="save()">保存</button>
    </div>
  </div>

  <div class="modal-mask" id="confirmMask">
    <div class="modal">
      <h3>删除确认</h3>
      <p id="confirmText">确定删除该人员记录？</p>
      <div class="modal-actions">
        <button class="btn btn-ghost" onclick="closeConfirm()">取消</button>
        <button class="btn btn-danger" onclick="doDelete()">删除</button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script src="config.js?v=1.3.55" defer></script>
  <script src="db.js?v=1.3.55" defer></script>
  <script src="departments.js?v=1.3.55" defer></script>
  <script src="positions.js?v=1.3.55" defer></script>
  <script src="dictionary.js?v=1.3.55" defer></script>
  <script src="users.js?v=1.3.55" defer></script>
  <script src="permissions-registry.js?v=1.3.55" defer></script>
  <script src="permissions.js?v=1.3.55" defer></script>
  <script>
    var editingId = null, deletingId = null;
    var depts = [], positions = [];
    var allRoles = [], roleMap = {}, enabledRoles = [];

    function $(id){ return document.getElementById(id); }
    [c];
      });
    }
    function fmtTime(ts){
      if (!ts) return '—';
      var d = new Date(ts); function p(n){ return (n<10?'0':'')+n; }
      return d.getFullYear()+'-'+p(d.getMonth()+1)+'-'+p(d.getDate())+' '+p(d.getHours())+':'+p(d.getMinutes());
    }
    ,2200); }

    function deptName(id){ for (var i=0;i<depts.length;i++) if (depts[i].id===id) return depts[i].deptName; return ''; }
    function positionName(id){ for (var i=0;i<positions.length;i++) if (positions[i].id===id) return positions[i].positionName; return ''; }

    function loadRefs(){
      var p1 = (typeof RT_DEPTS !== 'undefined') ? RT_DEPTS.getAllDepartments() : Promise.resolve([]);
      var p2 = (typeof RT_POSITIONS !== 'undefined') ? RT_POSITIONS.getAllPositions() : Promise.resolve([]);
      return Promise.all([p1, p2]).then(function (r){
        depts = Array.isArray(r[0]) ? r[0] : [];
        positions = Array.isArray(r[1]) ? r[1] : [];
      });
    }

    // ---------- 角色加载（来自权限模块，仅启用角色可分配；roleMap 供列表回显名称）----------
    function loadRoles(){
      allRoles = []; roleMap = {}; enabledRoles = [];
      if (typeof RT_PERMISSIONS === 'undefined' || !RT_PERMISSIONS.getAllRoles) return Promise.resolve();
      return RT_PERMISSIONS.getAllRoles().then(function (list){
        allRoles = Array.isArray(list) ? list : [];
        allRoles.forEach(function (r){ roleMap[r.id] = r.roleName || '未命名'; });
        enabledRoles = allRoles.filter(function (r){ return r.enabled !== false; });
      }).catch(function(){ /* 权限模块不可用时，不阻断人员管理其他功能 */ });
    }
    function populateRoles(selectedIds){
      var sel = $('f-roles'); if (!sel) return;
      var ids = Array.isArray(selectedIds) ? selectedIds : [];
      if (!enabledRoles.length) { sel.innerHTML = '<span style="color:#9ca3af;font-size:13px">（暂无可用角色，请先在「角色管理」创建）</span>'; return; }
      sel.innerHTML = enabledRoles.map(function (role){
        var on = ids.indexOf(role.id) >= 0 ? ' checked' : '';
        var cls = 'role-chip' + (role.isSystemAdmin ? ' sys' : '') + (on ? ' on' : '');
        return '<label class="'+cls+'"><input type="checkbox" value="'+escapeHtml(role.id)+'"'+on+'> '+escapeHtml(role.roleName || '未命名')+'</label>';
      }).join('');
    }
    function getSelectedRoles(){
      var sel = $('f-roles'); if (!sel) return [];
      return Array.prototype.slice.call(sel.querySelectorAll('input:checked')).map(function (cb){ return cb.value; });
    }

    // ---------- 人员状态（取自字典表 EMPLOYEE_STATUS，实体只存 code）----------
    // 文案回退：即使字典尚未播种，徽标与下拉也能正常显示。
    var EMPL_STATUS_FALLBACK = { REGULAR: '正式员工', PROBATION: '试用期', INTERN: '实习生', OUTSOURCE: '外包', LEFT: '离职' };
    function statusBadgeHtml(code, statusMap){
      var c = code || 'REGULAR';
      var label = (statusMap && statusMap[c]) ? statusMap[c] : (EMPL_STATUS_FALLBACK[c] || '正式员工');
      var cls = 'st-' + (c || 'REGULAR').toLowerCase();
      return '<span class="badge emp-status ' + cls + '">' + escapeHtml(label) + '</span>';
    }
    // 读取字典中的 EMPLOYEE_STATUS，构建 code→name 映射（供徽标展示）
    function loadStatusMap(){
      if (typeof RT_DICT === 'undefined' || !RT_DICT.getDictByType || !RT_DICT.SEED_TYPE) return Promise.resolve({});
      return RT_DICT.getDictByType(RT_DICT.SEED_TYPE.EMPLOYEE_STATUS).then(function(list){
        var m = {}; (Array.isArray(list) ? list : []).forEach(function(r){ m[r.code] = r.name; }); return m;
      }).catch(function(){ return {}; });
    }
    // 填充人员状态下拉：优先用字典文案，缺失时回退本地常量
    function populateStatuses(){
      var sel = $('f-status');
      var opts = [
        { code: 'REGULAR',   name: '正式员工' },
        { code: 'PROBATION', name: '试用期' },
        { code: 'INTERN',    name: '实习生' },
        { code: 'OUTSOURCE', name: '外包' },
        { code: 'LEFT',      name: '离职' }
      ];
      if (typeof RT_DICT !== 'undefined' && RT_DICT.getDictByType && RT_DICT.SEED_TYPE) {
        return RT_DICT.getDictByType(RT_DICT.SEED_TYPE.EMPLOYEE_STATUS).then(function(list){
          if (Array.isArray(list) && list.length) {
            opts = list.slice().sort(function(a, b){
              // 按字典 order 排（与 dictionary.js getAllDict 排序一致）；无 order 的回退 code 字母序
              var oa = (a.order == null ? Infinity : a.order);
              var ob = (b.order == null ? Infinity : b.order);
              if (oa !== ob) return oa - ob;
              return (a.code || '').localeCompare(b.code || '', 'en');
            }).map(function(r){ return { code: r.code, name: r.name }; });
          }
          fillStatusOptions(sel, opts);
        }).catch(function(){ fillStatusOptions(sel, opts); });
      }
      fillStatusOptions(sel, opts);
      return Promise.resolve();
    }
    function fillStatusOptions(sel, opts){
      var cur = sel.value;
      sel.innerHTML = opts.map(function(o){
        return '<option value="' + escapeHtml(o.code) + '">' + escapeHtml(o.name) + '</option>';
      }).join('');
      if (cur) sel.value = cur;
    }

    function render(){
      if (typeof RT_USERS === 'undefined') { showErr('人员数据模块未加载'); return; }
      var q = ($('search').value || '').trim().toLowerCase();
      Promise.all([RT_USERS.getAllUsers(), loadStatusMap()]).then(function(res){
        var list = res[0]; var statusMap = res[1];
        if (q) list = list.filter(function(r){
          return [r.employeeNo, r.name, r.nickname, r.account, r.id]
            .some(function(f){ return (f+'').toLowerCase().indexOf(q) >= 0; });
        });
        var box = $('list');
        if (!list.length) {
          box.innerHTML = '<div class="empty"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="8" r="4"/><path d="M5 21 Q12 14 19 21"/></svg>'
            + '<div>' + (q ? '没有匹配的人员' : '还没有人员，点击右上角「+ 新增」') + '</div></div>';
          return;
        }
        var html = '<div class="card">';
        list.forEach(function(r){
          var dept = r.departmentId ? '<span class="badge dept">'+escapeHtml(deptName(r.departmentId)||'未知部门')+'</span> ' : '';
          var pos = r.positionId ? '<span class="badge pos">'+escapeHtml(positionName(r.positionId)||'未知职位')+'</span> ' : '';
          var st = r.personStatusCode ? statusBadgeHtml(r.personStatusCode, statusMap) + ' ' : '';
          var roleBadges = (r.roleIds || []).map(function (rid){
            var nm = roleMap[rid]; return nm ? '<span class="badge role">'+escapeHtml(nm)+'</span> ' : '';
          }).join('');
          var meta = (dept || pos || st || roleBadges)
            ? dept + pos + st + roleBadges + '<br>创建：'+escapeHtml(r.createdBy||'—')+' · '+fmtTime(r.createdAt)
            : '创建：'+escapeHtml(r.createdBy||'—')+' · '+fmtTime(r.createdAt);
          meta += (r.updatedBy?'<br>更新：'+escapeHtml(r.updatedBy)+' · '+fmtTime(r.updatedAt):'');
          html += '<div class="row">'
            + '<div class="main"><div class="bname">'+escapeHtml(r.name||r.nickname||r.account)+'<span class="emp">工号：'+escapeHtml(r.employeeNo||'—')+'</span></div>'
            + '<div class="sub">'+meta+'</div></div>'
            + '<div class="acts">'
            + '<button class="icon-btn" aria-label="编辑" onclick="openEdit(\''+r.id+'\')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.12 2.12 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg></button>'
            + '<button class="icon-btn danger" aria-label="删除" onclick="openConfirm(\''+r.id+'\')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2m2 0v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6"/></svg></button>'
            + '</div></div>';
        });
        html += '</div>';
        box.innerHTML = html;
      }).catch(function(err){ showErr('读取人员数据失败：'+(err&&err.message?err.message:err)); });
    }
    function showErr(msg){ $('list').innerHTML = '<div class="empty">'+escapeHtml(msg)+'</div>'; }

    function fillSelect(sel, items, idKey, nameKey, placeholder){
      var html = '<option value="">'+placeholder+'</option>';
      (items||[]).forEach(function(it){ html += '<option value="'+escapeHtml(it[idKey])+'">'+escapeHtml(it[nameKey])+'</option>'; });
      sel.innerHTML = html;
    }

    function setErr(field, msg){
      var el = $('err-'+field); if (el){ el.textContent = msg||''; el.classList.toggle('show', !!msg); }
      var input = $(field==='employeeNo'?'f-employeeNo':field==='name'?'f-name':field==='departmentId'?'f-department':field==='positionId'?'f-position':null);
      if (input) input.classList.toggle('invalid', !!msg);
    }
    function clearErr(field){ setErr(field,''); }

    function openSheet(){ $('sheetMask').classList.add('show'); $('sheet').classList.add('show'); }
    function closeSheet(){ $('sheetMask').classList.remove('show'); $('sheet').classList.remove('show'); editingId=null; }

    function resetForm(){
      $('f-employeeNo').value=''; $('f-name').value='';
      $('f-department').value=''; $('f-position').value='';
      $('f-status').value='REGULAR';
      ['employeeNo','name','departmentId','personStatusCode'].forEach(clearErr);
      $('metaBox').style.display='none';
    }

    function openAdd(){
      editingId=null; resetForm();
      loadRefs().then(function(){
        fillSelect($('f-department'), depts, 'id', 'deptName', '（请先在部门管理创建部门）');
        fillSelect($('f-position'), positions, 'id', 'positionName', '（不选 / 暂无职位）');
        return populateStatuses().then(loadRoles).then(function(){ populateRoles([]); });
      }).then(function(){
        $('f-status').value='REGULAR';
        $('sheetTitle').textContent='新增人员'; $('saveBtn').textContent='创建'; openSheet();
      }).catch(function(){ toast('加载部门/职位失败'); });
    }

    function openEdit(id){
      RT_USERS.getUser(id).then(function(r){
        if (!r){ toast('记录不存在'); return; }
        editingId=id; resetForm();
        $('f-employeeNo').value=r.employeeNo||''; $('f-name').value=r.name||'';
        return loadRefs().then(function(){
          fillSelect($('f-department'), depts, 'id', 'deptName', '（请先在部门管理创建部门）');
          fillSelect($('f-position'), positions, 'id', 'positionName', '（不选 / 暂无职位）');
          $('f-department').value=r.departmentId||''; $('f-position').value=r.positionId||'';
          return populateStatuses().then(loadRoles).then(function(){ populateRoles(r.roleIds || []); });
        }).then(function(){
          $('f-status').value=r.personStatusCode || 'REGULAR';
          $('metaBox').style.display='block';
          $('metaBox').innerHTML='创建人：<b>'+escapeHtml(r.createdBy||'—')+'</b>　创建时间：<b>'+fmtTime(r.createdAt)+'</b>';
          $('sheetTitle').textContent='编辑人员'; $('saveBtn').textContent='保存'; openSheet();
        });
      }).catch(function(){ toast('读取失败'); });
    }

    // 兜底：捕获任何未处理的 Promise 拒绝（旧版 SW 缓存的 users.js 在编辑时可能抛出
    // 未捕获的 IndexedDB 异常，UI 会「无反应」。这里统一转成 toast 给用户明确反馈，
    // 并把卡在「保存中…」的按钮恢复，避免「假死」）
    window.addEventListener('unhandledrejection', function (e) {
      console.error('[人员管理] unhandledrejection:', e.reason);
      var btn = $('saveBtn');
      if (btn && btn.disabled) { btn.disabled = false; btn.textContent = '保存'; }
      var msg = (e && e.reason && (e.reason.message || e.reason)) || '未知错误';
      toast('保存失败：' + (typeof msg === 'string' ? msg : (msg && msg.toString ? msg.toString() : '未知错误')));
      e && e.preventDefault && e.preventDefault();
    });

    function save(){
      var saveBtn = $('saveBtn');
      // 防止在「保存中…」状态下被重复点击触发
      if (saveBtn && saveBtn.disabled) return;
      try {
        var isEdit = !!editingId;
        var data = {
          employeeNo: $('f-employeeNo').value,
          name: $('f-name').value,
          departmentId: $('f-department').value,
          positionId: $('f-position').value,
          personStatusCode: $('f-status').value || 'REGULAR'
        };
        console.log('[人员管理] save() 被调用, editingId=' + editingId + ', data=' + JSON.stringify(data));
        if (saveBtn) { saveBtn.disabled = true; saveBtn.textContent = '保存中…'; }
        // ★ 关键：保存过程所有异常都必须在 finally 里恢复按钮，避免「点击无反应」假死
        var restore = function () {
          var b = $('saveBtn');
          if (b) { b.disabled = false; b.textContent = '保存'; }
        };
        try {
          var v = RT_USERS.validatePerson(data);
          console.log('[人员管理] 校验结果: ' + JSON.stringify(v));
          if (!v.ok){
            Object.keys(v.errors).forEach(function(f){ setErr(f, v.errors[f]||''); });
            var input = $(v.first==='employeeNo'?'f-employeeNo':v.first==='name'?'f-name':v.first==='departmentId'?'f-department':v.first==='positionId'?'f-position':null);
            if (input) input.focus();
            restore();
            return;
          }
          var operator = getSessionAccount() || '';
          var p = isEdit ? RT_USERS.updatePerson(editingId, data, operator) : RT_USERS.createPerson(data, operator);
          // ★ 超时保护：若 12 秒内 IndexedDB 操作未返回（如 SW 缓存了旧版、onblocked 卡死等），
          //   自动恢复按钮并 toast 提示，避免「保存无反应」假死
          var timedOut = false;
          var timer = setTimeout(function () {
            timedOut = true;
            console.warn('[人员管理] 保存超时（12s），可能 IndexedDB 被阻塞或 SW 缓存了旧版 users.js，请尝试清除浏览器缓存后刷新');
            restore();
            toast('保存超时，请清除浏览器缓存后重试（或尝试无痕模式打开）');
          }, 12000);
          p.then(function(user){
              if (timedOut) return;
              clearTimeout(timer);
              console.log('[人员管理] 保存成功');
              var userId = isEdit ? editingId : (user && user.id);
              var roleIds = getSelectedRoles();
              var rp = (typeof RT_PERMISSIONS !== 'undefined' && RT_PERMISSIONS.saveUserRoles)
                ? RT_PERMISSIONS.saveUserRoles(userId, roleIds, operator)
                : Promise.resolve();
              rp.then(function(){
                restore();
                closeSheet(); toast(isEdit?'已保存':'已创建（默认密码 123）'); refresh();
              }).catch(function(err){
                restore();
                console.error('[人员管理] 角色分配失败:', err);
                toast('角色分配失败：' + (err && err.message ? err.message : err));
              });
            })
            .catch(function(err){
              if (timedOut) return;
              clearTimeout(timer);
              console.error('[人员管理] 保存失败:', err);
              restore();
              // ★ 把后端错误也映射到字段红框，给用户明确提示
              var msg = (err && err.message) ? err.message : (err + '');
              if (/该工号已存在/.test(msg)) setErr('employeeNo', msg);
              else if (/该账号已存在/.test(msg)) setErr('employeeNo', msg);
              else if (/记录不存在/.test(msg)) { restore(); closeSheet(); toast(msg); refresh(); return; }
              toast('操作失败：' + msg);
            });
        } catch (e) {
          console.error('[人员管理] save() 同步异常:', e);
          restore();
          toast('保存出错：'+(e&&e.message?e.message:e));
        }
      } catch (outerErr) {
        // 双层 try-catch：哪怕最外层也炸了，仍要恢复按钮 + 提示用户
        console.error('[人员管理] save() 最外层异常:', outerErr);
        var b2 = $('saveBtn');
        if (b2) { b2.disabled = false; b2.textContent = '保存'; }
        try { toast('保存出错：'+(outerErr&&outerErr.message?outerErr.message:outerErr)); } catch (_) {}
      }
    }

    function openConfirm(id){ deletingId=id;
      RT_USERS.getUser(id).then(function(r){ $('confirmText').textContent='确定删除「'+(r?(r.name||r.nickname||r.account):'')+'（工号 '+(r?r.employeeNo:'')+'）」这条人员记录吗？此操作不可撤销。'; })
        .catch(function(){ $('confirmText').textContent='确定删除该人员记录？此操作不可撤销。'; });
      $('confirmMask').classList.add('show');
    }
    function closeConfirm(){ $('confirmMask').classList.remove('show'); deletingId=null; }
    function doDelete(){
      if (!deletingId) return; var id=deletingId;
      RT_USERS.deleteUser(id).then(function(){ closeConfirm(); toast('已删除'); refresh(); })
        .catch(function(err){ closeConfirm(); toast('删除失败：'+(err&&err.message?err.message:err)); });
    }

    function refresh(){ loadRefs().then(loadRoles).then(render).catch(render); }

    function init(){
      // 首次进入先播种字典系统枚举（幂等，会补齐新增的人员状态类型），确保状态下拉/徽标可取字典文案
      if (typeof RT_DICT !== 'undefined' && RT_DICT.seedDict) {
        RT_DICT.seedDict(getSessionAccount() || 'system');
      }
      var step = (typeof RT_USERS !== 'undefined' && RT_USERS.migrateAccounts) ? RT_USERS.migrateAccounts() : Promise.resolve(0);
      step.then(function(n){ if (n > 0) console.log('[人员管理] 已从已有账号迁移 ' + n + ' 条到人员表'); })
        .catch(function(e){ console.warn('[人员管理] 迁移已有账号失败：', e); })
        .then(loadRefs).then(loadRoles).then(render).catch(render);
    }

    var rpEl = $('f-roles');
    if (rpEl) rpEl.addEventListener('change', function (e) {
      var c = e.target;
      if (c && c.type === 'checkbox') { var chip = c.closest('.role-chip'); if (chip) chip.classList.toggle('on', c.checked); }
    });

    init();
    console.log('[人员管理] 已加载 users.js + DB schema');
    window.addEventListener('pageshow', refresh);
    document.addEventListener('visibilitychange', function(){ if (document.visibilityState==='visible') refresh(); });
    if ('serviceWorker' in navigator) {
      fetch('version.json?_t='+Date.now(), { cache:'no-store' })
        .then(function(r){ return r.json(); }).then(function(d){ if (d&&d.version) navigator.serviceWorker.register('sw.js?v='+d.version); }).catch(function(){});
    }
  </script>
</body>
</html>
