<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>职位管理</title>
<style>
:root{
  --primary:#1677ff; --primary-light:#4096ff; --bg:#f5f7fa; --surface:#fff;
  --text:#1f2937; --muted:#6b7280; --border:#e5e7eb; --radius:14px; --danger:#ef4444;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;
  background:var(--bg);color:var(--text);min-height:100dvh;padding:0;-webkit-font-smoothing:antialiased;
}
.nav-bar{position:sticky;top:0;z-index:10;display:flex;align-items:center;height:52px;padding:0 8px;
  background:rgba(255,255,255,.92);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  border-bottom:1px solid var(--border);padding-top:calc(env(safe-area-inset-top) + 8px)}
.nav-back{width:40px;height:40px;border:none;background:none;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text)}
.nav-back svg{width:22px;height:22px}
.nav-title{font-size:17px;font-weight:700;text-align:center;position:absolute;left:0;right:0;pointer-events:none}
.nav-action{margin-left:auto;font-size:15px;font-weight:600;color:#fff;border:none;cursor:pointer;
  background:linear-gradient(135deg,#1677ff,#4096ff);border-radius:10px;padding:8px 14px;box-shadow:0 4px 12px rgba(22,119,255,.3);-webkit-tap-highlight-color:transparent}
.nav-action:active{transform:translateY(1px)}
.wrap{max-width:560px;margin:0 auto;padding:14px 14px calc(env(safe-area-inset-bottom) + 90px)}
.search-box{display:flex;align-items:center;gap:8px;background:var(--surface);border:1.5px solid var(--border);
  border-radius:12px;padding:0 12px;height:44px;margin-bottom:14px}
.search-box .ic{color:var(--muted);flex-shrink:0}
.search-box input{flex:1;border:none;outline:none;background:none;font-size:15px;height:100%;color:var(--text)}
.card{background:var(--surface);border-radius:var(--radius);overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.05)}
.row{display:flex;align-items:center;gap:12px;padding:13px 16px;border-bottom:1px solid var(--border)}
.row:last-child{border-bottom:none}
.row .main{flex:1;min-width:0}
.row .bname{font-size:15px;font-weight:600;word-break:break-all}
.row .meta{font-size:12px;color:var(--muted);margin-top:3px;line-height:1.5}
.row .acts{display:flex;gap:6px;flex-shrink:0}
.icon-btn{width:34px;height:34px;border:1px solid var(--border);background:var(--surface);border-radius:9px;
  display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--muted)}
.icon-btn:active{background:#f2f4f7}
.icon-btn.danger{color:var(--danger);border-color:#fecaca}
.icon-btn.danger:active{background:#fef2f2}
.icon-btn svg{width:17px;height:17px}
.badge{font-size:11px;font-weight:600;padding:2px 8px;border-radius:999px;flex-shrink:0}
.badge.level{background:#f0fdf4;color:#16a34a}
.empty{text-align:center;color:var(--muted);padding:60px 20px;font-size:14px;line-height:1.7}
.empty svg{width:46px;height:46px;opacity:.4;margin-bottom:12px}
.sheet-mask{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:100;display:none}
.sheet-mask.show{display:block}
.sheet{position:fixed;left:0;right:0;bottom:0;z-index:101;background:var(--surface);border-radius:18px 18px 0 0;
  padding:18px 18px calc(env(safe-area-inset-bottom) + 22px);transform:translateY(100%);transition:transform .25s ease;max-height:90vh;overflow:auto}
.sheet.show{transform:translateY(0)}
.sheet-title{font-size:17px;font-weight:700;text-align:center;margin-bottom:16px}
.field{margin-bottom:14px}
.field label{display:block;font-size:13px;color:var(--muted);margin-bottom:6px}
.field label .max{float:right;color:#c7ccd4;font-weight:400}
.field input{width:100%;height:48px;padding:0 14px;border:1.5px solid var(--border);border-radius:12px;
  font-size:15px;background:#fafbfc;outline:none;color:var(--text);transition:.2s}
.field input:focus{border-color:var(--primary);background:#fff;box-shadow:0 0 0 3px rgba(22,119,255,.12)}
.field input.invalid{border-color:var(--danger);background:#fff5f5}
.field .err{display:none;color:var(--danger);font-size:12px;margin-top:5px}
.field .err.show{display:block}
.readonly-meta{background:#f8fafc;border:1px dashed var(--border);border-radius:12px;padding:12px 14px;
  font-size:12px;color:var(--muted);line-height:1.8;margin-bottom:14px}
.readonly-meta b{color:var(--text);font-weight:600}
.sheet-actions{display:flex;gap:12px;margin-top:6px}
.btn{flex:1;height:50px;border-radius:12px;font-size:16px;font-weight:600;cursor:pointer;border:none}
.btn-ghost{flex:0 0 38%;border:1.5px solid var(--border);background:#fff;color:var(--text)}
.btn-primary{background:linear-gradient(135deg,#1677ff,#4096ff);color:#fff;box-shadow:0 8px 18px rgba(22,119,255,.32)}
.btn-primary:active{transform:translateY(1px)}
.modal-mask{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;display:none;align-items:center;justify-content:center;padding:24px}
.modal-mask.show{display:flex}
.modal{background:var(--surface);border-radius:16px;padding:22px 20px 18px;width:100%;max-width:320px;text-align:center}
.modal h3{font-size:17px;font-weight:700;margin-bottom:8px}
.modal p{font-size:14px;color:var(--muted);line-height:1.6;margin-bottom:18px;word-break:break-all}
.modal .modal-actions{display:flex;gap:12px}
.modal .btn{flex:1;height:46px;font-size:15px}
.btn-danger{background:var(--danger);color:#fff}
.btn-danger:active{transform:translateY(1px)}
.toast{position:fixed;left:50%;top:24px;transform:translateX(-50%) translateY(-20px);background:rgba(17,24,39,.92);color:#fff;
  padding:10px 18px;border-radius:10px;font-size:14px;z-index:999;opacity:0;transition:.25s;pointer-events:none;max-width:90vw;text-align:center}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
<script src="auth.js?v=1.2.70"></script>
<script>
  (function () {
    try { if (!getSessionAccount()) location.replace('login/classic.html'); }
    catch (e) { location.replace('login/classic.html'); }
  })();
</script>
</head>
<body>

  <div class="nav-bar">
    <button class="nav-back" onclick="location.href='index.html'" aria-label="返回">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
    </button>
    <span class="nav-title">职位管理</span>
    <button class="nav-action" onclick="openAdd()">+ 新增</button>
  </div>

  <div class="wrap">
    <div class="search-box">
      <span class="ic"><svg class="search-icon" width="17" height="17" viewBox="0 0 24 24" fill="none"><circle cx="10" cy="10" r="6" fill="#9ca3af" fill-opacity="0.15" stroke="#9ca3af" stroke-width="2.5"/><path d="M15 15 L20 20" stroke="#9ca3af" stroke-width="2.5" stroke-linecap="round"/></svg></span>
      <input id="search" type="search" placeholder="搜索职位名称 / 编码 / ID" oninput="render()" />
    </div>
    <div id="list"></div>
  </div>

  <div class="sheet-mask" id="sheetMask" onclick="closeSheet()"></div>
  <div class="sheet" id="sheet">
    <div class="sheet-title" id="sheetTitle">新增职位</div>
    <div class="readonly-meta" id="metaBox" style="display:none"></div>
    <div class="field">
      <label>职位名称 <span class="max" id="maxName">0/50</span></label>
      <input id="f-name" type="text" maxlength="50" placeholder="如：前端工程师" oninput="updateCounter('f-name','maxName',50);clearErr('name')">
      <div class="err" id="err-positionName"></div>
    </div>
    <div class="field">
      <label>职位编码 <span class="max" id="maxCode">0/10</span></label>
      <input id="f-code" type="text" maxlength="10" placeholder="如：FE01" oninput="updateCounter('f-code','maxCode',10);clearErr('code')">
      <div class="err" id="err-positionCode"></div>
    </div>
    <div class="field">
      <label>职级 <span class="max" id="maxLevel">0/10</span></label>
      <input id="f-level" type="text" maxlength="10" placeholder="选填，如：中级（可不填）" oninput="updateCounter('f-level','maxLevel',10);clearErr('level')">
      <div class="err" id="err-positionLevel"></div>
    </div>
    <div class="field" id="idRow" style="display:none">
      <label>职位ID（自动生成，不可修改）</label>
      <input id="f-id" type="text" readonly style="background:#f1f5f9;color:var(--muted);font-family:ui-monospace,Menlo,Consolas,monospace">
    </div>
    <div class="sheet-actions">
      <button class="btn btn-ghost" onclick="closeSheet()">取消</button>
      <button class="btn btn-primary" id="saveBtn" onclick="save()">保存</button>
    </div>
  </div>

  <div class="modal-mask" id="confirmMask">
    <div class="modal">
      <h3>删除确认</h3>
      <p id="confirmText">确定删除该职位记录？</p>
      <div class="modal-actions">
        <button class="btn btn-ghost" onclick="closeConfirm()">取消</button>
        <button class="btn btn-danger" onclick="doDelete()">删除</button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script src="db.js?v=1.2.70"></script>
  <script src="positions.js?v=1.2.70"></script>
  <script>
    var editingId = null, deletingId = null;
    function $(id){ return document.getElementById(id); }
    function escapeHtml(s){
      return String(s == null ? '' : s).replace(/[&<>"']/g, function(c){
        return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];
      });
    }
    function fmtTime(ts){
      if (!ts) return '—';
      var d = new Date(ts); function p(n){ return (n<10?'0':'')+n; }
      return d.getFullYear()+'-'+p(d.getMonth()+1)+'-'+p(d.getDate())+' '+p(d.getHours())+':'+p(d.getMinutes());
    }
    function toast(msg){ var t=$('toast'); t.textContent=msg; t.classList.add('show'); clearTimeout(toast._t); toast._t=setTimeout(function(){ t.classList.remove('show'); },2200); }

    function render(){
      if (typeof RT_POSITIONS === 'undefined') { showErr('职位数据模块未加载'); return; }
      var q = ($('search').value || '').trim().toLowerCase();
      RT_POSITIONS.getAllPositions().then(function(list){
        if (q) list = list.filter(function(r){
          return (r.positionName+'').toLowerCase().indexOf(q)>=0 || (r.positionCode+'').toLowerCase().indexOf(q)>=0 || (r.id+'').toLowerCase().indexOf(q)>=0;
        });
        var box = $('list');
        if (!list.length) {
          box.innerHTML = '<div class="empty"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="7" width="18" height="13" rx="2"/><path d="M8 7V5a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>'
            + '<div>' + (q ? '没有匹配的职位' : '还没有职位，点击右上角「+ 新增」') + '</div></div>';
          return;
        }
        var html = '<div class="card">';
        list.forEach(function(r){
          var level = r.positionLevel ? '<span class="badge level">'+escapeHtml(r.positionLevel)+'</span> ' : '';
          html += '<div class="row">'
            + '<div class="main"><div class="bname">'+level+escapeHtml(r.positionName)+'</div>'
            + '<div class="meta">职位ID：<span style="font-family:ui-monospace,monospace">'+escapeHtml(r.id)+'</span><br>'
            + '创建：'+escapeHtml(r.createdBy||'—')+' · '+fmtTime(r.createdAt)
            + (r.updatedBy?'<br>更新：'+escapeHtml(r.updatedBy)+' · '+fmtTime(r.updatedAt):'')+'</div></div>'
            + '<div class="acts">'
            + '<button class="icon-btn" aria-label="编辑" onclick="openEdit(\''+r.id+'\')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.12 2.12 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg></button>'
            + '<button class="icon-btn danger" aria-label="删除" onclick="openConfirm(\''+r.id+'\')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2m2 0v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6"/></svg></button>'
            + '</div></div>';
        });
        html += '</div>';
        box.innerHTML = html;
      }).catch(function(err){ showErr('读取职位数据失败：'+(err&&err.message?err.message:err)); });
    }
    function showErr(msg){ $('list').innerHTML = '<div class="empty">'+escapeHtml(msg)+'</div>'; }

    function updateCounter(i,m,max){ $(m).textContent = $(i).value.length + '/' + max; }
    function setErr(field, msg){
      var el = $('err-'+field); if (el){ el.textContent = msg||''; el.classList.toggle('show', !!msg); }
      var input = $(field==='name'?'f-name':field==='code'?'f-code':'f-level'); if (input) input.classList.toggle('invalid', !!msg);
    }
    function clearErr(field){ setErr(field,''); }
    function openSheet(){ $('sheetMask').classList.add('show'); $('sheet').classList.add('show'); }
    function closeSheet(){ $('sheetMask').classList.remove('show'); $('sheet').classList.remove('show'); editingId=null; }

    function resetForm(){
      $('f-name').value=''; $('f-code').value=''; $('f-level').value='';
      updateCounter('f-name','maxName',50); updateCounter('f-code','maxCode',10); updateCounter('f-level','maxLevel',10);
      ['name','code','level'].forEach(clearErr);
      $('idRow').style.display='none'; $('metaBox').style.display='none';
    }
    function openAdd(){ editingId=null; resetForm(); $('sheetTitle').textContent='新增职位'; $('saveBtn').textContent='创建'; openSheet(); }
    function openEdit(id){
      RT_POSITIONS.getPosition(id).then(function(r){
        if (!r){ toast('记录不存在'); return; }
        editingId=id; resetForm();
        $('f-name').value=r.positionName||''; $('f-code').value=r.positionCode||''; $('f-level').value=r.positionLevel||'';
        updateCounter('f-name','maxName',50); updateCounter('f-code','maxCode',10); updateCounter('f-level','maxLevel',10);
        $('f-id').value=r.id; $('idRow').style.display='block';
        $('metaBox').style.display='block';
        $('metaBox').innerHTML='创建人：<b>'+escapeHtml(r.createdBy||'—')+'</b>　创建时间：<b>'+fmtTime(r.createdAt)+'</b>';
        $('sheetTitle').textContent='编辑职位'; $('saveBtn').textContent='保存'; openSheet();
      }).catch(function(){ toast('读取失败'); });
    }
    function save(){
      var data = { positionName:$('f-name').value, positionCode:$('f-code').value, positionLevel:$('f-level').value };
      var v = RT_POSITIONS.validatePosition(data);
      if (!v.ok){
        ['positionName','positionCode','positionLevel'].forEach(function(f){ setErr(f, v.errors[f]||''); });
        var map={positionName:'f-name',positionCode:'f-code',positionLevel:'f-level'};
        var input=$(map[v.first]); if (input) input.focus();
        return;
      }
      var operator = getSessionAccount() || '';
      var p = editingId ? RT_POSITIONS.updatePosition(editingId, data, operator) : RT_POSITIONS.createPosition(data, operator);
      p.then(function(){ closeSheet(); toast(editingId?'已保存':'已创建'); render(); })
       .catch(function(err){ toast('操作失败：'+(err&&err.message?err.message:err)); });
    }

    function openConfirm(id){ deletingId=id;
      RT_POSITIONS.getPosition(id).then(function(r){ $('confirmText').textContent='确定删除「'+(r?r.positionName:'')+'」这条记录吗？此操作不可撤销。'; })
        .catch(function(){ $('confirmText').textContent='确定删除该职位记录？此操作不可撤销。'; });
      $('confirmMask').classList.add('show');
    }
    function closeConfirm(){ $('confirmMask').classList.remove('show'); deletingId=null; }
    function doDelete(){
      if (!deletingId) return; var id=deletingId;
      RT_POSITIONS.deletePosition(id).then(function(){ closeConfirm(); toast('已删除'); render(); })
        .catch(function(err){ closeConfirm(); toast('删除失败：'+(err&&err.message?err.message:err)); });
    }

    render();
    window.addEventListener('pageshow', render);
    document.addEventListener('visibilitychange', function(){ if (document.visibilityState==='visible') render(); });
    if ('serviceWorker' in navigator) {
      fetch('version.json?_t='+Date.now(), { cache:'no-store' })
        .then(function(r){ return r.json(); }).then(function(d){ if (d&&d.version) navigator.serviceWorker.register('sw.js?v='+d.version); }).catch(function(){});
    }
  </script>
</body>
</html>
