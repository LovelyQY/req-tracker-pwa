  <style>:root {
  --bg: #0f172a;
  --panel: #1e293b;
  --panel-2: #273449;
  --border: #334155;
  --text: #e2e8f0;
  --muted: #94a3b8;
  --primary: #4f46e5;
  --primary-hover: #6366f1;
  --green: #22c55e;
  --yellow: #eab308;
  --red: #ef4444;
  --radius: 12px;
}

* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
}

header {
  position: sticky;
  top: 0;
  z-index: 10;
  background: linear-gradient(135deg, #4f46e5, #7c3aed);
  padding: 18px 20px;
  box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
}

header h1 { margin: 0; font-size: 20px; display: flex; align-items: center; gap: 10px; }
header .sub { font-size: 12px; opacity: 0.85; margin-top: 2px; }

.container { max-width: 820px; margin: 0 auto; padding: 16px 16px 60px; }

.stats { display: flex; gap: 10px; margin: 16px 0; flex-wrap: wrap; }
.stat {
  flex: 1; min-width: 90px; background: var(--panel); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 12px; text-align: center;
}
.stat .num { font-size: 24px; font-weight: 700; }
.stat .lbl { font-size: 12px; color: var(--muted); }

.card {
  background: var(--panel); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 16px; margin-bottom: 14px;
}

form .row { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 10px; }
input, textarea, select {
  background: var(--panel-2); border: 1px solid var(--border); color: var(--text);
  border-radius: 8px; padding: 10px 12px; font-size: 14px; width: 100%; font-family: inherit;
}
input:focus, textarea:focus, select:focus { outline: 2px solid var(--primary); border-color: transparent; }
textarea { resize: vertical; min-height: 60px; }
label { font-size: 12px; color: var(--muted); display: block; margin-bottom: 4px; }

.btn {
  background: var(--primary); color: #fff; border: none; border-radius: 8px;
  padding: 10px 16px; font-size: 14px; cursor: pointer; font-weight: 600; transition: 0.15s;
}
.btn:hover { background: var(--primary-hover); }
.btn.ghost { background: transparent; border: 1px solid var(--border); color: var(--text); }
.btn.danger { background: transparent; border: 1px solid var(--red); color: var(--red); }
.btn.sm { padding: 6px 10px; font-size: 12px; }

.toolbar { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; margin-bottom: 14px; }
.toolbar .grow { flex: 1; min-width: 140px; }

.item { background: var(--panel); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px; margin-bottom: 12px; }
.item .top { display: flex; justify-content: space-between; gap: 10px; align-items: flex-start; }
.item h3 { margin: 0 0 6px; font-size: 16px; }
.item p { margin: 0 0 10px; color: var(--muted); font-size: 14px; white-space: pre-wrap; word-break: break-word; }
.item .meta { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
.badge { font-size: 12px; padding: 3px 9px; border-radius: 999px; font-weight: 600; }
.badge.p-高 { background: rgba(239,68,68,0.18); color: #fca5a5; }
.badge.p-中 { background: rgba(234,179,8,0.18); color: #fde047; }
.badge.p-低 { background: rgba(34,197,94,0.18); color: #86efac; }
.badge.s-待办 { background: rgba(148,163,184,0.18); color: #cbd5e1; }
.badge.s-进行中 { background: rgba(79,70,229,0.22); color: #a5b4fc; }
.badge.s-已完成 { background: rgba(34,197,94,0.22); color: #86efac; }
.item .actions { display: flex; gap: 6px; margin-top: 10px; }
.empty { text-align: center; color: var(--muted); padding: 40px 0; }

.install-tip { font-size: 12px; color: #c7d2fe; margin-top: 8px; }
.install-banner {
  display: flex; align-items: center; justify-content: space-between; gap: 10px;
  background: rgba(79,70,229,0.16); border: 1px solid var(--primary);
  border-radius: var(--radius); padding: 10px 14px; margin-bottom: 14px;
}
.install-banner[hidden] { display: none; }
.ib-text { font-size: 13px; }
.ib-actions { display: flex; gap: 8px; flex-shrink: 0; }
.toast {
  position: fixed; left: 50%; bottom: 24px; transform: translateX(-50%);
  background: #111827; border: 1px solid var(--border); color: var(--text);
  padding: 10px 18px; border-radius: 999px; font-size: 13px; opacity: 0; transition: 0.25s; pointer-events: none; z-index: 50;
}
.toast.show { opacity: 1; }
@media (max-width: 520px) {
  .stat { min-width: 70px; }
  header h1 { font-size: 18px; }
}
</style>
</head>
<body>
  <header>
    <h1>📋 需求跟踪 ReqTracker</h1>
    <div class="sub">轻量需求/任务管理 · 离线可用 · 数据存本地</div>
  </header>

  <div class="install-banner" id="install-banner" hidden>
    <div class="ib-text">📲 可安装为 App，离线也能用</div>
    <div class="ib-actions">
      <button id="install-btn" class="btn sm">安装到主屏幕</button>
      <button id="install-close" class="btn sm ghost">稍后</button>
    </div>
  </div>

  <div class="container">
    <div class="stats">
      <div class="stat"><div class="num" id="stat-total">0</div><div class="lbl">总需求</div></div>
      <div class="stat"><div class="num" id="stat-doing">0</div><div class="lbl">进行中</div></div>
      <div class="stat"><div class="num" id="stat-done">0</div><div class="lbl">已完成</div></div>
    </div>

    <div class="card">
      <form id="form">
        <div class="row">
          <div style="flex:2; min-width:200px;">
            <label>标题</label>
            <input id="f-title" placeholder="例如：实现登录页" maxlength="120" required />
          </div>
          <div style="flex:1; min-width:120px;">
            <label>优先级</label>
            <select id="f-priority">
              <option>低</option><option selected>中</option><option>高</option>
            </select>
          </div>
          <div style="flex:1; min-width:120px;">
            <label>状态</label>
            <select id="f-status">
              <option selected>待办</option><option>进行中</option><option>已完成</option>
            </select>
          </div>
        </div>
        <div style="margin-bottom:10px;">
          <label>描述</label>
          <textarea id="f-desc" placeholder="补充说明（可选）"></textarea>
        </div>
        <div style="display:flex; gap:10px;">
          <button class="btn" id="submit-btn" type="submit">添加需求</button>
          <button class="btn ghost" id="cancel-btn" type="button" style="display:none;">取消</button>
        </div>
      </form>
    </div>

    <div class="toolbar">
      <input class="grow" id="fl-q" placeholder="🔍 搜索标题/描述" />
      <select id="fl-status">
        <option>全部</option><option>待办</option><option>进行中</option><option>已完成</option>
      </select>
      <select id="fl-priority">
        <option>全部</option><option>低</option><option>中</option><option>高</option>
      </select>
    </div>

    <div id="list"></div>
  </div>

  <div class="toast" id="toast"></div>

  <script>// ReqTracker —— 需求/任务跟踪 PWA 逻辑
// 数据持久化在 localStorage，离线可用

const STORE_KEY = 'req-tracker-items';
const PRIORITIES = ['低', '中', '高'];
const STATUSES = ['待办', '进行中', '已完成'];

let items = load();
let filter = { status: '全部', priority: '全部', q: '' };
let editingId = null;

function load() {
  try {
    const raw = localStorage.getItem(STORE_KEY);
    return raw ? JSON.parse(raw) : [];
  } catch (e) {
    return [];
  }
}
function save() {
  localStorage.setItem(STORE_KEY, JSON.stringify(items));
}

function uid() {
  return Date.now().toString(36) + Math.random().toString(36).slice(2, 7);
}

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toast._t);
  toast._t = setTimeout(() => t.classList.remove('show'), 1600);
}

// ---------- 渲染 ----------
function render() {
  renderStats();
  const list = document.getElementById('list');
  const filtered = items.filter((it) => {
    if (filter.status !== '全部' && it.status !== filter.status) return false;
    if (filter.priority !== '全部' && it.priority !== filter.priority) return false;
    if (filter.q && !(`${it.title} ${it.desc}`.toLowerCase().includes(filter.q.toLowerCase()))) return false;
    return true;
  });

  if (filtered.length === 0) {
    list.innerHTML = '<div class="empty">暂无需求。在上方添加第一条吧 ✨</div>';
    return;
  }

  list.innerHTML = filtered
    .sort((a, b) => b.createdAt - a.createdAt)
    .map(
      (it) => `
    <div class="item" data-id="${it.id}">
      <div class="top">
        <h3>${escapeHtml(it.title)}</h3>
        <span class="badge s-${it.status}">${it.status}</span>
      </div>
      ${it.desc ? `<p>${escapeHtml(it.desc)}</p>` : ''}
      <div class="meta">
        <span class="badge p-${it.priority}">优先级 ${it.priority}</span>
        <span style="font-size:12px;color:var(--muted)">${fmtDate(it.createdAt)}</span>
      </div>
      <div class="actions">
        <button class="btn sm" data-act="cycle" data-id="${it.id}">切换状态</button>
        <button class="btn sm ghost" data-act="edit" data-id="${it.id}">编辑</button>
        <button class="btn sm danger" data-act="del" data-id="${it.id}">删除</button>
      </div>
    </div>`
    )
    .join('');
}

function renderStats() {
  const total = items.length;
  const doing = items.filter((i) => i.status === '进行中').length;
  const done = items.filter((i) => i.status === '已完成').length;
  document.getElementById('stat-total').textContent = total;
  document.getElementById('stat-doing').textContent = doing;
  document.getElementById('stat-done').textContent = done;
}

// ---------- 事件 ----------
function onSubmit(e) {
  e.preventDefault();
  const title = document.getElementById('f-title').value.trim();
  const desc = document.getElementById('f-desc').value.trim();
  const priority = document.getElementById('f-priority').value;
  const status = document.getElementById('f-status').value;
  if (!title) return toast('请填写标题');

  if (editingId) {
    const it = items.find((i) => i.id === editingId);
    if (it) Object.assign(it, { title, desc, priority, status });
    toast('已更新');
  } else {
    items.push({ id: uid(), title, desc, priority, status, createdAt: Date.now() });
    toast('已添加');
  }
  save();
  resetForm();
  render();
}

function onListClick(e) {
  const btn = e.target.closest('button[data-act]');
  if (!btn) return;
  const id = btn.dataset.id;
  const it = items.find((i) => i.id === id);
  if (!it) return;
  const act = btn.dataset.act;

  if (act === 'del') {
    if (confirm(`确认删除「${it.title}」？`)) {
      items = items.filter((i) => i.id !== id);
      save();
      render();
      toast('已删除');
    }
  } else if (act === 'cycle') {
    const idx = STATUSES.indexOf(it.status);
    it.status = STATUSES[(idx + 1) % STATUSES.length];
    save();
    render();
  } else if (act === 'edit') {
    editingId = id;
    document.getElementById('f-title').value = it.title;
    document.getElementById('f-desc').value = it.desc;
    document.getElementById('f-priority').value = it.priority;
    document.getElementById('f-status').value = it.status;
    document.getElementById('submit-btn').textContent = '保存修改';
    document.getElementById('cancel-btn').style.display = '';
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }
}

function resetForm() {
  editingId = null;
  document.getElementById('form').reset();
  document.getElementById('f-status').value = '待办';
  document.getElementById('f-priority').value = '中';
  document.getElementById('submit-btn').textContent = '添加需求';
  document.getElementById('cancel-btn').style.display = 'none';
}

function onFilter() {
  filter.status = document.getElementById('fl-status').value;
  filter.priority = document.getElementById('fl-priority').value;
  filter.q = document.getElementById('fl-q').value;
  render();
}

// ---------- 工具 ----------
function escapeHtml(s) {
  return (s || '').replace(/[&<>"']/g, (c) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
}
function fmtDate(ts) {
  const d = new Date(ts);
  const p = (n) => String(n).padStart(2, '0');
  return `${d.getFullYear()}-${p(d.getMonth() + 1)}-${p(d.getDate())} ${p(d.getHours())}:${p(d.getMinutes())}`;
}

// ---------- 初始化 ----------
function init() {
  document.getElementById('form').addEventListener('submit', onSubmit);
  document.getElementById('list').addEventListener('click', onListClick);
  document.getElementById('cancel-btn').addEventListener('click', resetForm);
  ['fl-status', 'fl-priority', 'fl-q'].forEach((id) =>
    document.getElementById(id).addEventListener('input', onFilter)
  );

  // 演示数据（仅首次且无数据时）
  if (items.length === 0 && !localStorage.getItem(STORE_KEY + '-seeded')) {
    items = [
      { id: uid(), title: '示例：实现需求列表页', desc: '展示所有需求，支持筛选与状态切换。', priority: '高', status: '进行中', createdAt: Date.now() - 3600e3 },
      { id: uid(), title: '示例：支持离线访问', desc: '通过 Service Worker 缓存应用壳。', priority: '中', status: '待办', createdAt: Date.now() - 1800e3 }
    ];
    save();
    localStorage.setItem(STORE_KEY + '-seeded', '1');
  }
  render();
}

document.addEventListener('DOMContentLoaded', init);
</script>
  <script>
    // 注册 Service Worker（HTML 网络优先，离线可用）
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js').catch((e) => console.warn('SW 注册失败:', e));
      });
    }
    // 安装到主屏幕：捕获 beforeinstallprompt，绑定按钮
    let deferredPrompt = null;
    const banner = document.getElementById('install-banner');
    const installBtn = document.getElementById('install-btn');
    const installClose = document.getElementById('install-close');

    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      deferredPrompt = e;
      if (banner) banner.hidden = false;
    });

    if (installBtn) {
      installBtn.addEventListener('click', async () => {
        if (!deferredPrompt) {
          alert('当前浏览器不支持一键安装。\n请用 Chrome / Edge / Samsung Internet 打开本页，再点菜单「安装应用 / 添加到主屏幕」。');
          return;
        }
        deferredPrompt.prompt();
        try { await deferredPrompt.userChoice; } catch (_) {}
        deferredPrompt = null;
        if (banner) banner.hidden = true;
      });
    }

    if (installClose) installClose.addEventListener('click', () => banner.hidden = true);
    window.addEventListener('appinstalled', () => { if (banner) banner.hidden = true; });
  </script>
