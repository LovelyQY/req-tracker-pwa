<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>我的状态 · 全屏</title>
<link rel="apple-touch-icon" href="icons/icon-192.png">
<link rel="icon" href="icons/favicon-32.png">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<style>
:root{
  --primary:#1677ff; --primary-light:#4096ff; --bg:#f5f7fa; --surface:#fff;
  --text:#1f2937; --muted:#6b7280; --border:#e5e7eb; --radius:14px;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;
  background:var(--bg);color:var(--text);
  min-height:100dvh;padding:0;-webkit-font-smoothing:antialiased;
}
.nav-bar{
  position:sticky;top:0;z-index:10;
  display:flex;align-items:center;height:52px;padding:0 16px;
  background:rgba(255,255,255,.92);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  border-bottom:1px solid var(--border);
  padding-top:calc(env(safe-area-inset-top) + 8px);
}
.nav-back{
  width:36px;height:36px;border:none;background:none;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;color:var(--text);position:relative;z-index:1;
}
.nav-back svg{width:22px;height:22px}
.nav-title{font-size:17px;font-weight:700;text-align:center;position:absolute;left:0;right:0;flex:none;pointer-events:none}

.status-head{font-size:13px;color:var(--muted);margin:18px 6px 10px}
.status-grid{
  display:grid; grid-template-columns:repeat(3,1fr); gap:10px;
  margin-top:4px;
}
.status-cell{
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  gap:6px; padding:16px 6px;
  background:var(--surface); border:1px solid var(--border); border-radius:var(--radius);
  cursor:pointer; -webkit-tap-highlight-color:transparent; -webkit-user-select:none; user-select:none;
  transition:background .12s,border-color .12s;
}
.status-cell:active{background:#f2f4f7}
.status-cell .status-icon{font-size:26px;line-height:1}
.status-cell .status-label{font-size:13px;color:var(--text);text-align:center}
.status-cell.selected{background:#f0f6ff;border-color:var(--primary)}
.status-cell.selected .status-label{color:var(--primary);font-weight:600}
.status-cell .status-icon-placeholder{display:inline-block;width:26px;height:26px;line-height:1}
</style>
<script src="auth.js?v=1.2.92"></script>
<script>
  // 登录闸门：校验会话是否有效（含过期判断），无效则跳转登录页
  // getSessionAccount 由 auth.js 统一提供（须在其后引入）
  (function () {
    try {
      if (!getSessionAccount()) location.replace('login/classic.html');
    } catch (e) { location.replace('login/classic.html'); }
  })();
</script>
</head>
<body>
  <div class="nav-bar">
    <button class="nav-back" onclick="history.back()" aria-label="返回">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
    </button>
    <span class="nav-title">我的状态</span>
  </div>

  <div style="padding:0 16px calc(env(safe-area-inset-bottom) + 32px)">
    <div class="status-head">选择你当前的状态</div>
    <div class="status-grid" id="status-list"></div>
  </div>

  <script>
    // loadAccounts / saveAccounts / getMyAccount 由 auth.js 统一提供

    // 与 index.html STATUS_MAP 保持一致；「无状态」置首位
    var STATUS_LIST = [
      { key:'none',    icon:'',  label:'无状态',   desc:'暂不设置状态' },
      { key:'busy',    icon:'🔥', label:'忙碌中',   desc:'正在专注，稍后回复' },
      { key:'meeting', icon:'📅', label:'会议中',   desc:'正在开会' },
      { key:'trip',    icon:'✈️', label:'出差中',   desc:'外出公干' },
      { key:'eat',     icon:'🍚', label:'干饭中',   desc:'吃饭勿扰' },
      { key:'leave',   icon:'🏖️', label:'请假中',   desc:'休假中' },
      { key:'drive',   icon:'🚗', label:'驾车中',   desc:'开车注意安全' },
      { key:'break',   icon:'☕', label:'休息一下', desc:'喝杯咖啡' },
      { key:'dnd',     icon:'🔕', label:'请勿打扰', desc:'专注勿扰' },
      { key:'off',     icon:'🎉', label:'牛马下班', desc:'今天先到这' }
    ];

    var me = getMyAccount();
    var cur = (me && me.status) ? me.status : 'none';

    var listEl = document.getElementById('status-list');
    listEl.innerHTML = STATUS_LIST.map(function(it){
      var sel = it.key === cur ? ' selected' : '';
      return '<div class="status-cell' + sel + '" data-key="' + it.key + '" title="' + it.desc + '">'
        + (it.icon ? '<span class="status-icon">' + it.icon + '</span>' : '<span class="status-icon-placeholder"></span>')
        + '<span class="status-label">' + it.label + '</span>'
        + '</div>';
    }).join('');

    listEl.addEventListener('click', function(e){
      var item = e.target.closest('.status-cell');
      if (!item) return;
      var key = item.getAttribute('data-key');
      var acc = getSessionAccount();
      if (!acc){ alert('会话已失效，请重新登录'); location.href = 'login/classic.html'; return; }
      var list = loadAccounts();
      var m = list.filter(function(a){ return a.account === acc; })[0];
      if (!m){ alert('会话已失效，请重新登录'); location.href = 'login/classic.html'; return; }
      m.status = key;
      saveAccounts(list);
      try { sessionStorage.setItem('rt_reopen_drawer', '1'); } catch (e) {}
      if (window.history.length > 1) history.back();
      else location.href = 'index.html';
    });

    // 防止 bfcache（前进/后退缓存）恢复出部署前的旧页面：
    // 从 bfcache 恢复时（event.persisted===true），页面是内存里的旧快照，SW 不会重新请求，
    // 表现为「点进状态页仍是旧版、要再刷一次」。这里强制重新加载以拿到最新版本。
    window.addEventListener('pageshow', function(e){
      if (e.persisted) location.reload();
    });

    // 注册 Service Worker（保持与已发版页面同步）
    fetch('version.json?_t=' + Date.now(), { cache: 'no-store' })
      .then(function(r){ return r.json(); })
      .then(function(d){
        if (d && d.version) navigator.serviceWorker.register('sw.js?v=' + d.version).catch(function(){});
      })
      .catch(function(){});
  </script>
</body>
</html>
