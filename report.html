<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>统计报表</title>
<link rel="apple-touch-icon" href="icons/icon-192.png">
<link rel="icon" href="icons/favicon-32.png">
<link rel="stylesheet" href="styles.css?v=1.3.42" />
<style>
  /* ===== RULES：全局去除移动端点击高亮 + 聚焦蓝框，保留键盘 focus-visible ===== */
  *, *::before, *::after { -webkit-tap-highlight-color: transparent; }
  button, a, input, select, textarea, [onclick] { outline: none; }
  button:focus:not(:focus-visible),
  a:focus:not(:focus-visible),
  [onclick]:focus:not(:focus-visible),
  input:focus:not(:focus-visible),
  select:focus:not(:focus-visible),
  textarea:focus:not(:focus-visible) { outline: none; }

  .wrap{max-width:560px;margin:0 auto;padding:16px 14px calc(env(safe-area-inset-bottom) + 40px)}
  .section-desc{font-size:13px;color:var(--muted,#6b7280);line-height:1.6;margin:4px 4px 14px}

  /* ===== 模块入口列表（同 basic-data.html 风格） ===== */
  .module-list{background:var(--surface,#fff);border-radius:14px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.05)}
  .module-row{
    display:flex;align-items:center;gap:14px;padding:16px;
    background:var(--surface,#fff);border-bottom:1px solid var(--border,#e5e7eb);
    cursor:pointer;-webkit-tap-highlight-color:transparent;-webkit-user-select:none;user-select:none;transition:background .12s}
  .module-row:last-child{border-bottom:none}
  .module-row:active{background:#f2f4f7}
  .module-icon{
    flex-shrink:0;width:44px;height:44px;border-radius:12px;
    display:flex;align-items:center;justify-content:center;color:#fff;
    background:linear-gradient(135deg,#1677ff,#4096ff);box-shadow:0 4px 12px rgba(22,119,255,.25)}
  .module-main{flex:1;min-width:0}
  .module-name{font-size:16px;font-weight:600}
  .module-desc{font-size:12px;color:var(--muted,#6b7280);margin-top:3px;line-height:1.5}
  .module-arrow{color:#c7ccd4;flex-shrink:0}
</style>
<script src="auth.js?v=1.3.42"></script>
<script>
  // 登录闸门：无效会话跳转登录页（与 basic-data.html 同款）
  (function () {
    try { if (!getSessionAccount()) location.replace('login/classic.html'); }
    catch (e) { location.replace('login/classic.html'); }
  })();
</script>
</head>
<body>
  <div class="nav-bar">
    <button class="nav-back" onclick="goBack()" aria-label="返回">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
    </button>
    <span class="nav-title">统计报表</span>
  </div>

  <div class="wrap">
    <p class="section-desc">选择下方模块进入对应统计报表。任务统计、任务事项、缺陷追踪与会议数据分别汇总呈现。</p>
    <div class="module-list" id="moduleList"></div>
  </div>

  <script>
    // 批次 39：入口页仅渲染模块列表，点击进入各自独立报表页（不再同页切换）
    var REPORT_MODULES = [
      { key: 'task',    name: '任务统计',     desc: '按时间维度汇总任务总量、测试工时与测试/上线进度', icon: '<svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3v18h18"/><path d="m7 14 4-4 3 3 5-6"/></svg>' },
      { key: 'todo',    name: '任务事项统计', desc: '统计任务事项的总量、未处理 / 处理中 / 已完成分布', icon: '<svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>' },
      { key: 'bug',     name: '缺陷追踪统计', desc: '统计缺陷总量、未处理 / 处理中 / 已完成 / 待开发 / 已上线分布', icon: '<svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="8" y="6" width="8" height="12" rx="4"/><path d="M12 2v4M5 9l3 2M19 9l-3 2M4 16l4-1M20 16l-4-1"/></svg>' },
      { key: 'meeting', name: '会议统计',     desc: '统计会议总量、未开始 / 已结束 / 已取消分布', icon: '<svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75"/></svg>' }
    ];
    (function renderIndex() {
      var box = document.getElementById('moduleList');
      if (!box) return;
      box.innerHTML = REPORT_MODULES.map(function (m) {
        return '<div class="module-row" data-key="' + m.key + '">' +
          '<div class="module-icon">' + m.icon + '</div>' +
          '<div class="module-main">' +
            '<div class="module-name">' + m.name + '</div>' +
            '<div class="module-desc">' + m.desc + '</div>' +
          '</div>' +
          '<svg class="module-arrow" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"/></svg>' +
        '</div>';
      }).join('');
      box.addEventListener('click', function (e) {
        var node = e.target;
        while (node && node.nodeType === 1) {
          if (node.classList && node.classList.contains('module-row')) {
            navTo('report-' + node.getAttribute('data-key') + '.html');
            return;
          }
          node = node.parentNode;
        }
      });
    })();
  </script>
</body>
</html>
