<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>更新日志</title>
<link rel="apple-touch-icon" href="icons/icon-192.png">
<link rel="icon" href="icons/favicon-32.png">
<style>
:root{
  --primary:#1677ff; --bg:#f5f7fa; --surface:#fff;
  --text:#1f2937; --muted:#6b7280; --border:#e5e7eb; --radius:14px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
button,a,input,select,textarea,[onclick]{outline:none}
button:focus:not(:focus-visible),a:focus:not(:focus-visible),[onclick]:focus:not(:focus-visible),input:focus:not(:focus-visible),select:focus:not(:focus-visible),textarea:focus:not(:focus-visible){outline:none}
html,body{height:100%}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;
  background:var(--bg);color:var(--text);
  -webkit-font-smoothing:antialiased;
  display:flex;flex-direction:column;height:100dvh;overflow:hidden;
}
/* 顶部导航栏（与新增任务页一致：左返回箭头 + 居中标题） */
.nav-bar{
  position:sticky;top:0;z-index:10;display:flex;align-items:center;height:52px;
  padding:calc(env(safe-area-inset-top) + 6px) 4px 0 4px;flex:none;
  background:rgba(255,255,255,.92);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  border-bottom:1px solid var(--border);
}
.nav-back{width:40px;height:40px;border:none;background:none;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text)}
.nav-back svg{width:22px;height:22px}
.nav-title{font-size:17px;font-weight:700;text-align:center;position:absolute;left:0;right:0;pointer-events:none}

/* 主体：占满剩余高度，卡片内列表滚动 */
.page{flex:1 1 auto;min-height:0;max-width:560px;width:100%;margin:0 auto;display:flex;flex-direction:column;padding:14px 14px 0}
.search-box{display:flex;align-items:center;gap:8px;background:var(--surface);border:1.5px solid var(--border);
  border-radius:12px;padding:0 12px;height:44px;margin-bottom:14px;flex:none}
.search-box .ic{color:var(--muted);flex-shrink:0}
.search-box input{flex:1;border:none;outline:none;background:none;font-size:15px;height:100%;color:var(--text)}

/* 更新日志：平铺（无卡片外壳，灰底 + 分隔线）；
   日志项加 12px 水平内边距，与搜索框内容（边框内 + 12px 内边距）保持视觉对齐 */
.clog-body{flex:1 1 auto;min-height:0;overflow-y:auto;overscroll-behavior:contain;-webkit-overflow-scrolling:touch}
.changelog-item{padding:14px 12px;border-bottom:1px solid var(--border)}
.changelog-item:last-child{border-bottom:none}
.changelog-top{display:flex;align-items:center;gap:8px;margin-bottom:4px}
.changelog-ver{font-size:12px;font-weight:600;color:#fff;background:var(--primary);padding:2px 8px;border-radius:999px}
.changelog-date{font-size:12px;color:var(--muted)}
.changelog-msg{font-size:14px;line-height:1.5;color:#334155;white-space:pre-wrap;word-break:break-word}
.changelog-empty,.changelog-loading{text-align:center;color:var(--muted);font-size:13px;padding:40px 0}

/* 底部分页栏（仿新增任务模态框 .modal-footer：固定底部、上边框、按钮区） */
.pagination-bar{flex:none;position:sticky;bottom:0;z-index:5;display:flex;
  padding:10px 14px calc(10px + env(safe-area-inset-bottom));
  background:rgba(255,255,255,.96);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  border-top:1px solid var(--border);max-width:560px;width:100%;margin:0 auto}
.pagination-bar .form-actions{display:flex;gap:10px;width:100%}
/* 分页按钮：与新增任务「取消」按钮完全一致（胶囊形 ghost） */
.btn{display:inline-flex;align-items:center;justify-content:center;border:none;border-radius:999px;
  padding:7px 16px;font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap;font-family:inherit;
  transition:.15s;gap:4px}
.btn:disabled{opacity:.45;cursor:not-allowed}
.btn.ghost{background:transparent;border:1px solid var(--border);color:var(--muted)}
.btn.ghost:hover:not(:disabled){background:#f9fafb}
.btn.primary{background:var(--primary);color:#fff}
.pagination-bar .form-actions .btn{flex:1;padding:11px 0}
.page-info{flex:1;display:flex;align-items:center;justify-content:center;font-size:13px;color:var(--muted)}
</style>
<script src="auth.js?v=1.2.96"></script>
<script>
  (function () {
    try { if (!getSessionAccount()) location.replace('login/classic.html'); }
    catch (e) { location.replace('login/classic.html'); }
  })();
</script>
</head>
<body>

  <div class="nav-bar">
    <button class="nav-back" onclick="goBack()" aria-label="返回">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
    </button>
    <span class="nav-title">更新日志</span>
  </div>

  <div class="page">
    <div class="search-box">
      <span class="ic"><svg width="17" height="17" viewBox="0 0 24 24" fill="none"><circle cx="10" cy="10" r="6" fill="#9ca3af" fill-opacity="0.15" stroke="#9ca3af" stroke-width="2.5"/><path d="M15 15 L20 20" stroke="#9ca3af" stroke-width="2.5" stroke-linecap="round"/></svg></span>
      <input id="search" type="search" placeholder="搜索版本 / 说明" oninput="onSearch()" />
    </div>
    <div class="clog-body" id="changelog-list"></div>
  </div>

  <!-- 底部分页栏（仿新增任务模态框底部操作栏） -->
  <div class="pagination-bar">
    <div class="form-actions">
      <button class="btn ghost" id="prevPage" type="button">上一页</button>
      <span class="page-info" id="pageInfo">第 1 / 1 页</span>
      <button class="btn ghost" id="nextPage" type="button">下一页</button>
    </div>
  </div>

  <script>
    function $(id){ return document.getElementById(id); }
    function escapeHtml(s){
      return String(s == null ? '' : s).replace(/[&<>"']/g, function(c){
        return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];
      });
    }
    // 解析本地 CHANGELOG.md（与主页同一套规则）
    function parseChangelogMd(text){
      var items = [], cur = null;
      var headerRe = /^##\s+v(\d+\.\d+\.\d+)\s*\(([^)]*)\)/;
      String(text).split('\n').forEach(function(line){
        var m = line.match(headerRe);
        if (m){ if (cur) items.push(cur); cur = { version: m[1], date: m[2], message: '' }; }
        else if (cur && line.trim() !== '') { cur.message += (cur.message ? '\n' : '') + line.trim(); }
      });
      if (cur) items.push(cur);
      return items;
    }
    function withSyncLine(msg, version){
      if (!version) return msg;
      var kept = String(msg || '').split('\n').filter(function(raw){
        var t = raw.trim();
        if (!t) return true;
        if (/^-?\s*同步升级到 v\d+\.\d+\.\d+\s*$/.test(t)) return false;
        if (/^v\d+\.\d+\.\d+\s*$/.test(t)) return false;
        return true;
      });
      kept.push('- 同步升级到 v' + version);
      return kept.join('\n');
    }

    var PAGE_SIZE = 10;     // 与 in-app 更新日志弹窗 CHANGELOG_PAGE_SIZE 一致
    var currentPage = 0;
    var allItems = [];

    function render(){
      var q = ($('search').value || '').trim().toLowerCase();
      var list = allItems;
      if (q) list = allItems.filter(function(it){ return ((it.version||'') + ' ' + (it.date||'') + ' ' + (it.message||'')).toLowerCase().indexOf(q) >= 0; });
      var total = list.length;
      var totalPages = Math.max(1, Math.ceil(total / PAGE_SIZE));
      if (currentPage >= totalPages) currentPage = totalPages - 1;
      if (currentPage < 0) currentPage = 0;
      var start = currentPage * PAGE_SIZE;
      var pageItems = list.slice(start, start + PAGE_SIZE);

      var box = $('changelog-list');
      if (!pageItems.length){ box.innerHTML = '<div class="changelog-empty">' + (q ? '没有匹配的更新记录' : '暂无更新日志') + '</div>'; }
      else {
        box.innerHTML = pageItems.map(function(it){
          var msg = withSyncLine(it.message, it.version);
          return '<div class="changelog-item"><div class="changelog-top">'
            + (it.version ? '<span class="changelog-ver">v' + escapeHtml(it.version) + '</span>' : '')
            + '<span class="changelog-date">' + escapeHtml(it.date) + '</span></div>'
            + '<div class="changelog-msg">' + escapeHtml(msg) + '</div></div>';
        }).join('');
      }
      // 分页栏状态
      $('pageInfo').textContent = '第 ' + (currentPage + 1) + ' / ' + totalPages + ' 页';
      $('prevPage').disabled = (currentPage <= 0);
      $('nextPage').disabled = (currentPage >= totalPages - 1);
    }
    function onSearch(){ currentPage = 0; render(); }
    function changePage(delta){ currentPage += delta; render(); }

    async function load(){
      var ctrl = new AbortController();
      var timer = setTimeout(function(){ ctrl.abort(); }, 5000);
      try {
        var res = await fetch('CHANGELOG.md?_t=' + Date.now(), { cache: 'no-store', signal: ctrl.signal });
        if (!res.ok) throw new Error('not found');
        allItems = parseChangelogMd(await res.text());
      } catch (e) {
        if (!allItems.length) allItems = [{ version: '', date: '', message: '更新日志加载失败，请检查网络后重试' }];
      } finally { clearTimeout(timer); }
      window.__changelogAll = allItems;
      currentPage = 0;
      render();
    }
    load();

    $('prevPage').addEventListener('click', function(){ changePage(-1); });
    $('nextPage').addEventListener('click', function(){ changePage(1); });

    // 注册 Service Worker（与全站一致）
    if ('serviceWorker' in navigator) {
      fetch('version.json?_t=' + Date.now(), { cache: 'no-store' })
        .then(function(r){ return r.json(); })
        .then(function(d){ if (d && d.version) navigator.serviceWorker.register('sw.js?v=' + d.version); })
        .catch(function(){});
    }
  </script>
</body>
</html>
