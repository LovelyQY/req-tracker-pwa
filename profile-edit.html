<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>编辑资料 · 全屏</title>
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<style>
:root{
  --primary:#1677ff; --primary-light:#4096ff; --bg:#f5f7fa; --surface:#fff;
  --text:#1f2937; --muted:#6b7280; --border:#e5e7eb; --radius:14px;
  --danger:#ef4444;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;
  background:var(--surface);color:var(--text);
  min-height:100dvh;padding:0;-webkit-font-smoothing:antialiased;
}

/* 顶部导航 */
.nav-bar{
  position:sticky;top:0;z-index:10;
  display:flex;align-items:center;height:52px;padding:0 16px 0 4px;
  background:rgba(255,255,255,.92);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  border-bottom:1px solid var(--border);
  padding-top:calc(env(safe-area-inset-top) + 8px);
}
.nav-back{
  width:36px;height:36px;border:none;background:none;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;color:var(--text);
}
.nav-back svg{width:22px;height:22px}
.nav-title{font-size:17px;font-weight:700;margin-left:8px;flex:1}

/* 主内容卡片 */
.card{
  width:100%;min-height:calc(100dvh - 60px);background:var(--surface);
  padding:24px 20px calc(env(safe-area-inset-bottom) + 32px);
  display:flex;flex-direction:column;gap:8px;
}

.field-label{font-size:14px;color:var(--muted);margin:6px 2px 2px}
.field-label .req{color:var(--danger);margin-left:2px}
.field-hint{font-size:12px;color:var(--muted);margin:0 2px 8px;line-height:1.4}

.input, .textarea{
  width:100%;border:1px solid var(--border);border-radius:var(--radius);
  padding:14px 14px;font-size:15px;color:var(--text);background:var(--surface);
  outline:none;font-family:inherit;transition:border-color .15s;
}
.input:focus, .textarea:focus{border-color:var(--primary)}
.input.invalid, .textarea.invalid{border-color:var(--danger);background:#fff5f5}
.textarea{resize:vertical;min-height:120px;line-height:1.6}
.input + .input{margin-top:10px}

.counter{font-size:12px;color:var(--muted);text-align:right;margin:6px 2px 0}
.counter.over{color:#ef4444}

.err{display:none;color:#ef4444;font-size:12px;margin:6px 2px 0;line-height:1.4}

/* 按钮（同注册页：主按钮 + 幽灵按钮等宽） */
.btn-row{display:flex;gap:12px;margin-top:24px}
.btn-primary,.btn-ghost{
  flex:1;height:50px;border:none;border-radius:var(--radius);
  font-size:16px;font-weight:600;cursor:pointer;
  -webkit-tap-highlight-color:transparent;-webkit-user-select:none;user-select:none;
}
.btn-primary{background:var(--primary);color:#fff}
.btn-primary:active{background:#0e63d6}
.btn-ghost{background:var(--surface);color:var(--text);border:1px solid var(--border)}
.btn-ghost:active{background:#f2f4f7}
.btn-primary:focus:not(:focus-visible),.btn-ghost:focus:not(:focus-visible),
.btn-primary:active,.btn-ghost:active{outline:none}
</style>
<script src="auth.js?v=1.2.70"></script>
<script src="db.js?v=1.2.70"></script>
<script src="users.js?v=1.2.70"></script>
<script>
  // 登录闸门：校验会话是否有效（含过期判断），无效则跳转登录页
  // getSessionAccount 由 auth.js 统一提供（须在其后引入）
  (function () {
    try {
      if (!getSessionAccount()) location.replace('login/classic.html');
    } catch (e) { location.replace('login/classic.html'); }
  })();
</script>
</head>
<body>

  <!-- 顶部导航 -->
  <div class="nav-bar">
    <button class="nav-back" onclick="history.back()" aria-label="返回">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
    </button>
    <span class="nav-title" id="ed-title">编辑</span>
  </div>

  <!-- 内容 -->
  <div class="card">
    <div class="field-label" id="ed-label">内容</div>
    <div class="field-hint" id="ed-hint" style="display:none"></div>

    <input class="input" id="ed-input" type="text" style="display:none" autocomplete="off">
    <input class="input" id="ed-input2" type="text" style="display:none" autocomplete="off">
    <textarea class="textarea" id="ed-textarea" style="display:none"></textarea>

    <div class="counter" id="ed-counter" style="display:none">0/100</div>
    <p class="err" id="ed-err"></p>

    <div class="btn-row">
      <button class="btn-ghost" onclick="history.back()">取消</button>
      <button class="btn-primary" onclick="saveField()">保存</button>
    </div>
  </div>

  <script>
    // 个人信息编辑：以「人员表（users）」为数据源，按字段单独读写（RT_USERS.updateProfile 支持按需更新）。
    // 支持字段：nickname / tags / signature（账号/密码/手机/邮箱已移至「账号与安全」页）
    var FIELDS = {
      nickname: { label:'昵称', type:'text', max:10, placeholder:'1-10 位',
        validate: function(v){ if (!v) return '请输入昵称'; if (v.length > 10) return '昵称最多 10 位'; return ''; } },
      tags: { label:'标签', type:'text', max:100, placeholder:'多个标签用空格或逗号分隔',
        hint:'每个标签 ≤ 10 字，最多 10 个',
        validate: function(v){
          var tags = v.split(/[\s,，、]+/).map(function(t){ return t.trim(); }).filter(function(t){ return t; });
          for (var i=0;i<tags.length;i++){ if (tags[i].length > 10) return '标签「' + tags[i] + '」超过 10 字'; }
          if (tags.length > 10) return '最多 10 个标签';
          return '';
        } },
      signature: { label:'个性签名', type:'textarea', max:100, placeholder:'一句话介绍自己',
        counter:true, validate: function(v){ if (v.length > 100) return '个性签名最多 100 字'; return ''; } }
    };

    var params = new URLSearchParams(location.search);
    var field = params.get('field') || 'nickname';
    var def = FIELDS[field] || FIELDS.nickname;
    var currentRec = null;

    var inputEl = document.getElementById('ed-input');
    var input2El = document.getElementById('ed-input2');
    var taEl = document.getElementById('ed-textarea');
    var counterEl = document.getElementById('ed-counter');
    var hintEl = document.getElementById('ed-hint');
    var titleEl = document.getElementById('ed-title');
    var labelEl = document.getElementById('ed-label');

    function splitTags(s){
      return String(s==null?'':s).split(/[\s,，、]+/).map(function(t){return t.trim();}).filter(function(t){return t;});
    }
    function showErr(msg){ var el=document.getElementById('ed-err'); el.textContent=msg; el.style.display='block'; }
    function clearErr(){ var el=document.getElementById('ed-err'); el.textContent=''; el.style.display='none'; }
    function markInvalid(bad){ [inputEl, input2El, taEl].forEach(function(e){ if(e) e.classList.toggle('invalid', !!bad); }); }

    async function init() {
      var acc = getSessionAccount();
      if (!acc) { location.replace('login/classic.html'); return; }
      // 确保人员在 users 表存在（legacy 账号首次进入时补齐）
      if (typeof RT_USERS !== 'undefined' && RT_USERS.ensurePerson) {
        try { await RT_USERS.ensurePerson(acc); } catch (e) {}
      }
      var rec = (typeof RT_USERS !== 'undefined') ? await RT_USERS.getUserByAccount(acc) : null;
      if (!rec) {
        var m = getMyAccount();
        rec = m ? { account:m.account, nickname:m.nickname, phone:m.phone||'', email:m.email||'', tags:(Array.isArray(m.tags)?m.tags.join(' '):''), signature:m.bio||'' } : null;
      }
      if (!rec) { alert('会话已失效，请重新登录'); location.href='login/classic.html'; return; }
      currentRec = rec;

      titleEl.textContent = '编辑' + def.label;
      labelEl.textContent = def.label + (def.required ? ' *' : '');
      if (def.hint) { hintEl.textContent = def.hint; hintEl.style.display = 'block'; }

      var initial = '';
      if (field === 'nickname') initial = rec.nickname || '';
      else if (field === 'tags') initial = splitTags(rec.tags).join(' ');
      else if (field === 'signature') initial = rec.signature || '';

      if (def.type === 'textarea') {
        taEl.style.display = 'block';
        taEl.maxLength = def.max;
        taEl.placeholder = def.placeholder || '';
        taEl.value = initial;
        taEl.focus();
        if (def.counter) { counterEl.style.display = 'block'; updateCounter(); taEl.addEventListener('input', updateCounter); }
      } else {
        inputEl.type = 'text'; inputEl.style.display = 'block';
        inputEl.maxLength = def.max; inputEl.placeholder = def.placeholder || '';
        inputEl.value = initial; inputEl.focus();
        inputEl.addEventListener('input', clearErr); inputEl.addEventListener('input', function(){ markInvalid(false); });
      }
    }

    function updateCounter(){
      var len = taEl.value.length;
      counterEl.textContent = len + '/' + def.max;
      counterEl.classList.toggle('over', len > def.max);
    }

    function saveField(){
      clearErr(); markInvalid(false);
      var raw = def.type === 'textarea' ? taEl.value.trim() : inputEl.value.trim();
      var msg = def.validate(raw);
      if (msg) { showErr(msg); markInvalid(true); return; }

      var patch = {};
      if (field === 'tags') {
        patch.tags = splitTags(raw).join(' ');
      } else {
        patch[field] = raw;
      }

      var operator = getSessionAccount() || '';
      if (currentRec && currentRec.id && typeof RT_USERS !== 'undefined' && RT_USERS.updateProfile) {
        RT_USERS.updateProfile(currentRec.id, patch, operator)
          .then(function(){ history.back(); })
          .catch(function(err){ showErr('保存失败：' + (err && err.message ? err.message : err)); markInvalid(true); });
      } else {
        // 兜底：写 legacy rt_accounts
        var acc = getSessionAccount();
        var list = loadAccounts();
        var meObj = list.filter(function(a){ return a.account === acc; })[0];
        if (!meObj) { alert('会话已失效，请重新登录'); location.href='login/classic.html'; return; }
        if (field === 'nickname') meObj.nickname = raw;
        else if (field === 'tags') meObj.tags = splitTags(raw);
        else if (field === 'signature') meObj.bio = raw;
        saveAccounts(list);
        history.back();
      }
    }

    // 注册 Service Worker（与主应用一致：刷新一次即可同步本页）
    if ('serviceWorker' in navigator) {
      fetch('version.json?_t=' + Date.now(), { cache: 'no-store' })
        .then(function(r){ return r.json(); })
        .then(function(d){ if (d && d.version) navigator.serviceWorker.register('sw.js?v=' + d.version).catch(function(){}); })
        .catch(function(){});
    }

    init();
  </script>

</body>
</html>
