<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>部门管理</title>
<link rel="apple-touch-icon" href="icons/icon-192.png">
<link rel="icon" href="icons/favicon-32.png">
<style>
:root{
  --primary:#1677ff; --primary-light:#4096ff; --bg:#f5f7fa; --surface:#fff;
  --text:#1f2937; --muted:#6b7280; --border:#e5e7eb; --radius:14px; --danger:#ef4444;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
button,a,input,select,textarea,[onclick]{outline:none}
button:focus:not(:focus-visible),a:focus:not(:focus-visible),[onclick]:focus:not(:focus-visible),input:focus:not(:focus-visible),select:focus:not(:focus-visible),textarea:focus:not(:focus-visible){outline:none}
html,body{height:100%}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;
  background:var(--bg);color:var(--text);min-height:100dvh;padding:0;-webkit-font-smoothing:antialiased;
}

/* 顶部导航 */
.nav-bar{
  position:sticky;top:0;z-index:10;display:flex;align-items:center;height:52px;padding:0 8px;
  background:rgba(255,255,255,.92);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  border-bottom:1px solid var(--border);padding-top:calc(env(safe-area-inset-top) + 8px)}
.nav-back{width:40px;height:40px;border:none;background:none;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text)}
.nav-back svg{width:22px;height:22px}
.nav-title{font-size:17px;font-weight:700;text-align:center;position:absolute;left:0;right:0;pointer-events:none}
.nav-action{margin-left:auto;font-size:15px;font-weight:600;color:#fff;border:none;cursor:pointer;
  background:linear-gradient(135deg,#1677ff,#4096ff);border-radius:10px;padding:8px 14px;
  box-shadow:0 4px 12px rgba(22,119,255,.3);-webkit-tap-highlight-color:transparent}
.nav-action:active{transform:translateY(1px)}

.wrap{max-width:560px;margin:0 auto;padding:14px 14px calc(env(safe-area-inset-bottom) + 90px)}

/* 搜索框 */
.search-box{display:flex;align-items:center;gap:8px;background:var(--surface);border:1.5px solid var(--border);
  border-radius:12px;padding:0 12px;height:44px;margin-bottom:14px}
.search-box .ic{color:var(--muted);flex-shrink:0}
.search-box input{flex:1;border:none;outline:none;background:none;font-size:15px;height:100%;color:var(--text)}

/* 分组卡片（按公司） */
.group{background:var(--surface);border-radius:var(--radius);margin-bottom:14px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.05)}
.group-head{display:flex;align-items:center;gap:10px;padding:13px 16px;border-bottom:1px solid var(--border);
  background:linear-gradient(135deg,#f5f9ff,#eef4ff)}
.group-head .gname{font-size:15px;font-weight:700;word-break:break-all}
.group-head .gcode{font-size:12px;color:var(--primary);background:#eff6ff;padding:2px 8px;border-radius:999px;font-weight:600}
.group-head .gcount{margin-left:auto;font-size:12px;color:var(--muted)}

/* 行 */
.row{display:flex;align-items:center;gap:12px;padding:13px 16px;border-bottom:1px solid var(--border)}
.row:last-child{border-bottom:none}
.row.child{background:#fcfdff}
.row .main{flex:1;min-width:0}
.row .bname{font-size:15px;font-weight:600;word-break:break-all}
.row .meta{font-size:12px;color:var(--muted);margin-top:3px;line-height:1.5}
.row .acts{display:flex;gap:6px;flex-shrink:0}
.icon-btn{width:34px;height:34px;border:1px solid var(--border);background:var(--surface);border-radius:9px;
  display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--muted)}
.icon-btn:active{background:#f2f4f7}
.icon-btn.danger{color:var(--danger);border-color:#fecaca}
.icon-btn.danger:active{background:#fef2f2}
.icon-btn svg{width:17px;height:17px}

/* 空状态 */
.empty{text-align:center;color:var(--muted);padding:60px 20px;font-size:14px;line-height:1.7}
.empty svg{width:46px;height:46px;opacity:.4;margin-bottom:12px}

/* 底部抽屉表单 */
.sheet-mask{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:100;display:none}
.sheet-mask.show{display:block}
.sheet{position:fixed;left:0;right:0;bottom:0;z-index:101;background:var(--surface);
  border-radius:18px 18px 0 0;padding:18px 18px calc(env(safe-area-inset-bottom) + 22px);
  transform:translateY(100%);transition:transform .25s ease;max-height:90vh;overflow:auto}
.sheet.show{transform:translateY(0)}
.sheet-title{font-size:17px;font-weight:700;text-align:center;margin-bottom:16px}
.field{margin-bottom:14px}
.field label{display:block;font-size:13px;color:var(--muted);margin-bottom:6px}
.field label .max{float:right;color:#c7ccd4;font-weight:400}
.field input, .field select{width:100%;height:48px;padding:0 14px;border:1.5px solid var(--border);border-radius:12px;
  font-size:15px;background:#fafbfc;outline:none;color:var(--text);transition:.2s;appearance:none}
.field select{background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='16' height='16' viewBox='0 0 24 24' fill='none' stroke='%236b7280' stroke-width='2'><path d='m6 9 6 6 6-6'/></svg>");background-repeat:no-repeat;background-position:right 14px center}
.field input:focus, .field select:focus{border-color:var(--primary);background:#fff;box-shadow:0 0 0 3px rgba(22,119,255,.12)}
.field input.invalid, .field select.invalid{border-color:var(--danger);background:#fff5f5}
.field .err{display:none;color:var(--danger);font-size:12px;margin-top:5px}
.field .err.show{display:block}
.field select:disabled{background:#f1f5f9;color:var(--muted);cursor:not-allowed;-webkit-text-fill-color:var(--muted)}
.field .hint{display:none;font-size:12px;color:var(--primary);margin-top:6px}
.readonly-meta{background:#f8fafc;border:1px dashed var(--border);border-radius:12px;padding:12px 14px;
  font-size:12px;color:var(--muted);line-height:1.8;margin-bottom:14px}
.readonly-meta b{color:var(--text);font-weight:600}
.readonly-meta .idline{font-family:ui-monospace,Menlo,Consolas,monospace;word-break:break-all}
.sheet-actions{display:flex;gap:12px;margin-top:6px}
.btn{flex:1;height:50px;border-radius:12px;font-size:16px;font-weight:600;cursor:pointer;border:none}
.btn-ghost{flex:0 0 38%;border:1.5px solid var(--border);background:#fff;color:var(--text)}
.btn-primary{background:linear-gradient(135deg,#1677ff,#4096ff);color:#fff;box-shadow:0 8px 18px rgba(22,119,255,.32)}
.btn-primary:active{transform:translateY(1px)}

/* 删除确认浮层 */
.modal-mask{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;display:none;align-items:center;justify-content:center;padding:24px}
.modal-mask.show{display:flex}
.modal{background:var(--surface);border-radius:16px;padding:22px 20px 18px;width:100%;max-width:320px;text-align:center}
.modal h3{font-size:17px;font-weight:700;margin-bottom:8px}
.modal p{font-size:14px;color:var(--muted);line-height:1.6;margin-bottom:18px;word-break:break-all}
.modal .modal-actions{display:flex;gap:12px}
.modal .btn{flex:1;height:46px;font-size:15px}
.btn-danger{background:var(--danger);color:#fff}
.btn-danger:active{transform:translateY(1px)}

/* toast */
.toast{position:fixed;left:50%;top:24px;transform:translateX(-50%) translateY(-20px);
  background:rgba(17,24,39,.92);color:#fff;padding:10px 18px;border-radius:10px;font-size:14px;z-index:999;
  opacity:0;transition:.25s;pointer-events:none;max-width:90vw;text-align:center}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
<script src="auth.js?v=1.3.47"></script>
<script>
  // 登录闸门：无效会话跳转登录页
  (function () {
    try { if (!getSessionAccount()) location.replace('login/classic.html'); }
    catch (e) { location.replace('login/classic.html'); }
  })();
</script>
</head>
<body>

  <div class="nav-bar">
    <button class="nav-back" onclick="goBack()" aria-label="返回">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
    </button>
    <span class="nav-title">部门管理</span>
    <button class="nav-action" onclick="openAdd()">+ 新增</button>
  </div>

  <div class="wrap">
    <div class="search-box">
      <span class="ic"><svg class="search-icon" width="17" height="17" viewBox="0 0 24 24" fill="none"><circle cx="10" cy="10" r="6" fill="#9ca3af" fill-opacity="0.15" stroke="#9ca3af" stroke-width="2.5"/><path d="M15 15 L20 20" stroke="#9ca3af" stroke-width="2.5" stroke-linecap="round"/></svg></span>
      <input id="search" type="search" placeholder="搜索部门名称 / 编号 / ID" oninput="render()" />
    </div>
    <div id="list"></div>
  </div>

  <!-- 新增/编辑 抽屉 -->
  <div class="sheet-mask" id="sheetMask" onclick="closeSheet()"></div>
  <div class="sheet" id="sheet">
    <div class="sheet-title" id="sheetTitle">新增部门</div>
    <div class="readonly-meta" id="metaBox" style="display:none"></div>
    <div class="field">
      <label>部门名称 <span class="max" id="maxName">0/50</span></label>
      <input id="f-name" type="text" maxlength="50" placeholder="如：研发部" oninput="updateCounter('f-name','maxName',50);clearErr('deptName')">
      <div class="err" id="err-deptName"></div>
    </div>
    <div class="field">
      <label>部门编码 <span class="max" id="maxCode">0/10</span></label>
      <input id="f-code" type="text" maxlength="10" placeholder="如：D001" oninput="updateCounter('f-code','maxCode',10);clearErr('deptCode')">
      <div class="err" id="err-deptCode"></div>
    </div>
    <div class="field">
      <label>上级部门（可选）</label>
      <select id="f-parent" onchange="onParentChange()">
        <option value="">无（顶级部门）</option>
      </select>
      <div class="err" id="err-parentId"></div>
    </div>
    <div class="field">
      <label>所属公司</label>
      <select id="f-company" onchange="onCompanyChange()">
        <option value="">请选择所属公司</option>
      </select>
      <div class="hint" id="companyHint" style="display:none">由上级部门自动带出，不可修改</div>
      <div class="err" id="err-companyId"></div>
    </div>
    <div class="sheet-actions">
      <button class="btn btn-ghost" onclick="closeSheet()">取消</button>
      <button class="btn btn-primary" id="saveBtn" onclick="save()">保存</button>
    </div>
  </div>

  <!-- 删除确认 -->
  <div class="modal-mask" id="confirmMask">
    <div class="modal">
      <h3>删除确认</h3>
      <p id="confirmText">确定删除该部门记录？</p>
      <div class="modal-actions">
        <button class="btn btn-ghost" onclick="closeConfirm()">取消</button>
        <button class="btn btn-danger" onclick="doDelete()">删除</button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script src="config.js?v=1.3.47"></script>
  <script src="db.js?v=1.3.47"></script>
  <script src="companies.js?v=1.3.47"></script>
  <script src="departments.js?v=1.3.47"></script>
  <script>
    var editingId = null;
    var deletingId = null;

    function $(id){ return document.getElementById(id); }
    function escapeHtml(s){
      return String(s == null ? '' : s).replace(/[&<>"']/g, function(c){
        return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];
      });
    }
    function fmtTime(ts){
      if (!ts) return '—';
      var d = new Date(ts);
      function p(n){ return (n < 10 ? '0' : '') + n; }
      return d.getFullYear() + '-' + p(d.getMonth()+1) + '-' + p(d.getDate()) + ' ' + p(d.getHours()) + ':' + p(d.getMinutes());
    }
    function toast(msg){
      var t = $('toast'); t.textContent = msg; t.classList.add('show');
      clearTimeout(toast._t); toast._t = setTimeout(function(){ t.classList.remove('show'); }, 2200);
    }

    // ---------- 列表渲染（按公司分组 → 组内部门树）----------
    function render(){
      if (typeof RT_DEPTS === 'undefined') { showErr('部门数据模块未加载'); return; }
      var q = ($('search').value || '').trim().toLowerCase();
      Promise.all([RT_DEPTS.getAllDepartments(), RT_COMPANIES.getAllCompanies()]).then(function(res){
        var list = res[0]; var companies = res[1];

        if (q) {
          var m = {};
          list.forEach(function(r){
            var hit = (r.deptName+'').toLowerCase().indexOf(q) >= 0
              || (r.deptCode+'').toLowerCase().indexOf(q) >= 0
              || (r.id+'').toLowerCase().indexOf(q) >= 0;
            if (hit) { m[r.id] = true; if (r.parentId) m[r.parentId] = true; }
          });
          list = list.filter(function(r){ return m[r.id]; });
        }

        var companyMap = {};
        companies.forEach(function(c){ companyMap[c.id] = c; });
        var grouped = RT_DEPTS.groupByCompany(list);
        var box = $('list');
        var companyIds = Object.keys(grouped);

        if (!companyIds.length) {
          box.innerHTML = '<div class="empty"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 21h18M5 21V7l7-4 7 4v14M9 9h.01M15 9h.01M9 13h.01M15 13h.01"/></svg>'
            + '<div>' + (q ? '没有匹配的部门' : '还没有部门，点击右上角「+ 新增」') + '</div></div>';
          return;
        }

        companyIds.sort(function(a, b){
          var na = companyMap[a] ? companyMap[a].companyName : '';
          var nb = companyMap[b] ? companyMap[b].companyName : '';
          return na.localeCompare(nb, 'zh');
        });

        var html = '';
        companyIds.forEach(function(cid){
          var company = companyMap[cid];
          var cname = company ? company.companyName : '未知公司';
          var ccode = company ? company.companyCode : '';
          var tree = RT_DEPTS.buildHierarchy(grouped[cid] || []);
          html += '<div class="group">';
          html += '<div class="group-head">'
            + '<span class="gname">' + escapeHtml(cname) + '</span>'
            + (ccode ? '<span class="gcode">' + escapeHtml(ccode) + '</span>' : '')
            + '<span class="gcount">' + tree.length + ' 个部门</span></div>';
          tree.forEach(function(root){ html += deptRowHtml(root, 0); });
          html += '</div>';
        });
        box.innerHTML = html;
      }).catch(function(err){ showErr('读取部门数据失败：' + (err && err.message ? err.message : err)); });
    }

    function deptRowHtml(r, depth){
      var sub = '创建：' + escapeHtml(r.createdBy || '—') + ' · ' + fmtTime(r.createdAt)
        + (r.updatedBy ? '<br>更新：' + escapeHtml(r.updatedBy) + ' · ' + fmtTime(r.updatedAt) : '');
      var isChild = depth > 0;
      var html = '<div class="row' + (isChild ? ' child' : '') + '"'
        + (isChild ? ' style="padding-left:' + (16 + depth * 20) + 'px"' : '')
        + '>'
        + '<div class="main"><div class="bname">' + escapeHtml(r.deptName) + (r.deptCode ? ' <span style="color:var(--muted);font-size:13px;font-weight:400;margin-left:6px">' + escapeHtml(r.deptCode) + '</span>' : '') + '</div>'
        + '<div class="meta">' + sub + '</div></div>'
        + '<div class="acts">'
        + '<button class="icon-btn" aria-label="编辑" onclick="openEdit(\'' + r.id + '\')">'
        + '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.12 2.12 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg></button>'
        + '<button class="icon-btn danger" aria-label="删除" onclick="openConfirm(\'' + r.id + '\')">'
        + '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2m2 0v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6"/></svg></button>'
        + '</div></div>';
      (r.children || []).forEach(function(c){ html += deptRowHtml(c, depth + 1); });
      return html;
    }

    function showErr(msg){ $('list').innerHTML = '<div class="empty">' + escapeHtml(msg) + '</div>'; }

    // ---------- 表单 ----------
    function updateCounter(inputId, maxId, max){ $(maxId).textContent = $(inputId).value.length + '/' + max; }
    function setErr(field, msg){
      var el = $('err-' + field);
      if (el){ el.textContent = msg || ''; el.classList.toggle('show', !!msg); }
      var input = $(field === 'deptName' ? 'f-name' : field === 'deptCode' ? 'f-code' : field === 'companyId' ? 'f-company' : 'f-parent');
      if (input) input.classList.toggle('invalid', !!msg);
    }
    function clearErr(field){ setErr(field, ''); }
    function openSheet(){ $('sheetMask').classList.add('show'); $('sheet').classList.add('show'); }
    function closeSheet(){ $('sheetMask').classList.remove('show'); $('sheet').classList.remove('show'); editingId = null; }

    function populateCompanies(){
      return RT_COMPANIES.getAllCompanies().then(function(list){
        var sel = $('f-company');
        var cur = sel.value;
        sel.innerHTML = '<option value="">请选择所属公司</option>';
        list.sort(function(a, b){ return (a.companyName || '').localeCompare(b.companyName || '', 'zh'); })
          .forEach(function(c){
            var o = document.createElement('option');
            o.value = c.id; o.textContent = c.companyName + '（' + c.companyCode + '）';
            sel.appendChild(o);
          });
        if (cur) sel.value = cur;
      });
    }
    // 上级部门下拉：默认列出全部部门（排除自身）作为候选；若已选公司则按公司过滤
    function populateParents(companyId, selectedId){
      var sel = $('f-parent');
      sel.innerHTML = '<option value="">无（顶级部门）</option>';
      return RT_DEPTS.getAllDepartments().then(function(list){
        list.filter(function(d){
          if (d.id === editingId) return false;            // 排除自身
          if (companyId) return d.companyId === companyId;  // 已选公司则按公司过滤
          return true;                                      // 否则列出全部
        }).forEach(function(d){
          var o = document.createElement('option');
          o.value = d.id; o.textContent = d.deptName + '（' + d.deptCode + '）';
          sel.appendChild(o);
        });
        if (selectedId) sel.value = selectedId;
      });
    }
    // 上级部门变化：有上级 → 带出上级所属公司并锁定；无上级 → 解锁公司供手动选择
    function onParentChange(){
      var pid = $('f-parent').value;
      clearErr('parentId'); clearErr('companyId');
      if (pid) {
        $('f-company').disabled = true;
        $('companyHint').style.display = 'block';
        RT_DEPTS.getDept(pid).then(function(d){ if (d) $('f-company').value = d.companyId; }).catch(function(){});
      } else {
        $('f-company').disabled = false;
        $('companyHint').style.display = 'none';
        populateParents($('f-company').value, '');
      }
    }
    function onCompanyChange(){
      var cid = $('f-company').value;
      clearErr('companyId'); clearErr('parentId');
      // 公司仅在无上级（可编辑）时变化：按公司过滤上级部门候选
      if (!$('f-parent').value) populateParents(cid, '');
    }

    function resetForm(){
      $('f-name').value = ''; $('f-code').value = ''; $('f-company').value = ''; $('f-parent').innerHTML = '<option value="">无（顶级部门）</option>';
      $('f-company').disabled = false;
      $('companyHint').style.display = 'none';
      updateCounter('f-name','maxName',50);
      updateCounter('f-code','maxCode',10);
      ['deptName','deptCode','companyId','parentId'].forEach(clearErr);
      $('metaBox').style.display = 'none';
    }
    function openAdd(){
      editingId = null; resetForm();
      $('sheetTitle').textContent = '新增部门'; $('saveBtn').textContent = '创建';
      populateCompanies();
      populateParents('', '');   // 列出全部部门作为上级候选
      openSheet();
    }
    function openEdit(id){
      RT_DEPTS.getDept(id).then(function(r){
        if (!r) { toast('记录不存在'); return; }
        editingId = id; resetForm();
        $('f-name').value = r.deptName || '';
        $('f-code').value = r.deptCode || '';
        updateCounter('f-name','maxName',50);
        updateCounter('f-code','maxCode',10);
        $('metaBox').style.display = 'block';
        $('metaBox').innerHTML = '创建人：<b>' + escapeHtml(r.createdBy || '—') + '</b>　创建时间：<b>' + fmtTime(r.createdAt) + '</b>';
        populateCompanies().then(function(){
          $('f-company').value = r.companyId || '';
          return populateParents('', r.parentId || '');
        }).then(function(){
          if (r.parentId) { $('f-company').disabled = true; $('companyHint').style.display = 'block'; }
          else { $('f-company').disabled = false; $('companyHint').style.display = 'none'; }
        });
        $('sheetTitle').textContent = '编辑部门'; $('saveBtn').textContent = '保存';
        openSheet();
      }).catch(function(){ toast('读取失败'); });
    }
    function save(){
      var saveBtn = $('saveBtn'); if (saveBtn && saveBtn.disabled) return;
      try {
      var data = {
        deptName: $('f-name').value,
        deptCode: $('f-code').value,
        companyId: $('f-company').value,
        parentId: $('f-parent').value
      };
      var v = RT_DEPTS.validateDept(data);
      if (!v.ok) {
        ['deptName','deptCode','companyId','parentId'].forEach(function(f){ setErr(f, v.errors[f] || ''); });
        var map = { deptName:'f-name', deptCode:'f-code', companyId:'f-company', parentId:'f-parent' };
        var input = $(map[v.first]); if (input) input.focus();
        return;
      }
      if (saveBtn) { saveBtn.disabled = true; saveBtn.textContent = '保存中…'; }
      var operator = getSessionAccount() || '';
      // 有上级部门时，所属公司以该上级部门的真实所属公司为准（防止异步回写前提交导致偏差）
      var chain = data.parentId
        ? RT_DEPTS.getDept(data.parentId).then(function(d){ if (d) data.companyId = d.companyId; return data; })
        : Promise.resolve(data);
      chain.then(function(d){
        var p = editingId ? RT_DEPTS.updateDept(editingId, d, operator) : RT_DEPTS.createDept(d, operator);
        p.then(function(){ closeSheet(); toast(editingId ? '已保存' : '已创建'); render(); })
         .catch(function(err){ console.error(err); toast('操作失败：' + (err && err.message ? err.message : err)); })
         .then(function(){ if (saveBtn) { saveBtn.disabled = false; saveBtn.textContent = editingId ? '保存' : '创建'; } });
      }).catch(function(err){ console.error(err); toast('操作失败：' + (err && err.message ? err.message : err)); if (saveBtn) { saveBtn.disabled = false; saveBtn.textContent = editingId ? '保存' : '创建'; } });
      } catch (e) { console.error(e); toast('保存异常：' + (e && e.message ? e.message : e)); if (saveBtn) { saveBtn.disabled = false; saveBtn.textContent = editingId ? '保存' : '创建'; } }
    }

    // ---------- 删除 ----------
    function openConfirm(id){
      deletingId = id;
      RT_DEPTS.getDept(id).then(function(r){
        var name = r ? (r.deptName + '（' + (r.deptCode || '') + '）') : '';
        $('confirmText').textContent = '确定删除「' + name + '」这个部门吗？此操作不可撤销。';
      }).catch(function(){ $('confirmText').textContent = '确定删除该部门记录？此操作不可撤销。'; });
      $('confirmMask').classList.add('show');
    }
    function closeConfirm(){ $('confirmMask').classList.remove('show'); deletingId = null; }
    function doDelete(){
      if (!deletingId) return;
      var id = deletingId;
      RT_DEPTS.deleteDept(id).then(function(){
        closeConfirm(); toast('已删除'); render();
      }).catch(function(err){
        closeConfirm(); toast('删除失败：' + (err && err.message ? err.message : err));
      });
    }

    render();
    window.addEventListener('pageshow', render);
    document.addEventListener('visibilitychange', function(){ if (document.visibilityState === 'visible') render(); });

    // 注册 Service Worker（与主应用一致）
    if ('serviceWorker' in navigator) {
      fetch('version.json?_t=' + Date.now(), { cache: 'no-store' })
        .then(function(r){ return r.json(); })
        .then(function(d){ if (d && d.version) navigator.serviceWorker.register('sw.js?v=' + d.version); })
        .catch(function(){});
    }
  </script>
</body>
</html>
