<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>项目版本</title>
<link rel="apple-touch-icon" href="icons/icon-192.png">
<link rel="icon" href="icons/favicon-32.png">
<style>
:root{
  --primary:#1677ff; --primary-light:#4096ff; --bg:#f5f7fa; --surface:#fff;
  --text:#1f2937; --muted:#6b7280; --border:#e5e7eb; --radius:14px; --danger:#ef4444;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
button,a,input,select,textarea,[onclick]{outline:none}
button:focus:not(:focus-visible),a:focus:not(:focus-visible),[onclick]:focus:not(:focus-visible),input:focus:not(:focus-visible),select:focus:not(:focus-visible),textarea:focus:not(:focus-visible){outline:none}
html,body{height:100%}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;
  background:var(--bg);color:var(--text);min-height:100dvh;padding:0;-webkit-font-smoothing:antialiased;
}

/* 顶部导航 */
.nav-bar{
  position:sticky;top:0;z-index:10;display:flex;align-items:center;height:52px;padding:0 8px;
  background:rgba(255,255,255,.92);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  border-bottom:1px solid var(--border);padding-top:calc(env(safe-area-inset-top) + 8px)}
.nav-back{width:40px;height:40px;border:none;background:none;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text)}
.nav-back svg{width:22px;height:22px}
.nav-title{font-size:17px;font-weight:700;text-align:center;position:absolute;left:0;right:0;pointer-events:none}
.nav-action{margin-left:auto;font-size:15px;font-weight:600;color:#fff;border:none;cursor:pointer;
  background:linear-gradient(135deg,#1677ff,#4096ff);border-radius:10px;padding:8px 14px;
  box-shadow:0 4px 12px rgba(22,119,255,.3);-webkit-tap-highlight-color:transparent}
.nav-action:active{transform:translateY(1px)}

.wrap{max-width:560px;margin:0 auto;padding:14px 14px calc(env(safe-area-inset-bottom) + 90px)}

/* 搜索框 */
.search-box{display:flex;align-items:center;gap:8px;background:var(--surface);border:1.5px solid var(--border);
  border-radius:12px;padding:0 12px;height:44px;margin-bottom:14px}
.search-box .ic{color:var(--muted);flex-shrink:0}
.search-box input{flex:1;border:none;outline:none;background:none;font-size:15px;height:100%;color:var(--text)}

/* 分组卡片（按项目） */
.group{background:var(--surface);border-radius:var(--radius);margin-bottom:14px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.05)}
.group-head{display:flex;align-items:center;gap:10px;padding:13px 16px;border-bottom:1px solid var(--border);
  background:linear-gradient(135deg,#f5f9ff,#eef4ff)}
.group-head .gname{font-size:15px;font-weight:700;word-break:break-all}
.group-head .gcode{font-size:12px;color:var(--primary);background:#eff6ff;padding:2px 8px;border-radius:999px;font-weight:600}
.group-head .gcount{margin-left:auto;font-size:12px;color:var(--muted)}

/* 行 */
.row{display:flex;align-items:center;gap:12px;padding:13px 16px;border-bottom:1px solid var(--border)}
.row:last-child{border-bottom:none}
.row .main{flex:1;min-width:0}
.row .bname{font-size:15px;font-weight:600;word-break:break-all}
.row .desc{font-size:13px;color:var(--muted);margin-top:3px;line-height:1.5;word-break:break-all}
.row .meta{font-size:12px;color:var(--muted);margin-top:3px;line-height:1.5}
.row .acts{display:flex;gap:6px;flex-shrink:0}
.icon-btn{width:34px;height:34px;border:1px solid var(--border);background:var(--surface);border-radius:9px;
  display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--muted)}
.icon-btn:active{background:#f2f4f7}
.icon-btn.danger{color:var(--danger);border-color:#fecaca}
.icon-btn.danger:active{background:#fef2f2}
.icon-btn svg{width:17px;height:17px}

/* 状态徽标（进行中=蓝，已归档=绿） */
.st-badge{display:inline-block;font-size:12px;font-weight:600;padding:2px 9px;border-radius:999px;margin-right:8px;vertical-align:middle;line-height:1.4}
.st-active{background:#e6f0ff;color:#1677ff}
.st-archived{background:#e7f7ec;color:#16a34a}

/* 空状态 */
.empty{text-align:center;color:var(--muted);padding:60px 20px;font-size:14px;line-height:1.7}
.empty svg{width:46px;height:46px;opacity:.4;margin-bottom:12px}

/* 底部抽屉表单 */
.sheet-mask{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:100;display:none}
.sheet-mask.show{display:block}
.sheet{position:fixed;left:0;right:0;bottom:0;z-index:101;background:var(--surface);
  border-radius:18px 18px 0 0;padding:18px 18px calc(env(safe-area-inset-bottom) + 22px);
  transform:translateY(100%);transition:transform .25s ease;max-height:90vh;overflow:auto}
.sheet.show{transform:translateY(0)}
.sheet-title{font-size:17px;font-weight:700;text-align:center;margin-bottom:16px}
.field{margin-bottom:14px}
.field label{display:block;font-size:13px;color:var(--muted);margin-bottom:6px}
.field label .max{float:right;color:#c7ccd4;font-weight:400}
.field input, .field select, .field textarea{width:100%;height:48px;padding:0 14px;border:1.5px solid var(--border);border-radius:12px;
  font-size:15px;background:#fafbfc;outline:none;color:var(--text);transition:.2s;appearance:none;font-family:inherit}
.field textarea{height:auto;min-height:88px;padding:10px 14px;resize:vertical;line-height:1.6}
.field select{background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='16' height='16' viewBox='0 0 24 24' fill='none' stroke='%236b7280' stroke-width='2'><path d='m6 9 6 6 6-6'/></svg>");background-repeat:no-repeat;background-position:right 14px center}
.field input:focus, .field select:focus, .field textarea:focus{border-color:var(--primary);background:#fff;box-shadow:0 0 0 3px rgba(22,119,255,.12)}
.field input.invalid, .field select.invalid, .field textarea.invalid{border-color:var(--danger);background:#fff5f5}
.field .err{display:none;color:var(--danger);font-size:12px;margin-top:5px}
.field .err.show{display:block}
.readonly-meta{background:#f8fafc;border:1px dashed var(--border);border-radius:12px;padding:12px 14px;
  font-size:12px;color:var(--muted);line-height:1.8;margin-bottom:14px}
.readonly-meta b{color:var(--text);font-weight:600}
.readonly-meta .idline{font-family:ui-monospace,Menlo,Consolas,monospace;word-break:break-all}
.sheet-actions{display:flex;gap:12px;margin-top:6px}
.btn{flex:1;height:50px;border-radius:12px;font-size:16px;font-weight:600;cursor:pointer;border:none}
.btn-ghost{flex:0 0 38%;border:1.5px solid var(--border);background:#fff;color:var(--text)}
.btn-primary{background:linear-gradient(135deg,#1677ff,#4096ff);color:#fff;box-shadow:0 8px 18px rgba(22,119,255,.32)}
.btn-primary:active{transform:translateY(1px)}

/* 删除确认浮层 */
.modal-mask{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;display:none;align-items:center;justify-content:center;padding:24px}
.modal-mask.show{display:flex}
.modal{background:var(--surface);border-radius:16px;padding:22px 20px 18px;width:100%;max-width:320px;text-align:center}
.modal h3{font-size:17px;font-weight:700;margin-bottom:8px}
.modal p{font-size:14px;color:var(--muted);line-height:1.6;margin-bottom:18px;word-break:break-all}
.modal .modal-actions{display:flex;gap:12px}
.modal .btn{flex:1;height:46px;font-size:15px}
.btn-danger{background:var(--danger);color:#fff}
.btn-danger:active{transform:translateY(1px)}

/* toast */
.toast{position:fixed;left:50%;top:24px;transform:translateX(-50%) translateY(-20px);
  background:rgba(17,24,39,.92);color:#fff;padding:10px 18px;border-radius:10px;font-size:14px;z-index:999;
  opacity:0;transition:.25s;pointer-events:none;max-width:90vw;text-align:center}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
<script src="auth.js?v=1.3.6"></script>
<script>
  // 登录闸门：无效会话跳转登录页
  (function () {
    try { if (!getSessionAccount()) location.replace('login/classic.html'); }
    catch (e) { location.replace('login/classic.html'); }
  })();
</script>
</head>
<body>

  <div class="nav-bar">
    <button class="nav-back" onclick="goBack()" aria-label="返回">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
    </button>
    <span class="nav-title">项目版本</span>
    <button class="nav-action" onclick="openAdd()">+ 新增</button>
  </div>

  <div class="wrap">
    <div class="search-box">
      <span class="ic"><svg class="search-icon" width="17" height="17" viewBox="0 0 24 24" fill="none"><circle cx="10" cy="10" r="6" fill="#9ca3af" fill-opacity="0.15" stroke="#9ca3af" stroke-width="2.5"/><path d="M15 15 L20 20" stroke="#9ca3af" stroke-width="2.5" stroke-linecap="round"/></svg></span>
      <input id="search" type="search" placeholder="搜索版本名称 / 描述 / ID" oninput="render()" />
    </div>
    <div id="list"></div>
  </div>

  <!-- 新增/编辑 抽屉 -->
  <div class="sheet-mask" id="sheetMask" onclick="closeSheet()"></div>
  <div class="sheet" id="sheet">
    <div class="sheet-title" id="sheetTitle">新增版本</div>
    <div class="readonly-meta" id="metaBox" style="display:none"></div>
    <div class="field">
      <label>版本名称 <span class="max" id="maxName">0/50</span></label>
      <input id="f-name" type="text" maxlength="50" placeholder="如：v1.0.0" oninput="updateCounter('f-name','maxName',50);clearErr('versionName')">
      <div class="err" id="err-versionName"></div>
    </div>
    <div class="field">
      <label>版本描述 <span class="max" id="maxDesc">0/200</span></label>
      <textarea id="f-desc" maxlength="200" placeholder="选填，简要描述本版本的变更内容" oninput="updateCounter('f-desc','maxDesc',200);clearErr('versionDesc')"></textarea>
      <div class="err" id="err-versionDesc"></div>
    </div>
    <div class="field">
      <label>所属项目</label>
      <select id="f-project" onchange="clearErr('projectId')">
        <option value="">请选择所属项目</option>
      </select>
      <div class="err" id="err-projectId"></div>
    </div>
    <div class="field">
      <label>状态</label>
      <select id="f-status">
        <option value="ACTIVE">进行中</option>
        <option value="ARCHIVED">已归档</option>
      </select>
    </div>
    <div class="sheet-actions">
      <button class="btn btn-ghost" onclick="closeSheet()">取消</button>
      <button class="btn btn-primary" id="saveBtn" onclick="save()">保存</button>
    </div>
  </div>

  <!-- 删除确认 -->
  <div class="modal-mask" id="confirmMask">
    <div class="modal">
      <h3>删除确认</h3>
      <p id="confirmText">确定删除该版本记录？</p>
      <div class="modal-actions">
        <button class="btn btn-ghost" onclick="closeConfirm()">取消</button>
        <button class="btn btn-danger" onclick="doDelete()">删除</button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script src="db.js?v=1.3.6"></script>
  <script src="companies.js?v=1.3.6"></script>
  <script src="departments.js?v=1.3.6"></script>
  <script src="projects.js?v=1.3.6"></script>
  <script src="project-versions.js?v=1.3.6"></script>
  <script src="dictionary.js?v=1.3.1"></script>
  <script>
    var editingId = null;
    var deletingId = null;

    function $(id){ return document.getElementById(id); }
    function escapeHtml(s){
      return String(s == null ? '' : s).replace(/[&<>"']/g, function(c){
        return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];
      });
    }
    function fmtTime(ts){
      if (!ts) return '—';
      var d = new Date(ts);
      function p(n){ return (n < 10 ? '0' : '') + n; }
      return d.getFullYear() + '-' + p(d.getMonth()+1) + '-' + p(d.getDate()) + ' ' + p(d.getHours()) + ':' + p(d.getMinutes());
    }
    function toast(msg){
      var t = $('toast'); t.textContent = msg; t.classList.add('show');
      clearTimeout(toast._t); toast._t = setTimeout(function(){ t.classList.remove('show'); }, 2200);
    }

    // ---------- 状态（取自字典表 PROJECT_STATUS，实体只存 code）----------
    // 文案回退：即使字典尚未播种，徽标与下拉也能正常显示。
    var STATUS_FALLBACK = { ACTIVE: '进行中', ARCHIVED: '已归档' };
    function statusBadgeHtml(code, statusMap){
      var c = code || 'ACTIVE';
      var label = (statusMap && statusMap[c]) ? statusMap[c] : (STATUS_FALLBACK[c] || '进行中');
      var cls = (c === 'ARCHIVED') ? 'st-archived' : 'st-active';
      return '<span class="st-badge ' + cls + '">' + escapeHtml(label) + '</span>';
    }
    // 读取字典中的 PROJECT_STATUS，构建 code→name 映射（供徽标展示）
    function loadStatusMap(){
      if (typeof RT_DICT === 'undefined' || !RT_DICT.getDictByType || !RT_DICT.SEED_TYPE) return Promise.resolve({});
      return RT_DICT.getDictByType(RT_DICT.SEED_TYPE.PROJECT_STATUS).then(function(list){
        var m = {}; (Array.isArray(list) ? list : []).forEach(function(r){ m[r.code] = r.name; }); return m;
      }).catch(function(){ return {}; });
    }
    // 填充状态下拉：优先用字典文案，缺失时回退本地常量
    function populateStatuses(){
      var sel = $('f-status');
      var opts = [{ code: 'ACTIVE', name: '进行中' }, { code: 'ARCHIVED', name: '已归档' }];
      if (typeof RT_DICT !== 'undefined' && RT_DICT.getDictByType && RT_DICT.SEED_TYPE) {
        return RT_DICT.getDictByType(RT_DICT.SEED_TYPE.PROJECT_STATUS).then(function(list){
          if (Array.isArray(list) && list.length) {
            opts = list.slice().sort(function(a, b){ return (a.code || '').localeCompare(b.code || '', 'en'); })
              .map(function(r){ return { code: r.code, name: r.name }; });
          }
          fillStatusOptions(sel, opts);
        }).catch(function(){ fillStatusOptions(sel, opts); });
      }
      fillStatusOptions(sel, opts);
      return Promise.resolve();
    }
    function fillStatusOptions(sel, opts){
      var cur = sel.value;
      sel.innerHTML = opts.map(function(o){
        return '<option value="' + escapeHtml(o.code) + '">' + escapeHtml(o.name) + '</option>';
      }).join('');
      if (cur) sel.value = cur;
    }

    // ---------- 列表渲染（按项目分组）----------
    function render(){
      if (typeof RT_PROJECT_VERSIONS === 'undefined') { showErr('项目版本数据模块未加载'); return; }
      var q = ($('search').value || '').trim().toLowerCase();
      Promise.all([
        RT_PROJECT_VERSIONS.getAllProjectVersions(),
        RT_PROJECTS.getAllProjects(),
        RT_DEPTS.getAllDepartments(),
        RT_COMPANIES.getAllCompanies(),
        loadStatusMap()
      ]).then(function(res){
        var list = res[0]; var projects = res[1]; var depts = res[2]; var companies = res[3]; var statusMap = res[4];

        if (q) {
          var m = {};
          list.forEach(function(r){
            var hit = (r.versionName+'').toLowerCase().indexOf(q) >= 0
              || (r.versionDesc+'').toLowerCase().indexOf(q) >= 0
              || (r.id+'').toLowerCase().indexOf(q) >= 0;
            if (hit) m[r.id] = true;
          });
          list = list.filter(function(r){ return m[r.id]; });
        }

        var projectMap = {}; projects.forEach(function(p){ projectMap[p.id] = p; });
        var deptMap = {}; depts.forEach(function(d){ deptMap[d.id] = d; });
        var companyMap = {}; companies.forEach(function(c){ companyMap[c.id] = c; });
        var grouped = RT_PROJECT_VERSIONS.groupByProject(list);
        var box = $('list');
        var projectIds = Object.keys(grouped);

        if (!projectIds.length) {
          box.innerHTML = '<div class="empty"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 21h18M5 21V7l7-4 7 4v14M9 9h.01M15 9h.01M9 13h.01M15 13h.01"/></svg>'
            + '<div>' + (q ? '没有匹配的版本' : '还没有版本，点击右上角「+ 新增」') + '</div></div>';
          return;
        }

        projectIds.sort(function(a, b){
          var pa = projectMap[a], pb = projectMap[b];
          var na = pa ? (pa.projectName || '') : '未知项目';
          var nb = pb ? (pb.projectName || '') : '未知项目';
          return na.localeCompare(nb, 'zh');
        });

        var html = '';
        projectIds.forEach(function(pid){
          var project = projectMap[pid];
          var pname = project ? project.projectName : '未知项目';
          var dname = (project && deptMap[project.deptId]) ? deptMap[project.deptId].deptName : '';
          var cname = (project && project.deptId && deptMap[project.deptId] && companyMap[deptMap[project.deptId].companyId]) ? companyMap[deptMap[project.deptId].companyId].companyName : '';
          var items = grouped[pid] || [];
          html += '<div class="group">';
          html += '<div class="group-head">'
            + '<span class="gname">' + escapeHtml(pname) + '</span>'
            + (dname ? '<span class="gcode">' + escapeHtml(dname) + (cname ? ' · ' + cname : '') + '</span>' : '')
            + '<span class="gcount">' + items.length + ' 个版本</span></div>';
          items.forEach(function(v){ html += verRowHtml(v, statusMap); });
          html += '</div>';
        });
        box.innerHTML = html;
      }).catch(function(err){ showErr('读取项目版本数据失败：' + (err && err.message ? err.message : err)); });
    }

    function verRowHtml(v, statusMap){
      var sub = '创建：' + escapeHtml(v.createdBy || '—') + ' · ' + fmtTime(v.createdAt)
        + (v.updatedBy ? '<br>更新：' + escapeHtml(v.updatedBy) + ' · ' + fmtTime(v.updatedAt) : '');
      var badge = statusBadgeHtml(v.statusCode, statusMap);
      var html = '<div class="row">'
        + '<div class="main"><div class="bname">' + badge + escapeHtml(v.versionName) + '</div>'
        + (v.versionDesc ? '<div class="desc">' + escapeHtml(v.versionDesc) + '</div>' : '')
        + '<div class="meta">' + sub + '</div></div>'
        + '<div class="acts">'
        + '<button class="icon-btn" aria-label="编辑" onclick="openEdit(\'' + v.id + '\')">'
        + '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.12 2.12 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg></button>'
        + '<button class="icon-btn danger" aria-label="删除" onclick="openConfirm(\'' + v.id + '\')">'
        + '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2m2 0v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6"/></svg></button>'
        + '</div></div>';
      return html;
    }

    function showErr(msg){ $('list').innerHTML = '<div class="empty">' + escapeHtml(msg) + '</div>'; }

    // ---------- 表单 ----------
    function updateCounter(inputId, maxId, max){ $(maxId).textContent = $(inputId).value.length + '/' + max; }
    function setErr(field, msg){
      var el = $('err-' + field);
      if (el){ el.textContent = msg || ''; el.classList.toggle('show', !!msg); }
      var input = $(field === 'versionName' ? 'f-name' : field === 'versionDesc' ? 'f-desc' : field === 'projectId' ? 'f-project' : '');
      if (input) input.classList.toggle('invalid', !!msg);
    }
    function clearErr(field){ setErr(field, ''); }
    function openSheet(){ $('sheetMask').classList.add('show'); $('sheet').classList.add('show'); }
    function closeSheet(){ $('sheetMask').classList.remove('show'); $('sheet').classList.remove('show'); editingId = null; }

    // 所属项目下拉：列出全部项目（附所属部门名便于辨识）
    function populateProjects(){
      return Promise.all([RT_PROJECTS.getAllProjects(), RT_DEPTS.getAllDepartments()]).then(function(res){
        var projects = res[0]; var depts = res[1];
        var deptMap = {}; depts.forEach(function(d){ deptMap[d.id] = d; });
        var sel = $('f-project');
        var cur = sel.value;
        sel.innerHTML = '<option value="">请选择所属项目</option>';
        projects.sort(function(a, b){ return (a.projectName || '').localeCompare(b.projectName || '', 'zh'); })
          .forEach(function(p){
            var dname = deptMap[p.deptId] ? deptMap[p.deptId].deptName : '';
            var o = document.createElement('option');
            o.value = p.id; o.textContent = p.projectName + (dname ? '（' + dname + '）' : '');
            sel.appendChild(o);
          });
        if (cur) sel.value = cur;
      });
    }
    function resetForm(){
      $('f-name').value = ''; $('f-desc').value = ''; $('f-project').value = '';
      $('f-status').value = 'ACTIVE';
      updateCounter('f-name','maxName',50);
      updateCounter('f-desc','maxDesc',200);
      ['versionName','versionDesc','projectId'].forEach(clearErr);
      $('metaBox').style.display = 'none';
    }
    function openAdd(){
      editingId = null; resetForm();
      $('sheetTitle').textContent = '新增版本'; $('saveBtn').textContent = '创建';
      populateProjects();
      populateStatuses();
      openSheet();
    }
    function openEdit(id){
      RT_PROJECT_VERSIONS.getProjectVersion(id).then(function(r){
        if (!r) { toast('记录不存在'); return; }
        editingId = id; resetForm();
        $('f-name').value = r.versionName || '';
        $('f-desc').value = r.versionDesc || '';
        updateCounter('f-name','maxName',50);
        updateCounter('f-desc','maxDesc',200);
        $('metaBox').style.display = 'block';
        $('metaBox').innerHTML = '创建人：<b>' + escapeHtml(r.createdBy || '—') + '</b>　创建时间：<b>' + fmtTime(r.createdAt) + '</b>';
        populateProjects().then(function(){ $('f-project').value = r.projectId || ''; });
        populateStatuses().then(function(){ $('f-status').value = r.statusCode || 'ACTIVE'; });
        $('sheetTitle').textContent = '编辑版本'; $('saveBtn').textContent = '保存';
        openSheet();
      }).catch(function(){ toast('读取失败'); });
    }
    function save(){
      var saveBtn = $('saveBtn'); if (saveBtn && saveBtn.disabled) return;
      try {
      var data = {
        versionName: $('f-name').value,
        versionDesc: $('f-desc').value,
        projectId: $('f-project').value,
        statusCode: $('f-status').value || 'ACTIVE'
      };
      var v = RT_PROJECT_VERSIONS.validateProjectVersion(data);
      if (!v.ok) {
        ['versionName','versionDesc','projectId'].forEach(function(f){ setErr(f, v.errors[f] || ''); });
        var map = { versionName:'f-name', versionDesc:'f-desc', projectId:'f-project' };
        var input = $(map[v.first]); if (input) input.focus();
        return;
      }
      if (saveBtn) { saveBtn.disabled = true; saveBtn.textContent = '保存中…'; }
      var operator = getSessionAccount() || '';
      var p = editingId
        ? RT_PROJECT_VERSIONS.updateProjectVersion(editingId, data, operator)
        : RT_PROJECT_VERSIONS.createProjectVersion(data, operator);
      p.then(function(){ closeSheet(); toast(editingId ? '已保存' : '已创建'); render(); })
       .catch(function(err){ console.error(err); toast('操作失败：' + (err && err.message ? err.message : err)); })
       .then(function(){ if (saveBtn) { saveBtn.disabled = false; saveBtn.textContent = editingId ? '保存' : '创建'; } });
      } catch (e) { console.error(e); toast('保存异常：' + (e && e.message ? e.message : e)); if (saveBtn) { saveBtn.disabled = false; saveBtn.textContent = editingId ? '保存' : '创建'; } }
    }

    // ---------- 删除 ----------
    function openConfirm(id){
      deletingId = id;
      RT_PROJECT_VERSIONS.getProjectVersion(id).then(function(r){
        var name = r ? (r.versionName + (r.versionDesc ? '（' + r.versionDesc + '）' : '')) : '';
        $('confirmText').textContent = '确定删除「' + name + '」这个版本吗？此操作不可撤销。';
      }).catch(function(){ $('confirmText').textContent = '确定删除该版本记录？此操作不可撤销。'; });
      $('confirmMask').classList.add('show');
    }
    function closeConfirm(){ $('confirmMask').classList.remove('show'); deletingId = null; }
    function doDelete(){
      if (!deletingId) return;
      var id = deletingId;
      RT_PROJECT_VERSIONS.deleteProjectVersion(id).then(function(){
        closeConfirm(); toast('已删除'); render();
      }).catch(function(err){
        closeConfirm(); toast('删除失败：' + (err && err.message ? err.message : err));
      });
    }

    // 首次进入先播种字典系统枚举（幂等，会补齐新增的项目状态类型），再渲染
    if (typeof RT_DICT !== 'undefined' && RT_DICT.seedDict) {
      RT_DICT.seedDict(getSessionAccount() || 'system')
        .then(render)
        .catch(function(){ render(); });
    } else {
      render();
    }
    window.addEventListener('pageshow', render);
    document.addEventListener('visibilitychange', function(){ if (document.visibilityState === 'visible') render(); });

    // 注册 Service Worker（与主应用一致）
    if ('serviceWorker' in navigator) {
      fetch('version.json?_t=' + Date.now(), { cache: 'no-store' })
        .then(function(r){ return r.json(); })
        .then(function(d){ if (d && d.version) navigator.serviceWorker.register('sw.js?v=' + d.version); })
        .catch(function(){});
    }
  </script>
</body>
</html>
