<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>详细信息</title>
<link rel="apple-touch-icon" href="icons/icon-192.png">
<link rel="icon" href="icons/favicon-32.png">
<style>
:root{ --primary:#1677ff; --bg:#f5f7fa; --surface:#fff; --text:#1f2937; --muted:#6b7280; --border:#e5e7eb; --radius:14px; }
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
button,a,input,select,textarea,[onclick]{outline:none}
button:focus:not(:focus-visible),a:focus:not(:focus-visible),[onclick]:focus:not(:focus-visible),input:focus:not(:focus-visible),select:focus:not(:focus-visible),textarea:focus:not(:focus-visible){outline:none}
html,body{height:100%}
body{ font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif; background:var(--surface);color:var(--text); min-height:100dvh; padding:0; -webkit-font-smoothing:antialiased; }
.nav-bar{ position:sticky;top:0;z-index:10; display:flex;align-items:center;height:52px;padding:0 16px 0 4px; background:rgba(255,255,255,.92);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px); border-bottom:1px solid var(--border); padding-top:calc(env(safe-area-inset-top) + 8px); }
.nav-back{width:36px;height:36px;border:none;background:none;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text)}
.nav-back svg{width:22px;height:22px}
.nav-title{font-size:17px;font-weight:700;text-align:center;position:absolute;left:0;right:0;pointer-events:none}
.card{ width:100%; min-height:calc(100dvh - 60px); background:var(--surface); padding:24px 20px calc(env(safe-area-inset-bottom) + 32px); display:flex; flex-direction:column; align-items:center; gap:4px; }
.info-list{width:100%;max-width:400px;display:flex;flex-direction:column;gap:2px}
.info-row{display:flex;align-items:center;padding:15px 16px;background:var(--surface);border-bottom:1px solid var(--border);gap:12px;min-height:56px;cursor:default;-webkit-tap-highlight-color:transparent}
.info-row:last-child{border-bottom:none}
.info-label{font-size:14px;color:var(--muted);min-width:64px;flex-shrink:0}
.info-value{font-size:15px;color:var(--text);flex:1;text-align:right;word-break:break-all}
.info-value.empty{color:#c7ccd4}
.hint{font-size:12px;color:#9ca3af;text-align:center;margin-top:16px;line-height:1.6;max-width:400px}
</style>
<script src="auth.js?v=1.3.6"></script>
<script src="db.js?v=1.3.6"></script>
<script src="users.js?v=1.3.6"></script>
<script src="departments.js?v=1.3.6"></script>
<script src="positions.js?v=1.3.6"></script>
<script>
  (function () {
    try { if (!getSessionAccount()) location.replace('login/classic.html'); }
    catch (e) { location.replace('login/classic.html'); }
  })();
</script>
</head>
<body>

  <div class="nav-bar">
    <button class="nav-back" onclick="goBack()" aria-label="返回">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
    </button>
    <span class="nav-title">详细信息</span>
  </div>

  <div class="card">
    <div class="info-list">
      <div class="info-row"><span class="info-label">部门</span><span class="info-value" id="dv-dept">—</span></div>
      <div class="info-row"><span class="info-label">职位</span><span class="info-value" id="dv-pos">—</span></div>
      <div class="info-row"><span class="info-label">姓名</span><span class="info-value" id="dv-name">—</span></div>
      <div class="info-row" style="border-bottom:1px solid var(--border)"><span class="info-label">工号</span><span class="info-value" id="dv-emp">—</span></div>
    </div>
    <div class="hint">以上信息由「人员管理」维护，如需修改请联系管理员。</div>
  </div>

  <script>
    function setVal(id, val){ var el=document.getElementById(id); if(el) el.textContent = (val==null||val==='')?'—':val; }

    async function render(){
      var acc = getSessionAccount(); if (!acc) { location.replace('login/classic.html'); return; }
      if (typeof RT_USERS !== 'undefined' && RT_USERS.ensurePerson) { try { await RT_USERS.ensurePerson(acc); } catch(e){} }
      var rec = (typeof RT_USERS !== 'undefined') ? await RT_USERS.getUserByAccount(acc) : null;
      if (!rec) { var m = getMyAccount(); rec = m ? { name:'', employeeNo:'', departmentId:'', positionId:'' } : null; }
      if (!rec) return;

      setVal('dv-name', rec.name); setVal('dv-emp', rec.employeeNo);

      try {
        if (typeof RT_DEPTS !== 'undefined') {
          var ds = await RT_DEPTS.getAllDepartments();
          var d = (ds||[]).filter(function(x){ return x.id === rec.departmentId; })[0];
          setVal('dv-dept', d ? d.deptName : '');
        }
        if (typeof RT_POSITIONS !== 'undefined') {
          var ps = await RT_POSITIONS.getAllPositions();
          var p = (ps||[]).filter(function(x){ return x.id === rec.positionId; })[0];
          setVal('dv-pos', p ? p.positionName : '');
        }
      } catch(e){}
    }

    render();
    window.addEventListener('pageshow', render);
    document.addEventListener('visibilitychange', function(){ if (document.visibilityState === 'visible') render(); });
    if ('serviceWorker' in navigator) {
      fetch('version.json?_t=' + Date.now(), { cache: 'no-store' })
        .then(function(r){ return r.json(); }).then(function(d){ if (d && d.version) navigator.serviceWorker.register('sw.js?v=' + d.version).catch(function(){}); }).catch(function(){});
    }
  </script>
</body>
</html>
