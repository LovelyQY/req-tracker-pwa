<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>会议统计</title>
<link rel="apple-touch-icon" href="icons/icon-192.png">
<link rel="icon" href="icons/favicon-32.png">
<link rel="stylesheet" href="styles.css?v=1.3.52" />
<style>
  *, *::before, *::after { -webkit-tap-highlight-color: transparent; }
  button, a, input, select, textarea, [onclick] { outline: none; }
  button:focus:not(:focus-visible),
  a:focus:not(:focus-visible),
  [onclick]:focus:not(:focus-visible),
  input:focus:not(:focus-visible),
  select:focus:not(:focus-visible),
  textarea:focus:not(:focus-visible) { outline: none; }

  .wrap{max-width:560px;margin:0 auto;padding:16px 14px calc(env(safe-area-inset-bottom) + 40px)}
  .section-desc{font-size:13px;color:var(--muted,#6b7280);line-height:1.6;margin:4px 4px 14px}

  .report-section{display:block}

  .tl-overlay{position:fixed;inset:0;background:#fff;z-index:1000;overflow:auto;-webkit-overflow-scrolling:touch}
  .tl-overlay[hidden]{display:none}
  .tl-overlay .tl-header{position:sticky;top:0;background:#fff;z-index:1}
  .rf-print-title{display:none}
  .rf-detail-table{display:none}

  @media print {
    @page { size: A4 landscape; margin: 12mm; }
    .nav-bar, .tl-overlay { display: none !important; }
    .rm-list-btn { display: none !important; }
    body { background: #fff; }
    .rf-print-title { display: block !important; font-size: 18px; font-weight: 700; text-align: center; margin: 4px 0 16px; }
    .report-toolbar { box-shadow: none; }
    .rf-detail-table { display: table; width: 100%; border-collapse: collapse; font-size: 8pt; margin-top: 18px; }
    .rf-detail-table th, .rf-detail-table td { border: 0.5px solid #ccc; padding: 3px 5px; text-align: left; vertical-align: top; }
    .rf-detail-table thead th { background: #f0f2f5; font-weight: 600; }
  }
</style>
<script src="auth.js?v=1.3.52"></script>
<script>
  (function () {
    try { if (!getSessionAccount()) location.replace('login/classic.html'); }
    catch (e) { location.replace('login/classic.html'); }
  })();
</script>
</head>
<body>
  <div class="nav-bar">
    <button class="nav-back" onclick="goBack()" aria-label="返回">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
    </button>
    <span class="nav-title">会议统计</span>
  </div>

  <div class="wrap">
    <p class="section-desc">按会议时间汇总会议总量与状态分布。数据来源：代办·会议。</p>

    <section class="report-section" data-key="meeting">
      <div class="report-toolbar">
        <div class="rf-print-title" id="rf-print-title">会议统计 · 报表</div>
        <div class="rf-row">
          <div class="rf-seg" id="rf-seg">
            <button type="button" class="rf-tab is-active" data-dim="year">年度</button>
            <button type="button" class="rf-tab" data-dim="quarter">季度</button>
            <button type="button" class="rf-tab" data-dim="month">月度</button>
          </div>
          <button class="rf-export" id="btn-export-pdf" type="button" data-perm="op_report_meeting_export">
            <svg class="rf-export-icon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3v12"/><path d="M7 11l5 5 5-5"/><path d="M5 21h14"/></svg>
            导出PDF
          </button>
        </div>
        <div class="rf-value" id="rf-value"></div>
        <div class="rf-caption" id="rf-caption"></div>
      </div>
      <div class="report-grid">
        <div class="report-card"><div class="num" id="m-total">0</div><div class="lbl">总会议</div></div>
        <div class="report-card"><div class="num" id="m-notstart">0</div><div class="lbl">未开始</div></div>
        <div class="report-card"><div class="num" id="m-ended">0</div><div class="lbl">已结束</div></div>
        <div class="report-card"><div class="num" id="m-cancelled">0</div><div class="lbl">已取消</div></div>
      </div>
      <div class="report-modules" id="rm-project-modules"></div>
    </section>

    <!-- 批次47：导出PDF用任务详情表格（屏幕隐藏，打印可见） -->
    <table class="rf-detail-table" id="rf-detail-table">
      <thead><tr></tr></thead>
      <tbody></tbody>
    </table>

    <!-- 任务清单 overlay -->
    <div class="tl-overlay" id="tl-overlay" hidden>
      <div class="tl-header">
        <button class="tl-back" id="tl-back" type="button">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
          <span>返回</span>
        </button>
        <div class="tl-title" id="tl-title">任务清单</div>
      </div>
      <div class="tl-meta" id="tl-meta"></div>
      <div class="tl-list" id="tl-list"></div>
    </div>
  </div>

  <script src="config.js?v=1.3.52"></script>
  <script src="db.js?v=1.3.52"></script>
  <script src="dictionary.js?v=1.3.52"></script>
  <script src="projects.js?v=1.3.52"></script>
  <script src="project-versions.js?v=1.3.52"></script>
  <script src="requirement-tasks.js?v=1.3.52"></script>
  <script src="task-lifecycles.js?v=1.3.52"></script>
  <script src="todos.js?v=1.3.52"></script>
  <script src="todo-lifecycles.js?v=1.3.52"></script>
  <script src="companies.js?v=1.3.52"></script>
  <script src="departments.js?v=1.3.52"></script>
  <script src="users.js?v=1.3.52"></script>
  <script src="report-common.js?v=1.3.52"></script>
  <script src="report-meeting.js?v=1.3.52"></script>
  <script src="permissions-registry.js?v=1.3.52"></script>
  <script src="permissions.js?v=1.3.52"></script>
</body>
</html>
